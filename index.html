  <style>
    :root {
      --app-bg: #f8fafc;
      --surface: #ffffff;
      --primary: #4f46e5;      /* Indigo 600 */
      --primary-soft: #e0e7ff; /* Indigo 100 */
      --quiz: #10b981;         /* Emerald 500 */
      --quiz-soft: #d1fae5;    /* Emerald 100 */
      --text-main: #0f172a;    /* Slate 900 */
      --text-muted: #64748b;   /* Slate 500 */
      --border-light: #f1f5f9; /* Slate 100 */
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      background-color: var(--app-bg);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      letter-spacing: -0.01em;
    }

    /* 미니멀 스크롤바 */
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
   
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* 프리미엄 애니메이션 */
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes bounceIn {
      0%, 20%, 40%, 60%, 80%, 100% { animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      0% { opacity: 0; transform: scale3d(0.3, 0.3, 0.3); }
      20% { transform: scale3d(1.1, 1.1, 1.1); }
      40% { transform: scale3d(0.9, 0.9, 0.9); }
      60% { opacity: 1; transform: scale3d(1.03, 1.03, 1.03); }
      80% { transform: scale3d(0.97, 0.97, 0.97); }
      100% { opacity: 1; transform: scale3d(1, 1, 1); }
    }

    .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-bounce-in { animation: bounceIn 0.7s both; }

    /* 세련된 버튼 클릭 효과 */
    .active-scale { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); }
    .active-scale:active { transform: scale(0.97); }

    /* 고급스러운 그림자 */
    .shadow-premium { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03), 0 0 3px rgba(0,0,0,0.02); }
    .shadow-inner-premium { box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02); }
  </style>
</head>

    const TabSelector = ({ tabs, activeTab, setActiveTab, currentView, setQuizState }) => {
      const tabRef = useRef(null);
      const isQuiz = currentView === 'quiz';
      const activeBg = isQuiz ? 'bg-emerald-500 text-white shadow-md' : 'bg-white text-indigo-600 shadow-sm';

        if(tabRef.current) {
          const activeBtn = tabRef.current.querySelector('.active-tab');
          if(activeBtn) {
            const scrollLeft = activeBtn.offsetLeft - (tabRef.current.clientWidth / 2) + (activeBtn.clientWidth / 2);
            tabRef.current.scrollTo({ left: scrollLeft, behavior: 'smooth' });
          }
        }
      }, [activeTab]);

      return (
        <div className="w-full mb-6 shrink-0 relative px-4 md:px-0 flex justify-center">

          D(60,'안전/기타','LOTO 실시해','LOTO(LOCK OUT TAG OUT) 실시해','Lakukan sistem LOTO (Kunci dan Beri Tag)','Ro-to sil-si-he','Khóa bảng điện an toàn (LOTO)','Rô-thô xil-xi-he'),
          D(61,'안전/기타','과부하 조심해','','Hati-hati tegangan/beban berlebih (Overload)','Gwa-bu-hwa jo-sim-he','Cẩn thận quá tải','Gwa-bu-hwa chô-xim-he'),
          D(62,'안전/기타','확인 점검 실시해','','Lakukan pengecekan dan konfirmasi','Hwa-gin jeom-geom sil-si-he','Tiến hành kiểm tra xác nhận','Hwa-gin chơm-gơm xil-xi-he'),
          D(63,'안전/기타','오늘 할 일 확인해','','Periksa tugas dan pekerjaan untuk hari ini','O-neul hal il hwa-gin-he','Kiểm tra việc phải làm hôm nay','Ô-nưn hal il hwa-gin-he'),
          D(64,'안전/기타','데이터 저장해','','Simpan datanya','De-i-teo jeo-jang-he','Lưu dữ liệu lại','Đê-i-thơ chơ-chang-he'),
          D(65,'안전/기타','비상등 켜지나 봐','','Periksa apakah lampu darurat menyala','Bi-sang-deung kyeo-ji-na bwa','Xem đèn khẩn cấp có sáng không','Bi-xang-đưng khyơ-chi-na bwa'),
          D(66,'안전/기타','에어 가득 채워','','Isi tekanan udara (air) sampai penuh','E-eo ga-deuk chae-wo','Bơm đầy khí nén','E-ơ ga-đức che-wơ'),
          D(67,'안전/기타','마지막 청소해','','Lakukan pembersihan untuk yang terakhir','Ma-ji-mak cheong-so-he','Dọn dẹp vệ sinh lần cuối','Ma-chi-mác chơng-xô-he'),
          D(68,'안전/기타','야간 작업 주의해','','Berhati-hatilah saat bekerja di shift malam','Ya-gan ja-geop ju-ui-he','Chú ý khi làm việc ban đêm','Ya-gan cha-gớp chu-ưi-he'),
          D(69,'안전/기타','구명 조끼 위치 봐','','Lihat di mana lokasi jaket pelampung','Gu-myeong jo-kki wi-chi bwa','Xem vị trí áo phao ở đâu','Gu-myơng chốc-kki wi-chi bwa'),
          D(70,'안전/기타','필요한 서류 챙겨','','Bawa semua dokumen yang diperlukan','Pi-ryo-han seo-ryu chaeng-gyeo','Mang theo giấy tờ cần thiết','Phi-ryô-han xơ-ryu cheng-gyơ'),
          D(71,'안전/기타','선주 정중하게 대해','','Bersikaplah sopan kepada pengawas kapal','Seon-ju jeong-jung-ha-ge dae-he','Cư xử lịch sự với chủ tàu','Xơn-chu chơng-chung-ha-ge đe-he'),
          D(72,'안전/기타','긴급 정지 버튼 눌러','','Tekan tombol Berhenti Darurat','Gin-geup jeong-ji beo-teun nul-reo','Bấm nút dừng khẩn cấp','Gin-gưp chơng-chi bơn-thư nun-rơ'),
          D(73,'안전/기타','엔진 온도 체크해','','Cek suhu pada mesin (engine)','En-jin on-do che-keu-he','Kiểm tra nhiệt độ động cơ','Ên-chin ôn-đô chê-khư-he'),
          D(74,'안전/기타','잠시 대기','','Tunggu sebentar (Standby)','Jam-si dae-gi','Chờ một lát','Cham-xi đê-gi')
        ]
      }), []);

      const currentData = learningData[activeTab] || [];

      // 상태 관리
      const [quizQuestions, setQuizQuestions] = useState([]);
      const [currentQuizIndex, setCurrentQuizIndex] = useState(0);
      const [quizScore, setQuizScore] = useState(0);
      const [quizState, setQuizState] = useState('idle');
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [incorrectAnswers, setIncorrectAnswers] = useState([]);

      // 네비게이션
      const goToLearn = () => { setCurrentView('learn'); setViewStep('dept_select'); };
      const goToQuiz = () => { setCurrentView('quiz'); setViewStep('dept_select'); };
      const handleDeptSelect = (tab) => {
        setActiveTab(tab);
        setViewStep('content');
        if (currentView === 'quiz') setQuizState('idle');
      };
      const handleBack = () => {
        if (currentView === 'home') {
          setCurrentView('lang_select'); // 홈에서 뒤로가기 누르면 언어 선택으로
        } else if (viewStep === 'content') {
          setViewStep('dept_select');
          if (currentView === 'quiz') setQuizState('idle');
        } else {
          setCurrentView('home');
        }
      };

      // 음성 재생
      const speakText = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'ko-KR';
          utterance.rate = 0.85;
          window.speechSynthesis.speak(utterance);
        } else {
          alert(`음성 기능을 지원하지 않는 브라우저입니다.`);
        }
      };

      const playAudio = (term) => {
        const audioRoot = new Audio(`./${term}.mp3`);
        audioRoot.play().catch(() => {
          const audioFolder = new Audio(`./audio/${term}.mp3`);
          audioFolder.play().catch(() => speakText(term));
        });
      };

      useEffect(() => {
        if (quizState === 'playing' && quizQuestions.length > 0 && selectedAnswer === null) {
          const timer = setTimeout(() => playAudio(quizQuestions[currentQuizIndex].term), 300);
          return () => clearTimeout(timer);
        }
      }, [currentQuizIndex, quizState, quizQuestions, selectedAnswer]);

      // 퀴즈 로직
      const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);

      const startQuiz = () => {
        if (currentData.length < 4) return alert("단어가 부족합니다 (최소 4개 필요)");
        const shuffledData = shuffleArray(currentData);
        const selectedQuestions = shuffledData.slice(0, 10).map(q => {
          let incorrectOptions = currentData.filter(item => item.id !== q.id);
          incorrectOptions = shuffleArray(incorrectOptions).slice(0, 3);
          return { ...q, options: shuffleArray([q, ...incorrectOptions]) };
        });

        setQuizQuestions(selectedQuestions);
        setCurrentQuizIndex(0);
        setQuizScore(0);
        setIncorrectAnswers([]);
        setQuizState('playing');
        setSelectedAnswer(null);
      };

      const handleAnswerSelect = (option) => {
        if (selectedAnswer) return;
        setSelectedAnswer(option);
       
        const currentQ = quizQuestions[currentQuizIndex];
        const isCorrect = option.id === currentQ.id;

        if (isCorrect) setQuizScore(prev => prev + 1);
        else setIncorrectAnswers(prev => [...prev, currentQ]);

        setTimeout(() => {
          if (currentQuizIndex < quizQuestions.length - 1) {
            setCurrentQuizIndex(prev => prev + 1);
            setSelectedAnswer(null);
          } else setQuizState('result');
        }, 1000); // 속도감 최적화
      };

      // --- 화면 렌더링 ---

      const renderLangSelect = () => (
        <div className="flex flex-col items-center justify-center h-full w-full max-w-[480px] mx-auto px-6 animate-fade-up">
          <div className="w-20 h-20 bg-white rounded-3xl shadow-sm border border-slate-200/60 flex items-center justify-center mb-6">
            <svg className="w-10 h-10 text-indigo-600" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/>
            </svg>
          </div>
          <h1 className="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight text-center leading-tight mb-2">
            삼호 Yard <span className="text-indigo-600">한국어 교육</span>
          </h1>
          <p className="text-slate-500 text-center text-[15px] font-medium mb-10">
            {uiText.id.selectLang}<br/>{uiText.id.selectLangSub} / {uiText.vi.selectLangSub}
          </p>

          <div className="w-full flex flex-col gap-4">
            <button
              onClick={() => { setLang('id'); setCurrentView('home'); }}
              className="active-scale bg-white border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50/50 rounded-[20px] p-5 flex items-center justify-between shadow-premium w-full transition-colors"
            >
              <div className="flex items-center gap-4">
                <span className="text-4xl leading-none">{uiText.id.flag}</span>
                <div className="text-left">
                  <h2 className="text-xl font-bold text-slate-800">{uiText.id.langName}</h2>
                  <p className="text-slate-500 text-sm">인도네시아어</p>
                </div>
              </div>
              <svg className="w-6 h-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg>
            </button>

            <button
              onClick={() => { setLang('vi'); setCurrentView('home'); }}
              className="active-scale bg-white border-2 border-slate-100 hover:border-teal-400 hover:bg-teal-50/50 rounded-[20px] p-5 flex items-center justify-between shadow-premium w-full transition-colors"
            >
              <div className="flex items-center gap-4">
                <span className="text-4xl leading-none">{uiText.vi.flag}</span>
                <div className="text-left">
                  <h2 className="text-xl font-bold text-slate-800">{uiText.vi.langName}</h2>
                  <p className="text-slate-500 text-sm">베트남어</p>
                </div>
              </div>
              <svg className="w-6 h-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg>
            </button>
          </div>
        </div>
      );
     
      const renderHome = () => (
        <div className="flex flex-col items-center justify-center h-full w-full max-w-[480px] mx-auto px-6">
          <div className="flex-1 w-full flex flex-col items-center justify-center animate-fade-up pb-10">
            <div className="w-16 h-16 bg-white rounded-2xl shadow-sm border border-slate-200/60 flex items-center justify-center mb-6">
              <svg className="w-8 h-8 text-indigo-600" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/>
              </svg>
            </div>
            <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight text-center leading-tight mb-3">
              삼호 Yard <span className="text-indigo-600">{t.titleStr}</span>
            </h1>
            <p className="text-slate-500 text-center text-[15px] font-medium break-words whitespace-normal px-2">
              {t.titleSub}
            </p>

            <div className="w-full flex flex-col gap-4 mt-12">
              <button onClick={goToLearn} className="active-scale bg-indigo-600 hover:bg-indigo-700 text-white rounded-[20px] p-5 flex items-center justify-between shadow-premium w-full transition-colors border border-indigo-500/20">
                <div className="text-left">
                  <h2 className="text-xl font-bold mb-0.5">{t.btnLearn}</h2>
                  <p className="text-indigo-200 text-sm">{t.btnLearnSub}</p>
                </div>
                <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                  <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253" /></svg>
                </div>
              </button>

              <button onClick={goToQuiz} className="active-scale bg-emerald-500 hover:bg-emerald-600 text-white rounded-[20px] p-5 flex items-center justify-between shadow-premium w-full transition-colors border border-emerald-400/20">
                <div className="text-left">
                  <h2 className="text-xl font-bold mb-0.5">{t.btnQuiz}</h2>
                  <p className="text-emerald-100 text-sm">{t.btnQuizSub}</p>
                </div>
                <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                  <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
              </button>
            </div>
          </div>
        </div>
      );

      const renderDeptSelect = () => {
        const isLearn = currentView === 'learn';
        const primaryText = isLearn ? 'text-indigo-600' : 'text-emerald-600';
        const bgIcon = isLearn ? 'bg-indigo-50 text-indigo-500' : 'bg-emerald-50 text-emerald-500';

        return (
          <div className="flex flex-col items-center flex-1 min-h-0 w-full px-4 pt-6 pb-12 overflow-y-auto custom-scrollbar animate-fade-in">
            <div className="max-w-[600px] w-full">
              <div className="mb-8 text-center md:text-left">

                <h2 className="text-[26px] font-extrabold text-slate-800 tracking-tight leading-tight whitespace-pre-line">

              <div className="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4">
                {tabs.map((tab) => (
                  <button
                    key={tab}
                    onClick={() => handleDeptSelect(tab)}
                    className="active-scale bg-white border border-slate-200/70 hover:border-slate-300 rounded-[20px] p-5 flex flex-col items-center justify-center text-center shadow-sm hover:shadow-premium transition-all"
                  >
                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center mb-3 ${bgIcon}`}>
                      <div className="w-6 h-6">{getDeptIcon(tab)}</div>
                    </div>
                    <span className="text-[15px] font-bold text-slate-700 tracking-tight">{tab}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      };

      const renderLearnContent = () => (
        <div className="flex flex-col h-full w-full max-w-3xl mx-auto px-0 md:px-6 pt-2 animate-fade-in">
          <TabSelector tabs={tabs} activeTab={activeTab} setActiveTab={setActiveTab} currentView={currentView} setQuizState={setQuizState} />

          <div className="flex-1 min-h-0 overflow-y-auto custom-scrollbar px-4 pb-12 space-y-3">
            {currentData.length > 0 ? (
              currentData.map((item) => (
                <div key={item.id} className="bg-white rounded-[20px] p-5 border border-slate-200/60 shadow-sm flex items-center justify-between gap-4">
                  <div className="flex-1 min-w-0">
                    <span className="text-[11px] font-bold text-indigo-500 bg-indigo-50/50 px-2 py-0.5 rounded-md mb-2 inline-block">
                      {item.category}
                    </span>
                    <h3 className="text-xl font-extrabold text-slate-900 tracking-tight leading-snug mb-1">{item.term}</h3>
                    {item.meaning && <p className="text-[13px] text-slate-500 mb-2">{item.meaning}</p>}
                   
                    <div className="mt-3 bg-slate-50/80 rounded-xl p-3 border border-slate-100/80">
                      <div className="flex items-start gap-2 mb-1.5">
                        <span className="text-sm mt-0.5">{t.flag}</span>
                        <p className="text-[15px] font-bold text-emerald-600 leading-snug break-words whitespace-normal">
                          {item[`${lang}T`]}
                        </p>
                      </div>
                      <div className="flex items-start gap-2">
                        <span className="text-sm mt-0.5">🗣️</span>
                        <p className="text-[13px] font-medium text-slate-400 italic break-words whitespace-normal">
                          {item[`${lang}P`]}
                        </p>
                      </div>
                    </div>
                  </div>
                 
                  <button
                    onClick={() => playAudio(item.term)}
                    className="active-scale w-12 h-12 rounded-full bg-slate-50 text-indigo-500 flex items-center justify-center hover:bg-indigo-50 hover:text-indigo-600 transition-colors shrink-0 self-end"
                  >
                    <svg className="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                  </button>
                </div>
              ))
            ) : (
              <div className="text-center py-20 text-slate-400 font-medium">{t.emptyData}</div>
            )}
          </div>
        </div>
      );

      const renderQuizContent = () => {
        let content;

        if (quizState === 'idle') {
          content = (
            <div className="flex flex-col items-center justify-center h-full text-center px-6 animate-fade-in max-w-[400px] mx-auto">
              <div className="w-20 h-20 bg-emerald-100 rounded-[20px] flex items-center justify-center text-emerald-500 mb-6 shadow-inner-premium animate-bounce-in">
                <div className="w-10 h-10">{getDeptIcon(activeTab)}</div>
              </div>
              <h2 className="text-[28px] font-extrabold text-slate-900 tracking-tight mb-2">
                {activeTab} <span className="text-emerald-600">{t.quizTitle.split(' ')[1]}</span>
              </h2>
              <p className="text-slate-500 text-sm mb-8">{t.quizSub}</p>

              <div className="bg-white rounded-3xl p-6 border border-slate-200/60 w-full mb-8 text-left shadow-sm">
                <ul className="space-y-4">
                  <li className="flex items-start gap-3">
                    <span className="text-emerald-500 mt-0.5">🎧</span>
                    <p className="text-slate-600 text-sm font-medium break-keep">{t.quizGuide1}</p>
                  </li>
                  <li className="flex items-start gap-3">
                    <span className="text-emerald-500 mt-0.5">⏱️</span>
                    <p className="text-slate-600 text-sm font-medium break-keep">{t.quizGuide2}</p>
                  </li>
                </ul>
              </div>

              <button onClick={startQuiz} className="active-scale w-full bg-emerald-500 hover:bg-emerald-600 text-white rounded-[20px] py-4 text-[17px] font-bold shadow-premium transition-colors">
                {t.quizStart} <span className="font-normal opacity-90 ml-1">{t.quizStartSub}</span>
              </button>
            </div>
          );
        } else if (quizState === 'playing' && quizQuestions.length > 0) {
          const currentQ = quizQuestions[currentQuizIndex];
         
          content = (
            <div className="flex flex-col h-full max-w-lg mx-auto w-full px-4 animate-fade-in">
              {/* Progress */}
              <div className="w-full bg-slate-200/50 rounded-full h-2 mt-2 mb-6">
                <div className="bg-emerald-500 h-2 rounded-full transition-all duration-500" style={{ width: `${(currentQuizIndex / 10) * 100}%` }}></div>
              </div>

              <div className="flex justify-between items-center mb-6 px-2">
                <span className="text-slate-500 font-bold text-sm md:text-base">{t.qNum} {currentQuizIndex + 1} / 10</span>
                <span className="text-slate-500 font-bold text-sm md:text-base">{t.score} <span className="text-emerald-500 ml-1 text-lg">{quizScore}</span></span>
              </div>

              {/* Question Card */}
              <div className="bg-white rounded-[24px] p-8 border border-slate-200/60 shadow-sm flex flex-col items-center text-center mb-6">
                <button
                  onClick={() => playAudio(currentQ.term)}
                  className="active-scale w-16 h-16 bg-slate-50 text-indigo-500 rounded-full flex items-center justify-center mb-5 hover:bg-indigo-50"
                >
                  <svg className="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <h3 className="text-2xl font-extrabold text-slate-900 tracking-tight break-keep leading-tight">{currentQ.term}</h3>
              </div>

              {/* Options */}
              <div className="flex-1 min-h-0 overflow-y-auto custom-scrollbar pb-6 space-y-3">
                {currentQ.options.map((option, index) => {
                  let btnStyle = "bg-white border-slate-200/80 text-slate-700 hover:border-emerald-400";
                 
                  if (selectedAnswer) {
                    if (option.id === currentQ.id) btnStyle = "bg-emerald-500 border-emerald-500 text-white shadow-md z-10 scale-[1.02] transition-transform";
                    else if (selectedAnswer.id === option.id) btnStyle = "bg-rose-500 border-rose-500 text-white";
                    else btnStyle = "bg-slate-50 border-slate-100 text-slate-300 opacity-50";
                  }

                  return (
                    <button
                      key={index}
                      onClick={() => handleAnswerSelect(option)}
                      disabled={selectedAnswer !== null}
                      className={`active-scale w-full text-left p-4 rounded-[20px] border-2 font-bold text-[15px] flex items-center ${btnStyle} ${!selectedAnswer ? 'hover:bg-slate-50' : ''}`}
                    >
                      <span className={`w-7 h-7 rounded-full flex items-center justify-center mr-3 shrink-0 text-xs ${selectedAnswer && option.id === currentQ.id ? 'bg-white/20' : 'bg-slate-100 text-slate-400'}`}>
                        {index + 1}
                      </span>
                      <span className="leading-snug break-words">{option[`${lang}T`]}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        } else if (quizState === 'result') {
          const isPerfect = quizScore === 10;
          content = (
            <div className="flex flex-col items-center justify-center h-full max-w-[400px] mx-auto px-6 text-center animate-fade-in pb-10">
              <div className={`w-24 h-24 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner-premium animate-bounce-in ${isPerfect ? 'bg-amber-100' : 'bg-emerald-100'}`}>
                {isPerfect ? '👑' : '👏'}
              </div>
              <h2 className={`text-[28px] font-extrabold tracking-tight mb-2 ${isPerfect ? 'text-amber-500' : 'text-slate-900'}`}>
                {isPerfect ? t.perfect : t.good}
              </h2>
              <p className="text-slate-500 text-sm mb-8">{isPerfect ? t.perfectSub : t.goodSub}</p>

              <div className="bg-white rounded-[24px] p-6 border border-slate-200/60 shadow-sm w-full my-8">
                <p className="text-sm text-slate-500 font-bold mb-1">{t.finalScore}</p>
                <div className="flex items-baseline justify-center gap-1">
                  <span className={`text-5xl font-black ${isPerfect ? 'text-amber-500' : 'text-emerald-500'}`}>{quizScore}</span>
                  <span className="text-xl text-slate-300 font-bold">/ 10</span>
                </div>
              </div>

              <div className="w-full space-y-3">
                {incorrectAnswers.length > 0 && (
                  <button onClick={() => setQuizState('review')} className="active-scale w-full py-4 bg-rose-50 text-rose-600 border border-rose-200 hover:bg-rose-100 font-bold text-[15px] rounded-[20px] flex items-center justify-center gap-2 transition-colors">
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253" /></svg>
                    {t.btnWrongNote}
                  </button>
                )}
                <div className="flex gap-3">
                  <button onClick={() => setCurrentView('home')} className="active-scale flex-1 py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-[15px] rounded-[20px] transition-colors">
                    {t.btnHome}
                  </button>
                  <button onClick={startQuiz} className="active-scale flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-[15px] rounded-[20px] shadow-premium transition-colors">
                    {t.btnRetry}
                  </button>
                </div>
              </div>
            </div>
          );
        } else if (quizState === 'review') {
          content = (
            <div className="flex flex-col h-full max-w-2xl mx-auto w-full animate-fade-in px-4">
              <div className="flex justify-between items-center py-4 shrink-0">
                <h2 className="text-xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2">
                  <span className="text-rose-500">💡</span> {t.wrongNoteTitle}
                </h2>
                <div className="bg-rose-100 text-rose-600 px-3 py-1 rounded-xl font-bold text-xs">
                  {incorrectAnswers.length}{t.wrongCount}
                </div>
              </div>

              <div className="flex-1 min-h-0 overflow-y-auto custom-scrollbar space-y-3 pb-6">
                {incorrectAnswers.map((item, idx) => (
                  <div key={idx} className="bg-white p-5 rounded-[20px] border border-slate-200/60 shadow-sm flex items-center justify-between gap-4">
                    <div className="flex-1 min-w-0">
                      <h3 className="text-lg font-extrabold text-slate-900 mb-1 truncate">{item.term}</h3>
                      <p className="text-sm font-bold text-emerald-600 break-words whitespace-normal">{item[`${lang}T`]}</p>
                    </div>
                    <button onClick={() => playAudio(item.term)} className="active-scale w-10 h-10 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-rose-500 hover:text-white transition-colors shrink-0">
                      <svg className="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                  </div>
                ))}
              </div>

              <div className="shrink-0 pt-4 pb-6 flex gap-3 bg-[var(--app-bg)]">
                <button onClick={() => setQuizState('result')} className="active-scale flex-1 py-4 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-[15px] rounded-[20px] transition-colors">
                  {t.btnResult}
                </button>
                <button onClick={startQuiz} className="active-scale flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-[15px] rounded-[20px] shadow-premium transition-colors">
                  {t.btnRetry}
                </button>
              </div>
            </div>
          );
        }

        return (
          <div className="flex flex-col h-full w-full max-w-3xl mx-auto px-0 md:px-6 pt-2">
            {quizState === 'idle' && <TabSelector tabs={tabs} activeTab={activeTab} setActiveTab={setActiveTab} currentView={currentView} setQuizState={setQuizState} />}
            <div className="flex-1 min-h-0 flex flex-col">
              {content}
            </div>
          </div>
        );
      };

      return (
        <div className="h-full w-full max-w-[800px] flex flex-col mx-auto overflow-hidden relative shadow-[0_0_40px_rgba(0,0,0,0.03)] bg-[var(--app-bg)]">
          {/* Header */}
          {currentView !== 'lang_select' && (
            <header className="w-full flex items-center px-4 py-3 shrink-0">
              <button onClick={handleBack} className="active-scale w-10 h-10 flex items-center justify-center text-slate-400 hover:text-slate-700">
                <svg className="w-6 h-6 pr-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7" /></svg>
              </button>
              <h1 className="flex-1 text-center text-[17px] font-extrabold text-slate-800 tracking-tight cursor-pointer" onClick={() => setCurrentView('home')}>
                삼호 Yard <span className="text-indigo-600">한국어</span>
              </h1>
              <div className="w-10"></div> {/* Spacer */}
            </header>
          )}

          {/* Main Content */}
          <main className="flex-1 min-h-0 w-full overflow-hidden flex flex-col">
            {currentView === 'lang_select' && renderLangSelect()}
            {currentView === 'home' && renderHome()}
            {currentView === 'learn' && viewStep === 'dept_select' && renderDeptSelect()}
            {currentView === 'learn' && viewStep === 'content' && renderLearnContent()}
            {currentView === 'quiz' && viewStep === 'dept_select' && renderDeptSelect()}
            {currentView === 'quiz' && viewStep === 'content' && renderQuizContent()}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
