ेशन हो।",

      "선박커미셔닝부|안전/기타|LOTO 실시해|점검 중 타인이 켜지 못하게 잠금 장치를 하세요|Terapkan prosedur Lock Out Tag Out (LOTO) untuk mengunci sumber daya selama perbaikan|Ro-to sil-si-hae|Thực hiện quy trình Khóa và Gắn thẻ (LOTO) cách ly nguồn năng lượng khi bảo trì|Ro-to sil-si-hae|परीक्षण गर्दा अरूले अन गर्न नसक्ने गरी लक गर्ने प्रक्रिया (LOTO) लागू गर्नुहोस्|Ro-to sil-si-hae|기계 설비를 정비하거나 배관을 점검하는 동안, 다른 작업자가 이를 모른 채 메인 차단기나 밸브를 조작하여 발생하는 감전 및 협착 등의 중대 재해를 원천 차단하기 위해, 스위치에 물리적인 자물쇠(Lock)를 걸고 '조작 금지' 경고 표지판(Tag)을 부착하는 국제 표준 안전 절차를 엄격히 준수하라는 명령입니다.|Perintah penegakan protokol keselamatan internasional (LOTO): ketika mekanik sedang masuk ke dalam mesin atau membongkar pipa, sangat fatal jika orang lain tak sengaja menghidupkan sakelar pemutus utama atau memutar katup fluida. Untuk memblokir kecelakaan sengatan listrik atau tergiling mesin, pasang gembok fisik (Lock Out) secara harfiah di tuas sakelar, lalu gantungkan papan label peringatan (Tag Out) bertuliskan 'Sedang Diperbaiki, Dilarang Menyalakan'. Aturan ini haram dilanggar.|Mệnh lệnh thi hành quy tắc an toàn quốc tế chuẩn mực (LOTO): trong lúc thợ đang rúc vào sửa chữa máy móc hoặc bảo trì đường ống, sẽ cực kỳ thảm họa nếu người khác không biết mà vô tình gạt cầu dao tổng hay mở van áp lực. Để triệt tiêu rủi ro giật điện hay máy nghiền nát người, bắt buộc phải dùng ổ khóa vật lý bấm khóa chặt (Lock Out) công tắc, đồng thời treo thẻ cảnh báo (Tag Out) ghi rõ 'Cấm thao tác, đang bảo trì' lủng lẳng ở đó. Đây là kỷ luật sắt.|मेसिन उपकरण मर्मत गर्दा वा पाइप जाँच्दा, अन्य कामदारले थाहा नपाई मुख्य ब्रेकर वा भल्भ चलाएर हुने करेन्ट लाग्ने र च्यापिने जस्ता गम्भीर दुर्घटना पूर्ण रूपमा रोक्नको लागि, स्विचमा भौतिक ताला (Lock) लगाएर 'चलाउन मनाही छ' भन्ने चेतावनी बोर्ड (Tag) टाँस्ने अन्तर्राष्ट्रिय मापदण्डको सुरक्षा प्रक्रिया कडा रूपमा पालना गर्ने आदेश हो।",

      "선박커미셔닝부|안전/기타|과부하 조심해|모터에 너무 무거운 힘이 걸리지 않게 하세요|Pantau arus motor agar tidak terjadi kondisi beban berlebih (Overload) yang merusak koil|Gwa-bu-hwa jo-sim-hae|Giám sát dòng điện mô tơ, tránh tình trạng quá tải (Overload) làm cháy cuộn dây|Gwa-bu-hwa jo-sim-hae|मोटरमा धेरै भारी बल पर्ने ओभरलोड (Overload) बाट बच्नुहोस्|Gwa-bu-hwa jo-sim-hae|시운전 시 배관 라인의 밸브가 잠겨 있거나 내부에 이물질이 막힌 닫힌 회로 상태에서 대용량 펌프 모터를 무리하게 가동하면, 정격 전류를 초과하는 과도한 부하가 걸려 모터 코일이 소손(타버림)되는 과부하(Overload) 현상이 발생하므로 전류계(Ammeter)의 수치를 주시하며 스위치를 조작하라는 기술적 경고입니다.|Peringatan teknis operasional: saat uji coba, jika operator memaksakan motor pompa kapasitas besar menyala dalam kondisi sirkuit buntu—seperti katup tertutup atau pipa tersumbat kotoran—motor akan bekerja terlalu keras melawan tekanan. Akibatnya, arus listrik akan melonjak melebihi batas nominal dan membakar gulungan koil motor (Overload). Operator diwajibkan memelototi meteran arus (Ammeter) saat memutar sakelar perlahan.|Cảnh báo kỹ thuật vận hành: trong lúc chạy thử, nếu cố tình khởi động mô tơ máy bơm công suất lớn trong tình trạng mạch bị bịt kín—như van ống chưa mở hoặc kẹt rác bên trong—mô tơ sẽ phải gồng mình chống lại áp lực. Lúc này, dòng điện sẽ vọt lên vượt mức định mức, nung chảy và làm cháy đen cuộn dây mô tơ (Overload). Yêu cầu kỹ thuật viên phải dán mắt vào đồng hồ đo dòng điện (Ammeter) khi thao tác nhấn nút.|परीक्षण उडान गर्दा पाइप लाइनको भल्भ बन्द भएको वा भित्र फोहोरले जाम भएको बन्द सर्किट अवस्थामा जबर्जस्ती ठूलो क्षमताको पम्प मोटर चलाउँदा, रेटेड करेन्टभन्दा बढी अत्यधिक भार परेर मोटरको कोइल डढ्ने ओभरलोड (Overload) घटना हुने भएकोले एमिटर (Ammeter) को मान हेर्दै स्विच चलाउने प्राविधिक चेतावनी हो।",

      "선박커미셔닝부|안전/기타|확인 점검 실시해|전원을 켜기 전에 모든 연결을 마지막으로 보세요|Lakukan pemeriksaan silang (cross-check) menyeluruh sebelum menyuplai tegangan tinggi|Hwa-gin jeom-geom sil-si-hae|Tiến hành kiểm tra rà soát tổng thể chéo trước khi cấp điện áp cao|Hwa-gin jeom-geom sil-si-hae|पावर अन गर्नु अघि सबै जडानहरूको अन्तिम क्रस जाँच (Cross-check) गर्नुहोस्|Hwa-gin jeom-geom sil-si-hae|새로 설치된 주요 기계 장비에 치명적인 고전압 전력(440V 이상)을 최초로 인가하기 직전, 케이블 상(Phase) 오결선, 볼트 조임 불량, 내부 공구 방치, 또는 오일 및 냉각수 누설 여부 등 시스템 전체의 파손이나 폭발을 유발할 수 있는 잠재적 위험 요소를 다중 교차 검증하여 완벽히 배제하라는 최종 안전 확인 절차입니다.|Prosedur validasi keamanan krusial: tepat beberapa menit sebelum menembakkan tegangan listrik tinggi (mis. 440V ke atas) untuk pertama kalinya ke mesin baru, staf harus melakukan verifikasi silang berganda. Periksa menyeluruh urutan fase kabel, kekencangan mur baut, pastikan tidak ada tang tertinggal di dalam panel, serta tidak ada tetesan pelumas atau pendingin. Tujuannya meredam semua potensi ancaman yang bisa memicu ledakan atau korsleting fatal.|Quy trình xác minh an toàn tối hậu: chỉ vài phút trước khi đóng cầu dao phóng dòng điện cao thế (từ 440V trở lên) lần đầu tiên vào thiết bị mới lắp, thợ phải thực hiện kiểm tra chéo nhiều lớp. Rà soát xem có đấu sai pha cáp, bu lông lỏng, quên mỏ lết trong tủ điện, hay rò rỉ dầu nhớt nước làm mát không. Hành động này nhằm dập tắt triệt để mọi quả bom nổ chậm có khả năng gây chập cháy nát bét toàn bộ hệ thống.|नयाँ जडान गरिएको मुख्य मेसिन उपकरणमा पहिलो पटक घातक उच्च भोल्टेज पावर (४४०V भन्दा माथि) पठाउनु ठीक अघि, केबलको फेज (Phase) गलत जडान, बोल्ट नकसिएको, भित्र औजार छुटेको, वा तेल र कुलिङ वाटर चुहिएको जस्ता प्रणालीलाई क्षति वा विष्फोट गराउन सक्ने सम्भावित जोखिम तत्त्वहरूलाई बहु क्रस-जाँच गरी पूर्ण रूपमा हटाउने अन्तिम सुरक्षा पुष्टि प्रक्रिया हो।",

      "선박커미셔닝부|안전/기타|오늘 할 일 확인해|아침 조회 때 전달받은 작업 범위를 파악하세요|Klarifikasi ruang lingkup kerja harian (Job Scope) saat pengarahan pagi|O-neul hal il hwa-gin-hae|Nắm rõ phạm vi công việc (Job Scope) trong ngày được giao lúc họp sáng|O-neul hal il hwa-gin-hae|बिहानी सभामा दिइएको आजको कामको दायरा (Job Scope) स्पष्ट रूपमा बुझ्नुहोस्|O-neul hal il hwa-gin-hae|수천 개의 기기가 동시다발적으로 구동되는 선박 시운전 공정은 타 부서(배관, 전장, 도장 등)와의 작업 간섭 및 충돌 위험이 매우 높으므로, 매일 아침 실시하는 안전 미팅(TBM)에서 팀장이 배정한 본인의 당일 테스트 구역, 목표 진행률, 그리고 동시 작업 금지 구역을 명확히 숙지하여 안전 사고를 예방하라는 업무 조율 지시입니다.|Instruksi manajemen konflik lapangan: proses komisioning kapal melibatkan ribuan mesin yang menyala serentak, membuat risiko bentrok dengan tim lain (pipa, listrik, cat) melonjak tajam. Oleh karena itu, saat rapat pagi (TBM), pekerja wajib mencatat dan mencamkan dalam otak area tes jatahnya hari itu, target progres, serta zona mana yang dilarang dimasuki karena sedang dipakai tim lain, demi menghindari kecelakaan kerja fatal silang departemen.|Chỉ thị điều phối chống giẫm chân nhau: giai đoạn chạy thử tàu chứng kiến hàng ngàn máy móc gầm rú cùng lúc, rủi ro va chạm đụng độ với tổ khác (ống, điện, sơn) là cực kỳ báo động. Thế nên tại buổi họp giao ban sáng (TBM), thợ phải khắc cốt ghi tâm khu vực được tổ trưởng khoanh vùng cho mình test, tiến độ phải đạt, và danh sách các cấm địa không được bén mảng do tổ khác đang thi công, cốt để bảo toàn mạng sống và giữ nhịp công việc.|हजारौं मेसिनहरू एकैपटक चल्ने जहाज कमिसनिङ (परीक्षण) प्रक्रियामा अन्य विभाग (पाइप, बिजुली, पेन्टिङ आदि) सँग काम जुध्ने र ठक्कर खाने जोखिम धेरै उच्च हुने भएकोले, हरेक बिहान गरिने सुरक्षा बैठक (TBM) मा टिम लिडरले तोकेको आफ्नो आजको टेस्ट क्षेत्र, लक्ष्य प्रगति, र एकैपटक काम गर्न निषेध गरिएको क्षेत्रलाई स्पष्ट रूपमा बुझेर सुरक्षा दुर्घटना रोक्ने काम समन्वय निर्देशन हो।",

      "선박커미셔닝부|안전/기타|데이터 저장해|시스템에 입력한 세팅 값을 반드시 저장하세요|Simpan (Save) permanen nilai parameter sistem di memori kontroler|De-i-teo jeo-jang-hae|Lưu (Save) vĩnh viễn các giá trị cài đặt thông số vào bộ nhớ hệ thống|De-i-teo jeo-jang-hae|कम्प्युटर प्रणालीमा इनपुट गरिएको सेटिङ मानहरूलाई अनिवार्य रूप에 स्थायी रूपमा सेभ (Save) गर्नुहोस्|De-i-teo jeo-jang-hae|시운전 및 로직 테스트 중 기기의 최적 상태를 유지하기 위해 제어반 컴퓨터(PLC 또는 HMI)에 힘들게 조율하여 입력해둔 중요 소프트웨어 파라미터 값(알람 한계치, 모터 회전 RPM, 딜레이 타임 등)들이 전원 차단이나 시스템 재부팅 시 초기화되어 날아가지 않도록, 세팅 직후 메모리에 영구 저장(Save/Backup) 절차를 완료하라는 소프트웨어 관리 지시입니다.|Instruksi pengamanan data digital: selama uji coba, teknisi menyetel susah payah angka parameter krusial di layar komputer kontrol (PLC/HMI)—seperti batas suhu alarm, RPM putaran motor, atau waktu tunda (delay). Agar angka-angka emas hasil kalibrasi ini tidak menguap lenyap ter-reset jadi nol gara-gara listrik tiba-tiba mati atau komputer restart, teknisi diwajibkan mengklik tombol simpan permanen (Save/Backup) ke memori (EEPROM) detik itu juga sesudah penyetelan beres.|Chỉ thị bảo vệ chất xám phần mềm: trong lúc chạy thử, kỹ sư phải vã mồ hôi hột mới tinh chỉnh chốt hạ được các thông số phần mềm nhạy cảm trên màn hình điều khiển (PLC/HMI)—như ngưỡng báo động đỏ, vòng tua RPM mô tơ, hay độ trễ thời gian. Để phòng hờ đống data vàng ngọc này bốc hơi trắng án, bị reset sạch sành sanh khi cúp điện hay khởi động lại máy, bắt buộc phải thực hiện thao tác lưu vĩnh viễn (Save/Backup) chép đè vào bộ nhớ cứng ngay lập tức sau khi gõ phím xong.|परीक्षण उडान र लजिक टेस्टको क्रममा उपकरणको उत्तम अवस्था कायम राख्न कन्ट्रोल प्यानल कम्प्युटर (PLC वा HMI) मा मेहेनत गरेर मिलाएर इनपुट गरिएका महत्त्वपूर्ण सफ्टवेयर प्यारामिटर मानहरू (अलार्म सीमा, मोटर घुम्ने RPM, ढिलाइ समय आदि) पावर अफ हुँदा वा प्रणाली रिबुट हुँदा रिसेट भएर नउडुन् भनेर, सेटिङ गरेलगत्तै मेमोरीमा स्थायी रूपमा सेभ (Save/Backup) प्रक्रिया पूरा गर्ने सफ्टवेयर व्यवस्थापन निर्देशन हो।",

      "선박커미셔닝부|안전/기타|비상등 켜지나 봐|정전 시 천장의 비상 조명이 들어오는지 보세요|Verifikasi fungsi lampu darurat (emergency light) saat simulasi mati listrik (blackout)|Bi-sang-deung kyeo-ji-na bwa|Xác minh tính năng tự động bật sáng của đèn khẩn cấp (emergency light) khi mất điện|Bi-sang-deung kyeo-ji-na bwa|विद्युत कटौती (Blackout) सिमुलेशन गर्दा इमर्जेन्सी बत्ती (Emergency Light) बल्छ कि जाँच्नुहोस्|Bi-sang-deung kyeo-ji-na bwa|선박의 주 전력이 상실되는 블랙아웃 테스트 상황에서, 암흑으로 변한 엔진룸 계단, 선원 대피 복도, 그리고 통제실 천장에 설치된 24V 배터리 기반의 비상 조명등(Emergency Light)이 시스템 감지에 의해 설정된 시간 내에 자동으로 점등되어 탈출 시야를 확보해 주는지 육안으로 꼼꼼히 확인하라는 인명 구조 설비 검수 지시입니다.|Instruksi inspeksi peralatan keselamatan jiwa laut: saat simulasi blackout (padam total) di mana daya utama kapal sengaja dimatikan, ruangan akan menjadi gulita. Pekerja ditugaskan untuk berdiri di titik-titik buta seperti tangga ruang mesin, lorong evakuasi, dan atap ruang kontrol, lalu menatap tajam ke plafon. Verifikasi apakah lampu darurat (Emergency Light) bertenaga aki 24V otomatis menyala klik dalam hitungan detik untuk menerangi rute pelarian awak kapal, sesuai standar keselamatan maritim.|Chỉ thị nghiệm thu thiết bị cứu sinh hàng hải: trong bài test blackout (cúp điện toàn diện) khi điện chính của tàu bị sập cầu dao, bóng tối sẽ bao trùm. Nhiệm vụ của thợ là cắm chốt ở các điểm mù như cầu thang hầm máy, hành lang thoát hiểm và trần phòng điều khiển. Căng mắt quan sát xem hệ thống đèn khẩn cấp (Emergency Light) chạy bằng ắc quy 24V có tự động bật sáng choang trong chớp mắt nhờ cảm biến để rọi đường chạy trốn cho thủy thủ đoàn hay không.|जहाजको मुख्य बिजुली गुम्ने ब्ल्याकआउट टेस्ट अवस्थामा, अँध्यारो भएको इन्जिन रुमको भर्याङ, चालक दल भाग्ने गल्ली, र कन्트롤 रुमको छतमा जडान गरिएको २४V ब्याट्रीमा आधारित आपतकालीन बत्ती (Emergency Light) प्रणालीको सेन्सरद्वारा तोकिएको समयभित्र आफैं बलेर भाग्ने बाटो देखाउँछ कि देखाउँदैन भनेर आँखाले होसियारीपूर्वक जाँच्ने जीवन बचाउने उपकरण परीक्षण निर्देशन हो।",

      "선박커미셔닝부|안전/기타|에어 가득 채워|압축 공기 탱크를 시동 가능 압력까지 채우세요|Isi reservoir udara tekan (air receiver) hingga mencapai tekanan standar operasional mesin|E-eo ga-deuk chae-wo|Bơm nén khí vào bồn chứa (air receiver) cho đến khi đạt áp suất chuẩn để khởi động máy|E-eo ga-deuk chae-wo|इन्जिन सुरु गर्न मिल्ने प्रेसरसम्म एयर रिसिभर (Air Receiver) मा कम्प्रेस्ड हावा भर्नुहोस्|E-eo ga-deuk chae-wo|대형 선박의 메인 엔진과 주요 발전기는 전기 모터가 아닌 수십 Bar의 강력한 고압 압축 공기(Starting Air)를 실린더 내부에 직접 쏴서 그 팽창력으로 피스톤을 밀어내어 초기 시동을 거는 방식을 사용하므로, 시운전을 개시하기 전에 주 공기 압축기(Main Air Compressor)를 가동하여 거대한 에어 탱크(Air Receiver)의 내부 압력을 시동 가능 기준 수치까지 100% 충전해 두라는 핵심 사전 준비 명령입니다.|Perintah fondasi sebelum menyalakan kapal: Mesin induk raksasa dan generator kapal tidak di-starter pakai dinamo aki listrik kecil, melainkan memakai tembakan badai udara bertekanan puluhan Bar (Starting Air) langsung ke dalam silinder untuk menendang piston bergerak. Oleh sebab itu, sebelum jari menekan tombol start engine, kompresor udara utama (Main Air Compressor) harus dinyalakan duluan untuk memompa ngisi penuh tabung reservoir udara raksasa (Air Receiver) sampai jarum penunjuk tekanan mencapai angka standar operasional mentok 100%.|Mệnh lệnh tối thượng tiền khởi động: Động cơ chính khổng lồ và máy phát điện của tàu biển không đề nổ bằng củ đề ắc quy điện tèo teo, mà xài phương pháp nã đại bác luồng khí nén cao áp hàng chục Bar (Starting Air) tống thẳng vào xi lanh để hất văng piston tạo đà quay. Vì lẽ đó, trước khi gõ phím khởi động máy, bắt buộc phải bật máy nén khí tổng (Main Air Compressor) cày ải bơm nhồi căng phồng cái bồn chứa khí vĩ đại (Air Receiver) cho đến khi kim đồng hồ áp suất vọt lên chạm nóc vạch tiêu chuẩn 100% mới được phép hành sự.|ठूला जहाजको मुख्य इन्जिन र मुख्य जेनेरेटर इलेक्ट्रिक मोटरले नभई दर्जनौं बार (Bar) को शक्तिशाली उच्च दबावको कम्प्रेस्ड हावा (Starting Air) सिलिन्डर भित्र सिधै फालेर त्यसको फैलिने बलले पिस्टनलाई धकेलेर सुरु (Start) गर्ने तरिका प्रयोग गर्ने भएकोले, परीक्षण उडान सुरु गर्नु अघि मुख्य एयर कम्प्रेसर (Main Air Compressor) चलाएर विशाल एयर ट्याङ्की (Air Receiver) को भित्री प्रेसरलाई स्टार्ट गर्न मिल्ने मापदण्डसम्म १००% भर्ने मुख्य पूर्व-तयारी आदेश हो।",

g đoạn thi công xưởng đóng tàu.|सबै उपकरणको ट्युनिङ, परीक्षण उडान, र जहाज मालिक तर्फको सुपरभाइजरको अन्तिम कार्यक्षमता परीक्षण (Official Sea Trial & Inspection) सफलतापूर्वक सकिएपछि, जहाजलाई मालिकलाई आधिकारिक रूपमा हस्तान्तरण (Delivery) गर्नु अघि उपकरण परीक्षण गर्दा भुइँ वा पाइपको सतहमा चुहिएको लुब्रिकेन्ट, हाइड्रोलिक तेलको थोपा, केबल टाइको टुक्रा, र इन्सुलेसन टेपका टुक्राहरूलाई सुतीको कपडा र डिक्रिजर प्रयोग गरी नयाँ जहाजको पूर्ण अवस्था जस्तै सफासँग पुछेर प्रक्रियाको अन्त्य गर्ने अन्तिम वातावरण मर्मत निर्देशन हो।",

      "선박커미셔닝부|안전/기타|야간 작업 주의해|어두운 곳에서 전선을 밟거나 넘어지지 마세요|Patuhi protokol keamanan ekstra untuk pekerjaan malam hari dengan pencahayaan minim|Ya-gan ja-geop ju-ui-hae|Tuân thủ nghiêm ngặt quy tắc an toàn tăng cường khi làm việc vào ban đêm thiếu ánh sáng|Ya-gan ja-geop ju-ui-hae|बत्ती कम भएको रात्रिकालीन काम गर्दा विशेष सुरक्षा नियम पालना गर्नुहोस्|Ya-gan ja-geop ju-ui-hae|정규 작업 시간이 지나 조명이 부족한 야간이나 심야 시간에 부득이하게 시운전이나 계측 작업을 연장 진행할 경우, 작업자의 시야가 극도로 제한되므로 바닥에 임시로 가설된 굵은 전력 케이블을 밟고 미끄러지거나, 설치 중인 돌출 배관에 걸려 크게 넘어지는 전도 및 추락 사고가 빈번하게 발생합니다. 이를 예방하기 위해 개인용 방폭 손전등을 반드시 지참하고, 이동 시 바닥을 철저히 확인하며 규정된 안전 통로로만 서행 보행하라는 야간 특별 안전 보건 수칙입니다.|Protokol keselamatan tingkat dewa untuk shift kalong: Kalau terpaksa lembur nerusin uji coba komisioning atau kalibrasi meteran sampai larut malam saat lampu penerangan utama mati atau remang-remang, jarak pandang mata manusia bakal drop drastis. Di saat buta begini, risiko kecelakaan meroket tajam—seperti terpeleset nginjak ular kabel listrik tegangan tinggi yang melintang sementara di lantai, atau tersandung moncong pipa besi yang baru setengah dipasang lalu nyungsep jatuh dari perancah. Buat nangkis malaikat maut, aturannya harga mati: tiap kuli wajib nenteng senter tahan ledakan (explosion-proof flashlight) pribadi, pelototi aspal lantai tiap mau melangkah, dan jalan pelan-pelan cuma di jalur hijau evakuasi resmi. Ini bukan imbauan, ini surat perintah bertahan hidup malam hari.|Quy tắc sinh tồn tối thượng cho ca đêm cày cuốc: Hễ mà phải cắn răng ở lại tăng ca chạy thử máy hay đo đạc thông số vào tối mịt sương mù khi đèn đóm lờ mờ leo lét, tầm nhìn của đôi mắt sẽ bị bóp nghẹt nghiêm trọng. Giữa chốn tranh tối tranh sáng ấy, thảm họa chực chờ giáng xuống—kiểu như đạp nhầm phải con trăn cáp điện to đùng rải tạm dưới đất rồi trượt chân sấp mặt, hay vấp vấp phải cái sừng cùi chỏ ống tuýp nhô lên làm lộn cổ ngã nhào xuống giếng sâu. Để bảo toàn mạng sống, luật thép ban ra: mỗi cá nhân bắt buộc lận lưng đèn pin chống cháy nổ (explosion-proof flashlight), rọi đèn dán mắt xuống mặt sàn trước khi nhấc gót, và chỉ được phép cuốc bộ rón rén chậm rãi trên đúng làn đường an toàn vạch sẵn. Đây là quân luật bảo vệ tính mạng ca đêm.|नियमित कामको समय बितेर बत्ती कम भएको राति वा मध्यरातमा बाध्य भएर परीक्षण उडान वा नाप्ने काम लम्ब्याउँदा, कामदारको हेर्ने क्षमता अत्यन्तै सीमित हुने भएकोले भुइँमा अस्थायी रूपमा बिछ्याइएको बाक्लो पावर केबल कुल्चिएर चिप्लिने, वा जडान भइरहेको बाहिर निस्केको पाइपमा अल्झिएर नराम्रोसँग लड्ने र खस्ने दुर्घटना बारम्बार हुन्छ। यसलाई रोक्नको लागि व्यक्तिगत विष्फोट-प्रमाण टर्चलाइट अनिवार्य रूपमा बोक्ने, हिंड्दा भुइँलाई कडा रूपमा हेर्ने र तोकिएको सुरक्षा बाटोमा मात्र बिस्तारै हिंड्ने रात्रिकालीन विशेष सुरक्षा र स्वास्थ्य नियम हो。",

      "선박커미셔닝부|안전/기타|구명 조끼 위치 봐|비상 탈출 시 사용할 구명조끼를 미리 확인하세요|Identifikasi lokasi penyimpanan jaket pelampung (life jacket) untuk persiapan evakuasi darurat|Gu-myeong jo-kki wi-chi bwa|Xác định trước vị trí cất giữ áo phao cứu sinh (life jacket) để chuẩn bị sơ tán khẩn cấp|Gu-myeong jo-kki wi-chi bwa|आपतकालीन अवस्थामा प्रयोग गर्न लाइफ ज्याकेट (Life Jacket) राखिएको स्थान पहिले नै हेर्नुहोस्|Gu-myeong jo-kki wi-chi bwa|조선소 안벽을 떠나 실제 먼 바다로 항해하며 선박의 최대 성능을 끌어내는 가장 위험한 테스트인 해상 시운전(Official Sea Trial)에 탑승하는 모든 작업자 및 엔지니어들에게 하달되는 0순위 생존 지침입니다. 항해 중 발생할 수 있는 원인 미상의 화재나 엔진 폭발로 인한 심각한 침수 시 퇴선(Abandon Ship) 명령이 떨어지면 즉각적으로 착용하고 바다로 탈출해야 하므로, 배에 승선하자마자 자신의 임시 숙소 캐비닛이나 작업 구역 인근 복도 보관함에 비치된 규격 구명동의(Life Jacket)의 위치와 착용법을 눈으로 직접 파악해 두라는 의미입니다.|Doktrin pertahanan nyawa level tertinggi bagi seluruh kru: Uji Coba Laut Resmi (Official Sea Trial) adalah momen menggeber kapal hingga batas maksimal kemampuannya di lautan lepas jauh dari daratan, yang notabene adalah ujian paling berisiko tinggi. Saat ikut berlayar, ada kemungkinan skenario terburuk terjadi, seperti kebakaran misterius atau ledakan ruang mesin yang berujung kebocoran lambung dan kapal tenggelam. Jika kapten menekan tombol sirine darurat dan berteriak 'Tinggalkan Kapal!' (Abandon Ship), waktu untuk berpikir sudah habis. Anda harus secepat kilat memakai pelampung dan terjun ke samudra. Oleh karena itu, detik pertama menginjakkan kaki di dek kapal, tugas paling utama dan tidak boleh ditawar adalah mencari tahu dengan mata kepala sendiri di mana letak lemari penyimpanan Jaket Pelampung standar (Life Jacket) di kamar tidur sementara atau lorong terdekat, serta paham betul cara mengikatnya di badan.|Sắc lệnh bảo toàn sinh mạng ưu tiên số 0 dành cho mọi hành khách: Chạy thử máy trên biển (Official Sea Trial) là vòng sát hạch khốc liệt nhất, ép con tàu phô diễn toàn bộ nội công sức mạnh giữa đại dương bao la cách xa bờ bến. Đây là chuyến đi đối mặt với vô vàn biến số tử thần. Rủi mà có hỏa hoạn ma xui quỷ khiến hay nổ tung buồng máy gây thủng vỏ tàu nước tràn vào ồ ạt. Một khi thuyền trưởng hú còi báo động vang lên khẩu lệnh 'Bỏ Tàu!' (Abandon Ship), mạng sống chỉ còn tính bằng giây. Bạn phải vớ ngay lấy áo phao mặc vào và nhảy ùm xuống biển sâu thoát thân. Chính vì sinh mệnh mỏng manh như ngàn cân treo sợi tóc, ngay cái tích tắc vừa xách vali bước lên boong tàu, bổn phận tối thượng tiên quyết là phải tự mình rảo bước đi ngó nghiêng, vạch lá tìm sâu xem cái Áo phao cứu sinh (Life Jacket) đúng chuẩn nó đang nằm ỉ ôi ở xó tủ nào trong phòng ngủ tạm hay tủ kính dọc hành lang gần nơi mình cày cuốc nhất, và phải luyện trước cách tròng nó vào cổ sao cho chuẩn bài.|शिपयार्डको बन्दरगाह छोडेर वास्तविक टाढाको समुद्रमा यात्रा गर्दै जहाजको अधिकतम कार्यक्षमता निकाल्ने सबैभन्दा खतरनाक परीक्षण समुद्री परीक्षण (Official Sea Trial) मा चढ्ने सबै कामदार र इन्जिनियरहरूलाई दिइने ० प्राथमिकताको बाँच्ने निर्देशन हो। यात्राको क्रममा हुन सक्ने अज्ञात कारणको आगलागी वा इन्जिन विष्फोटले गर्दा गम्भीर रूपमा पानी पसेर जहाज छोड्ने (Abandon Ship) आदेश आएमा तुरुन्तै लगाएर समुद्रमा भाग्नुपर्ने भएकोले, जहाजमा चढ्ने बित्तिकै आफ्नो अस्थायी कोठाको क्याबिनेट वा काम गर्ने क्षेत्र नजिकैको गल्लीको बाकसमा राखिएको मापदण्ड अनुसारको लाइफ ज्याकेट (Life Jacket) को स्थान र लगाउने तरिका आँखाले आफैं हेरेर बुझ्ने अर्थ हो。",

      "선박커미셔닝부|안전/기타|필요한 서류 챙겨|검사에 필요한 도면과 결과서를 지참하세요|Bawa dokumen pendukung teknis dan formulir inspeksi resmi (Test Record)|Pi-ryo-han seo-ryu chaeng-gyeo|Mang theo đầy đủ tài liệu kỹ thuật và biểu mẫu kiểm tra nghiệm thu (Test Record)|Pi-ryo-han seo-ryu chaeng-gyeo|परीक्षणको लागि आवश्यक प्राविधिक कागजात र निरीक्षण फारम (Test Record) लिनुहोस्|Pi-ryo-han seo-ryu chaeng-gyeo|선박의 품질을 평가하고 보증하는 선주(Owner)나 선급 협회(Class) 소속의 깐깐한 검사관과 함께 광활한 배 안을 돌아다니며 기기 시운전을 시연하고 승인(Sign)을 받아내는 중대한 일정을 수행할 때, 현장에 빈손으로 가지 말라는 철저한 행정 지시입니다. 해당 기기의 최신 회로 도면, 배관 계통도(P&ID), 파라미터 세팅 기준표, 공장 출고 전 테스트 데이터, 그리고 가장 중요한 빈칸의 공식 '시운전 합격 성적서(Test Record)' 양식이 철해진 결재판(클립보드)을 사무실 컴퓨터에서 빠짐없이 출력 및 지참하여, 검사관의 기술적 질문에 즉각적으로 데이터로 답변하고 현장에서 바로 승인 서명을 받아낼 수 있도록 완벽히 무장하라는 의미입니다.|Instruksi persiapan amunisi birokrasi lapangan: Saat tiba jadwal krusial untuk inspeksi keliling kapal bersama inspektur ketat dari perwakilan Pemilik Kapal (Owner) atau Biro Klasifikasi (Class) guna memamerkan demo mesin dan merengek minta tanda tangan kelulusan (Sign-off), dilarang keras datang melenggang dengan tangan kosong layaknya turis. Ini adalah komando administratif tingkat tinggi untuk mempersenjatai diri. Teknisi wajib mem-print dan mengapit papan jalan (clipboard) tebal berisi tumpukan dokumen rahasia dari kantor. Isinya harus komplit: cetak biru sirkuit kelistrikan terbaru, diagram perpipaan (P&ID), tabel standar kalibrasi parameter, data riwayat uji pabrik (FAT), dan yang paling sakral, lembaran kosong formulir 'Laporan Hasil Uji' (Test Record) berlogo resmi galangan. Bawa bekal kertas-kertas ajaib ini sebagai perisai untuk menangkis dan menjawab dengan angka pasti setiap interogasi teknis dari sang inspektur cerewet, lalu todongkan pulpen untuk mengeksekusi tanda tangan pengesahan di lokasi detik itu juga.|Chỉ thị trang bị vũ khí hành chính trước giờ G: Khi bước vào trận chiến quyết định - bám đuôi tháp tùng các ngài thanh tra hắc ám đến từ đại diện Chủ tàu (Owner) hoặc Cơ quan Đăng kiểm (Class) đi dạo quanh lòng mề con       "선실생산부|가구/설치|서랍 열어봐|서랍이 걸리는 데 없이 부드럽게 열리는지 보세요|Buka laci untuk memeriksa apakah meluncur mulus tanpa macet|Seo-rap yeo-reo-bwa|Hãy kéo thử ngăn kéo xem có mở êm ái không bị kẹt không|Seo-rap yeo-reo-bwa|घर्रा कतै नअड्किई नरम रूपमा खुल्छ कि भनेर खोलेर हेर्नुहोस्|Seo-rap yeo-reo-bwa|옷장이나 책상을 조립한 후, 서랍장의 레일이 휘어졌거나 조립 유격이 안 맞아서 삐걱거리며 뻑뻑하게 열리지 않는지 작업자가 직접 열고 닫으며 기능 결함을 최종 점검하라는 의미입니다.|Artinya setelah merakit meja atau lemari, pekerja harus melakukan inspeksi fungsional akhir dengan membuka-tutup laci langsung untuk memastikan rel tidak bengkok dan laci tidak macet berderit akibat salah jarak rakitan.|Nghĩa là sau khi ráp bàn hoặc tủ quần áo, người thợ phải tự tay đóng mở để kiểm tra chức năng cuối cùng xem ray trượt ngăn kéo có bị cong vênh hay khe hở lắp ráp không chuẩn khiến nó bị kẹt rít, kêu cọt kẹt hay không.|दराज वा टेबल जोडेपछि, घर्राको रेल बाङ्गिएको वा जोड्ने ग्याप नमिल्दा घ्यार-घ्यार आवाज आउँदै कडा रूपमा खुल्छ कि खुल्दैन भनेर कामदारले आफैंले खोलेर र बन्द गरेर कार्यगत खराबीको अन्तिम जाँच गर्ने अर्थ हो।",

      "선실생산부|생활/규정|선실 화기 금지해|선실은 가연물이 많으니 불꽃 작업을 하지 마세요|Dilarang kerja api di kabin karena banyak material mudah terbakar|Seon-sil hwa-gi geum-ji-hae|Cấm hàn cắt bằng lửa trong cabin do có nhiều vật liệu dễ bắt lửa|Seon-sil hwa-gi geum-ji-hae|क्याबिनमा प्रज्वलनशील पदार्थ धेरै भएकोले आगोको काम (वेल्डिङ) नगर्नुहोस्|Seon-sil hwa-gi geum-ji-hae|침대 매트리스, 목재 가구, 카펫, 보온재 등 불똥이 한 방울이라도 떨어지면 걷잡을 수 없이 맹렬하게 타오르는 가연성 물질이 빼곡히 들어찬 선실 내부에서는 어떠한 상황에서도 산소 절단이나 아크 용접 같은 화기(불꽃) 작업을 절대 엄금한다는 가장 치명적이고 무서운 화재 예방 최고 수칙입니다.|Protap larangan anti-kiamat api nomor 1 (Zero Tolerance): perut ruang kabin itu udah disulap jadi gudang kayu mebel, kasur busa springbed empuk, karpet bulu, insulasi gabus styrofoam. Jatuh netes rintik setetes percikan bunga api las aja, langsung auto nyamber beringas kobaran kiamat neraka bocor gak bisa dipadamin. Makanya di dalem sini haram mutlak dilarang nyalain obor potong gas oksigen atawa nyolder las busur listrik (pekerjaan hot work). Aturan tertinggi dewa pencegah kapal gosong jadi arang.|Lệnh cấm kỵ tối thượng phòng chống hỏa hoạn tử thần (Không có ngoại lệ): Lòng mề cabin lúc này đã lấp đầy nhồi nhét đặc nghẹt đệm mút giường nệm, đồ mộc nội thất, thảm len, xốp bọt biển cách nhiệt. Rớt rụng nổ lép bép lọt lưới một giọt tàn lửa xỉ hàn mọn thôi là đủ mồi bén bốc hỏa bùng cháy rừng rực phừng phực ngoài tầm kiểm soát cháy thành tro. Cho nên dù viện cớ gì cũng cấm tiệt tiệt nọc cấm mang súng khò cắt gas hay máy hàn hồ quang chớp giật (công việc sinh lửa) vào thi công. Nội quy đanh thép nhất để cứu tàu khỏi làm mồi cho bà hỏa.|ओछ्यानको म्याट्रेस, काठका फर्निचर, कार्पेट, इन्सुलेसन जस्ता आगोको झिल्का एक थोपा मात्र खसे पनि नियन्त्रण गर्न नसकिने गरी भयानक रूपमा बल्ने प्रज्वलनशील पदार्थहरू खचाखच भरिएको क्याबिनभित्र कुनै पनि अवस्थामा अक्सिजन कटर वा आर्क वेल्डिङ जस्ता आगोको (झिल्का) काम गर्न पूर्ण रूपमा कडा निषेध गरिएको सबैभन्दा ज्यानमारा र डरलाग्दो आगलागी रोकथामको सर्वोच्च नियम हो।",

      "선실생산부|생활/규정|깨끗한 신발 신어|실내 전용 안전화나 덧신을 착용하세요|Gunakan sepatu safety khusus dalam ruangan atau pelapis sepatu pelindung|Kke-kkeut-han sin-bal si-neo|Đeo giày an toàn chuyên dùng trong nhà hoặc bọc bọc giày nilon|Kke-kkeut-han sin-bal si-neo|भित्र मात्र लगाइने सुरक्षा जुत्ता वा जुत्ताको कभर लगाउनुहोस्|Kke-kkeut-han sin-bal si-neo|기름때와 그라인더 철가루가 가득한 밖에서 신던 더러운 작업화를 신고 갓 인테리어를 마친 청결한 선실로 들어가면 바닥이 검게 물들어 버립니다. 이를 막기 위해 선실 내부 출입 전용으로 먼지가 안 나는 깨끗한 새 안전화로 갈아 신거나, 신발 위에 파란 비닐 덧신(쇼커버)을 두 겹으로 씌우고 입장하라는 엄격한 현장 위생 룰입니다.|Aturan higienitas elit area steril: Kalau sepatu boot safety butut bapak abis dipakai nginjek ngubek ubek lumpur oli campur debu tahi gerinda di luar sana nekat dipakai nyelonong masuk kabin yang baru gres wangi dandan interior, lantai karpet bakalan kotor noda hitam luntur parah. Wajib ganti pakai sepatu safety baru khusus in-door yang bersih suci hama, atau bungkus telapak sepatu kotor itu pakai plastik biru cover shoe rangkap dua lapis sebelum berani menapak masuk.|Kỷ luật vệ sinh thép chốn thâm cung cấm địa sạch sẽ: Giày bảo hộ rách nát đầy bùn đất sình lầy dầu mỡ với bụi mùn cưa mạt sắt mài lấm lem cày cuốc ngoài xưởng mà hồn nhiên đi nguyên xi đạp xông thẳng vào cabin vừa mới make-up hoàn thiện nội thất thơm phức thì sàn nhà nát bét dính đầy nhọ nồi đen kịt. Bắt buộc phải thay bằng đôi giày an toàn nội khu mới cáu cạnh sạch sẽ không bám bụi, hoặc bọc bao nilon bọc giày (shoe cover) màu xanh lè trùm chồng hai lớp ra ngoài đôi giày dơ bẩn rồi mới được phép lướt gót ngọc tiến vào.|तेलको दाग र ग्राइन्डरको फलामको धुलोले भरिएको बाहिर लगाएको फोहोर काम गर्ने जुत्ता लगाएर भर्खरै भित्री सजावट सकिएको सफा क्याबिनमा जाँदा भुइँ कालो रङले बिग्रन्छ। यसलाई रोक्नको लागि क्याबिनभित्र प्रवेश गर्न मात्र प्रयोग गरिने धुलो नउड्ने सफा नयाँ सुरक्षा जुत्ता फेरेर लगाउने, वा जुत्तामाथि नीलो प्लास्टिकको कभर जुत्ता (शुकभर) दुई तह लगाएर प्रवेश गर्ने कडा साइटको सरसफाइ नियम हो।",

      "선실생산부|생활/규정|출입증 확인해|허가된 인원만 들어오게 출입증을 체크하세요|Periksa tanda pengenal (ID/Pass) agar hanya personel berizin yang masuk|Chu-rip-jeung hwa-gin-hae|Kiểm tra thẻ ra vào để đảm bảo chỉ những người được cấp phép mới được vào|Chu-rip-jeung hwa-gin-hae|अनुमति प्राप्त मानिसहरू मात्र भित्र आउन दिने गरी प्रवेश कार्ड (पास) जाँच्नुहोस्|Chu-rip-jeung hwa-gin-hae|가구와 고가의 전자 장비가 세팅된 마무리 단계의 선실은 물품 도난과 훼손 위험이 큽니다. 아무나 함부로 배회하며 들어오지 못하도록, 문 앞에 서서 작업 지시서와 정식 출입 명찰(사원증)을 목에 건 허가받은 관련 부서 작업자들만 깐깐하게 신원 확인 후 통과시키라는 철저한 구역 보안 통제 지시입니다.|Instruksi patroli sekuriti jaga gawang ketat: Kabin kapal di tahap akhir yang udah disulap mejeng perabotan mewah dan alat elektronik mahal ini rawan sasaran empuk maling curanmor maling printilan dan resiko rusak tersenggol. Biar kuli numpang lewat gak bisa bebas keluyuran blusukan nyelonong masuk, berdiri tegak jaga pintu, pelototin cegat periksa periksa ketat Surat Perintah Kerja (SPK) dan ID Card nametag resmi yang ngegantung di leher. Loloskan nyaring saring cuma pekerja tukang dari departemen berwenang bersertifikat ijin masuk doang.|Lệnh phong tỏa kiểm soát an ninh chốt chặn gác cổng gắt gao: Cabin tàu đang giai đoạn hoàn thiện ngập ngụa nhồi nhét ngọa hổ tàng long toàn nội thất xịn sò và thiết bị điện tử đắt đỏ là mồi ngon rình rập nguy cơ trộm cắp đạo chích và phá hoại táy máy. Để cấm cửa không cho dăm ba người rảnh rỗi lảng vảng dạo chơi thò thụt bừa bãi, phải đóng cọc đứng chình ình canh giữ trước cửa, soi xét kiểm tra chứng minh nhân dân gắt gao tờ Lệnh công tác và thẻ tên thẻ nhân viên chính ngạch lủng lẳng trên cổ. Chỉ bóp còi nhả phanh cho phép nhóm thợ thuộc phòng ban liên đới đã được phê duyệt giấy phép thông hành lọt ải chui vào.|फर्निचर र महँगा इलेक्ट्रोनिक उपकरणहरू सेटिङ गरिएको अन्तिम चरणको क्याबिनमा सामान चोरी र क्षतिको ठूलो जोखिम हुन्छ। जो कोही जथाभावी घुम्दै भित्र आउन नपाओस् भनेर, ढोका अगाडि उभिएर कार्य निर्देशन पत्र र घाँटीमा लगाएको औपचारिक प्रवेश परिचयपत्र (कर्मचारी कार्ड) भएका अनुमति प्राप्त सम्बन्धित विभागका कामदारहरूलाई मात्र कडा रूपमा पहिचान जाँच गरेपछि भित्र जान दिने कडा क्षेत्र सुरक्षा नियन्त्रณको निर्देशन हो।",

    // 🔥 가장 진보된 데이터 파서 (배열 10칸이든 14칸이든 유연하게 처리)

    const parsedData = (() => {

      } catch (e) {

        console.error("데이터 파싱 중 오류 발생 (무시됨):", e);

      }

      return res;

    })();


 // 🔥 실제 음성 재생 + 실패 시 기계음(TTS) 대체 하이브리드 로직
    const useAudio = () => {
      const [playing, setPlaying] = useState(false);
      const [currentText, setCurrentText] = useState(null);
      const timerRef = useRef(null);
      const currentReqRef = useRef(0);
      const audioRef = useRef(null);

      // 🛑 알려주신 깃허브 저장소의 주소입니다.
      // 만약 깃허브에 'mp3' 라는 폴더를 만들어서 넣으셨다면,
      // "https://raw.githubusercontent.com/hshiedu/yard_kr/main/mp3/" 이렇게 끝에 폴더이름을 적어주세요.
      const GITHUB_BASE_URL = "https://raw.githubusercontent.com/hshiedu/yard_kr/main/";

      const stop = () => {
        currentReqRef.current += 1;
        if (timerRef.current) clearTimeout(timerRef.current);
        
        // 1. 실제 오디오 정지
        if (audioRef.current) {
          audioRef.current.pause();
          audioRef.current.currentTime = 0;
        }
        // 2. 기계음(TTS) 정지
        try { if(window.speechSynthesis) window.speechSynthesis.cancel(); } catch(e) {}
        
        setPlaying(false);
        setCurrentText(null);
      };

      const playSequence = async (text, times = 3) => {
        stop();

        const reqId = currentReqRef.current;
        setPlaying(true);
        setCurrentText(text);

        const playOnce = () => new Promise((resolve) => {
          if (currentReqRef.current !== reqId) return resolve();

          // 🚨 [대체 플랜] 기계음(TTS) 재생 함수 (파일이 없을 때 대신 읽어주는 로봇)
          const fallbackToTTS = () => {
            if (currentReqRef.current !== reqId) return resolve();
            try {
              if(window.speechSynthesis) window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'ko-KR';
              utterance.rate = 0.85;
              utterance.onend = resolve;
              utterance.onerror = resolve;
              window.speechSynthesis.speak(utterance);
            } catch(e) {
              resolve();
            }
          };

          // 🎯 [메인 플랜] 깃허브 MP3 파일 재생 시도
          try {
            // 한글 파일 이름(예: 단도리 해.mp3)을 인터넷 주소로 변환
            const fileName = encodeURIComponent(text) + ".mp3"; 
            const audioUrl = GITHUB_BASE_URL + fileName;
            
            const audio = new Audio(audioUrl);
            audioRef.current = audio;

            // MP3 파일 정상 재생 완료 시
            audio.onended = resolve;

            // ❌ MP3 파일이 깃허브에 없거나 에러 발생 시 -> 로봇 기계음으로 넘김
            audio.onerror = () => {
              console.log(`[파일 없음] '${text}' 파일이 깃허브에 없어서 로봇 소리로 대신 읽습니다.`);
              fallbackToTTS();
            };

            // 재생 시작
            const playPromise = audio.play();
            if (playPromise !== undefined) {
              playPromise.catch(e => {
                fallbackToTTS();
              });
            }
          } catch(e) {
            fallbackToTTS();
          }
        });

        // 지정된 횟수만큼 반복 재생 (기본 3번)
        for (let i = 0; i < times; i++) {
          if (currentReqRef.current !== reqId) break;
          await playOnce();
          // 재생 간 1초 대기 (쉬는 시간)
          if (i < times - 1 && currentReqRef.current === reqId) {
            await new Promise(r => { timerRef.current = setTimeout(r, 1000); });
          }
        }
        
        if (currentReqRef.current === reqId) {
          setPlaying(false);
          setCurrentText(null);
        }
      };

      useEffect(() => { return () => stop(); }, []);
      return { playSequence, stop, playing, currentText };
    };



 
function App() {

      const [activeDept, setActiveDept] = useState('');
      const [selDeptPop, setSelDeptPop] = useState(null);
      const [selTermDetail, setSelTermDetail] = useState(null);
      
      const [quizItems, setQuizItems] = useState([]);
      const [qIdx, setQIdx] = useState(0);
      const [score, setScore] = useState(0);
      const [qState, setQState] = useState('idle');
      const [ans, setAns] = useState(null);

      const [searchQuery, setSearchQuery] = useState('');
      const [highScores, setHighScores] = useState({});
      const [learnedItems, setLearnedItems] = useState([]);
      const [incorrectAnswers, setIncorrectAnswers] = useState([]);

      const { playSequence, stop: stopAudio, playing, currentText } = useAudio();
      const t = uiText[lang] || uiText['ko'];
      const data = parsedData[activeDept] || [];
      const scrollRef = useRef(null);

      // 📱 현재 화면과 팝업 상태를 실시간으로 추적하는 메모리 장치 (새로 추가됨)
      const viewRef = useRef(view);
      const selDeptPopRef = useRef(selDeptPop);
      const selTermDetailRef = useRef(selTermDetail);

      useEffect(() => { viewRef.current = view; }, [view]);
      useEffect(() => { selDeptPopRef.current = selDeptPop; }, [selDeptPop]);
      useEffect(() => { selTermDetailRef.current = selTermDetail; }, [selTermDetail]);

      // 📱 스마트폰 하드웨어 '뒤로 가기' 완벽 제어 (팝업 닫기 기능 포함)
      useEffect(() => {
        window.history.pushState(null, '', window.location.href);

        const handlePopState = () => {
          // 앱이 꺼지지 않게 가짜 페이지를 다시 끼워넣음
          window.history.pushState(null, '', window.location.href);

          // 1. 상세 설명 팝업이 열려있으면 그것만 닫기
          if (selTermDetailRef.current) {
            setSelTermDetail(null);
            return;
          }
          // 2. 부서 선택 팝업이 열려있으면 그것만 닫기 (사진 속 그 화면)
          if (selDeptPopRef.current) {
            setSelDeptPop(null);
            return;
          }
          // 3. 학습/퀴즈 화면이면 목록 화면으로 이동
          if (viewRef.current === 'learn' || viewRef.current === 'quiz') {
            stopAudio();
            setView('select');
            return;
          }
          // 4. 목록 화면이면 홈 화면으로 이동
          if (viewRef.current === 'select') {
            setView('home');
            return;
          }
        };

        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
      }, []);

      // 데이터가 아예 없을 때 띄우는 친절한 오류 안내
      if (!window.HD_DATA || window.HD_DATA.length === 0) {
    

      const { playSequence, stop: stopAudio, playing, currentText } = useAudio();

      const t = uiText[lang] || uiText['ko'];

      const data = parsedData[activeDept] || [];

      const scrollRef = useRef(null);


 

      // 데이터가 아예 없을 때 띄우는 친절한 오류 안내

      if (!window.HD_DATA || window.HD_DATA.length === 0) {

        return (

          <div className="flex h-screen items-center justify-center bg-slate-100 p-6">

            <div className="bg-white p-8 rounded-3xl shadow-xl text-center max-w-sm border border-slate-200">

              <div className="text-4xl mb-4">📂</div>

              <h2 className="text-[#002C5F] font-black text-xl mb-2">데이터 대기 중</h2>

              <p className="text-slate-600 text-sm font-medium mb-4 leading-relaxed break-keep">

                HTML 코드 상단의 <br/><span className="font-bold text-[#008C45]">window.HD_DATA = [ ... ];</span> <br/>배열 안에 526개의 번역 데이터를 붙여넣어 주시면 앱이 시작됩니다!

              </p>

            </div>

          </div>

        );

      }


 

      useEffect(() => {

        try {

          const storedScores = localStorage.getItem('hd_highscores');

          if (storedScores) setHighScores(JSON.parse(storedScores));

          const storedLearned = localStorage.getItem('hd_learned');

          if (storedLearned) setLearnedItems(JSON.parse(storedLearned));

        } catch (e) {}

      }, []);


 

      const markAsLearned = (id) => {

        if (!learnedItems.includes(id)) {

          const newLearned = [...learnedItems, id];

          setLearnedItems(newLearned);

          try { localStorage.setItem('hd_learned', JSON.stringify(newLearned)); } catch(e){}

        }

      };


 

      const handlePlay = (item) => { playSequence(item.term, 3); markAsLearned(item.id); };

      const handleDetail = (item) => { setSelTermDetail(item); markAsLearned(item.id); };


 

      const filteredData = data.filter(item => {

        if (!searchQuery) return true;

        const q = searchQuery.toLowerCase();

        return item.term.toLowerCase().includes(q) ||

               item.mean.toLowerCase().includes(q) ||

               (item[`${lang}T`] && item[`${lang}T`].toLowerCase().includes(q));

      });


 

      useEffect(() => {

        if (scrollRef.current) scrollRef.current.scrollTop = 0;

      }, [activeDept, view]);


 

      const openDeptInfo = (dept) => { setSelDeptPop(dept); };

     
const unlockAudio = () => {
        try {
          const u = new SpeechSynthesisUtterance('');
          u.volume = 0;
          if(window.speechSynthesis) window.speechSynthesis.speak(u);
        } catch(e) {}
      };

      // 📱 전체화면 강제 실행 함수 (필요할 때를 대비해 기능 자체는 남겨두었습니다)
      const forceFullScreen = () => {
        try {
          if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
          }
        } catch(e) {}
      };

      const startLearn = () => {
        unlockAudio();
        // 💡 전체화면 실행 코드 제거됨
        setActiveDept(selDeptPop); setSelDeptPop(null); setSearchQuery(''); setView('learn');
      };

      const startQuizSession = () => {
        unlockAudio();
        // 💡 전체화면 실행 코드 제거됨
        const d = parsedData[selDeptPop || activeDept] || [];
        if (d.length < 4) {
          alert("데이터가 부족합니다.");
          return;
        }
        
        const shuffled = [...d].sort(() => Math.random() - 0.5).slice(0, 20);
        const items = shuffled.map(q => {
          const others = d.filter(x => x.id !== q.id).sort(() => Math.random() - 0.5).slice(0, 3);
          return { ...q, opts: [q, ...others].sort(() => Math.random() - 0.5) };
        });
        
        if (selDeptPop) setActiveDept(selDeptPop);
        setSelDeptPop(null);
        setQuizItems(items); setQIdx(0); setScore(0); setQState('play'); setAns(null);
        setIncorrectAnswers([]);
        setView('quiz');
        
        setTimeout(() => { playSequence(items[0].term, 1); }, 1000);
      };
   
 

      const handleAns = (o) => {

        if (ans) return;

        setAns(o);

        const currentQ = quizItems[qIdx];

        const isCorrect = o.id === currentQ.id;


 

        if (isCorrect) {

          setScore(s => s + 1);

        } else {

          setIncorrectAnswers(prev => [...prev, { ...currentQ, userAns: o }]);

        }

       

        setTimeout(() => {

          if (qIdx < quizItems.length - 1) {

            const nextIdx = qIdx + 1;

            setQIdx(nextIdx);

            setAns(null);

            setTimeout(() => { playSequence(quizItems[nextIdx].term, 1); }, 1000);

          } else {

            setQState('result');

            setScore(latestScore => {

              setHighScores(prev => {

                const newScores = { ...prev };

                const currentHigh = newScores[activeDept] || 0;

                if (latestScore > currentHigh) {

                  newScores[activeDept] = latestScore;

                  try { localStorage.setItem('hd_highscores', JSON.stringify(newScores)); } catch(e){}

                }

                return newScores;

              });

              return latestScore;

            });

          }

        }, 1200);

      };


 

      const goHome = () => { stopAudio(); setView('home'); };

      const goBack = () => { stopAudio(); setView('select'); };


 

      const toggleFullScreen = () => {

        try {

          if (!document.fullscreenElement) {

            document.documentElement.requestFullscreen().catch(e => console.log(e));

          } else {

            if (document.exitFullscreen) document.exitFullscreen();

          }

        } catch(e) {}

      };


 

      const isLearnMode = sessionStorage.getItem('nextView') === 'learn';


 

      const TopHeader = ({ title }) => (

        <header className="sticky top-0 z-40 bg-white border-b border-slate-200 px-4 py-3 flex justify-between items-center shadow-sm shrink-0">

          <button onClick={goBack} className="btn-press flex items-center text-slate-500 font-bold hover:text-[#002C5F] bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-full text-[13px]">

            <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7" /></svg>

            {t.back}

          </button>

          <h1 className="text-[16px] font-black text-[#002C5F]">{title}</h1>

          <button onClick={goHome} className="btn-press flex items-center text-slate-500 font-bold hover:text-[#002C5F] bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-full text-[13px]">

            <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>

            {t.home}

          </button>

        </header>

      );


 

      return (

        <div className="fixed inset-0 w-full h-full bg-[#E2E8F0] flex justify-center">

          <div className="h-full w-full max-w-2xl flex flex-col bg-[#F4F6F9] overflow-hidden relative shadow-2xl">

           


            {/* HOME */}

            {view === 'home' && (

              <div className="flex-1 flex flex-col p-5 items-center justify-center fade-in scroll-container relative w-full h-full">

                <div className="absolute top-5 left-5 right-5 flex justify-between items-center z-10">

                  {!isAppBrowser ? (

                    <button onClick={toggleFullScreen} className="bg-white px-3 py-2 rounded-full shadow-sm border border-slate-200 text-slate-500 font-bold text-[12px] flex items-center hover:bg-slate-50 transition-colors">

                      <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>

                      {t.fullscreen}

                    </button>

                  ) : (<div></div>)}


 

                  <div className="flex bg-white p-1 rounded-full shadow-sm border border-slate-200">

                    {Object.keys(flagMap).map(l => {

                      const label = flagMap[l];

                      return (

                        <button

                          key={l}

                          onClick={() => setLang(l)}

                          className={`w-10 h-10 rounded-full text-[13px] font-bold flex items-center justify-center transition-all ${lang === l ? 'bg-[#002C5F] text-white shadow-md' : 'text-slate-400 hover:text-slate-800'}`}

                        >

                          {label}

                        </button>

                      );

                    })}

                  </div>

                </div>


 

                <div className="w-full bg-gradient-to-br from-[#002C5F] to-[#004f7a] rounded-[2rem] p-8 pt-12 pb-10 flex flex-col items-center justify-center shadow-lg mt-8 mb-5 relative overflow-hidden">

                  <div className="absolute -top-10 -right-10 w-32 h-32 bg-white opacity-5 rounded-full blur-2xl"></div>

                  <h1 className="text-[28px] sm:text-[32px] font-black text-white tracking-tight leading-none mb-1">HD현대삼호</h1>

                  <h2 className="text-[32px] sm:text-[36px] font-black text-white leading-none">

                    <span className="text-[#00D282]">Yard</span> 한국어

                  </h2>

                  <p className="text-white/80 text-[12px] sm:text-[13px] mt-5 text-center font-bold tracking-[0.08em] uppercase">

                    KOREAN LANGUAGE STUDY FOR SHIPYARD

                  </p>

                </div>


 

                <div className="w-full space-y-3">

                  <button onClick={() => { unlockAudio(); setView('select'); sessionStorage.setItem('nextView', 'learn'); }} className="btn-press w-full bg-white rounded-2xl p-5 flex items-center justify-between shadow-sm border border-slate-200">

                    <div className="flex flex-col items-start text-left pl-1">

                      <h3 className="text-[20px] font-black text-slate-900">{t.menuLearn}</h3>

                      <p className="text-slate-500 font-medium text-[13px] mt-0.5">{t.subLearn}</p>

                    </div>

                    <div className="w-12 h-12 rounded-xl bg-[#F8FAFC] border border-slate-100 flex items-center justify-center text-[#002C5F] shrink-0">

                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>

                    </div>

                  </button>


 

                  <button onClick={() => { unlockAudio(); setView('select'); sessionStorage.setItem('nextView', 'quiz'); }} className="btn-press w-full bg-white rounded-2xl p-5 flex items-center justify-between shadow-sm border border-slate-200">

                    <div className="flex flex-col items-start text-left pl-1">

                      <h3 className="text-[20px] font-black text-slate-900">{t.menuQuiz}</h3>

                      <p className="text-slate-500 font-medium text-[13px] mt-0.5">{t.subQuiz}</p>

                    </div>

                    <div className="w-12 h-12 rounded-xl bg-[#ECFDF5] border border-emerald-50 flex items-center justify-center text-[#008C45] shrink-0">

                      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

                    </div>

                  </button>

                </div>

              </div>

            )}


 

            {/* SELECT DEPT */}

            {view === 'select' && (

              <div className="flex-1 flex flex-col fade-in overflow-hidden bg-[#F4F6F9]">

                <header className="px-4 py-3.5 flex justify-center items-center shrink-0 relative bg-white border-b border-slate-200 shadow-sm">

                   <button onClick={goHome} className="absolute left-3 w-9 h-9 bg-slate-50 border border-slate-200 text-slate-500 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors">

                      <svg className="w-5 h-5 mr-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7" /></svg>

                   </button>

                   <h1 className="text-[17px] font-black text-[#002C5F] tracking-tight">HD현대삼호</h1>

                </header>


 

                <div className="flex-1 overflow-y-auto custom-scroll scroll-container px-4 py-5">

                   <div className="mb-6 px-1">

                      <span className={`inline-block px-2.5 py-1 bg-white border text-[12px] font-bold rounded-full mb-3 shadow-sm ${isLearnMode ? 'border-slate-200 text-slate-700' : 'border-emerald-200 text-emerald-700'}`}>

                         {isLearnMode ? t.modeLearn : t.modeQuiz}

                      </span>

                      <h2 className="text-[24px] leading-snug font-black text-slate-900 mb-1 whitespace-pre-line tracking-tight">

                         {isLearnMode ? t.selectTitleLearn : t.selectTitleQuiz}

                      </h2>

                      <p className="text-[14px] font-medium text-slate-500">

                         {isLearnMode ? t.selectSubLearn : t.selectSubQuiz}

                      </p>

                   </div>


 

                   <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 pb-10">

                      {Object.keys(parsedData).map(d => {

                         const deptData = parsedData[d] || [];

                         const total = deptData.length;

                         let badgeStr = '';

                        

                         if (total > 0 && isLearnMode) {

                           const lCount = deptData.filter(x => learnedItems.includes(x.id)).length;

                           badgeStr = `${t.progress}: ${Math.round((lCount / total) * 100)}%`;

                         } else if (total > 0 && !isLearnMode) {

                           const hScore = highScores[d] || 0;

                           badgeStr = `${t.highScore}: ${hScore}/20`;

                         }


 

                         const color = deptColors[d] || deptColors['공통'];


 

                         return (

                            <button key={d} onClick={() => openDeptInfo(d)} className={`bg-white py-5 px-3 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center justify-center transition-all active:scale-95 group relative ${color.ring}`}>

                               <div className={`w-12 h-12 rounded-xl flex items-center justify-center mb-3 border ${color.bg} ${color.border} ${color.text}`}>

                                  {getDeptIcon(d)}

                               </div>

                               <span className="font-bold text-[14px] text-slate-800 tracking-tight">{d}</span>

                               {total > 0 && (

                                  <span className={`mt-2 text-[10px] font-bold px-2 py-0.5 rounded border ${color.bg} ${color.border} ${color.text}`}>

                                     {badgeStr}

                                  </span>

                               )}

                            </button>

                         )

                      })}

                   </div>

                </div>

              </div>

            )}


 

            {/* LEARN */}

            {view === 'learn' && (

              <div className="flex-1 flex flex-col fade-in overflow-hidden bg-[#F4F6F9]">

                <TopHeader title={`${activeDept} 학습`} />

               


                <div className="px-3 py-2.5 bg-white border-b border-slate-200 shrink-0 shadow-sm z-10">

                  <div className="relative">

                    <svg className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>

                    <input

                      type="text"

                      placeholder={t.search}

                      value={searchQuery}

                      onChange={(e) => setSearchQuery(e.target.value)}

                      className="w-full bg-[#F8FAFC] border border-slate-100 text-slate-800 rounded-lg py-2 pl-9 pr-9 focus:outline-none focus:ring-1 focus:ring-[#002C5F] transition-all font-bold text-[14px] placeholder-slate-400"

                    />

                    {searchQuery && (

                      <button onClick={() => setSearchQuery('')} className="absolute right-2 top-1/2 transform -translate-y-1/2 text-slate-400 p-1">

                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>

                      </button>

                    )}

                  </div>

                </div>


 

                <div ref={scrollRef} className="flex-1 overflow-y-auto scroll-container p-3 space-y-3 pb-20">

                  {filteredData.map((item, idx) => {

                    const isCurrentPlaying = playing && currentText === item.term;

                    const isLearned = learnedItems.includes(item.id);

                    const color = deptColors[activeDept] || deptColors['공통'];


 

                    return (

                      <div key={item.id} className={`bg-white rounded-[16px] shadow-sm border ${isCurrentPlaying ? 'border-[#002C5F] shadow-md' : 'border-slate-200'} relative overflow-hidden flex flex-col p-4 transition-colors`}>

                        <div className={`absolute top-0 left-0 w-[5px] h-full ${isCurrentPlaying ? 'bg-[#002C5F]' : isLearned ? 'bg-slate-300' : 'bg-slate-100'}`}></div>

                       

                        <div className="flex justify-between items-center pl-1 mb-2">

                          <span className={`text-[11px] font-bold px-2 py-0.5 rounded border flex items-center gap-1 tracking-tight ${color.bg} ${color.text} ${color.border}`}>

                            {isLearned && <svg className={`w-3 h-3 ${color.text}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" /></svg>}

                            {item.cat}

                          </span>

                          <div className="flex items-center gap-3">

                            <span className="text-[12px] font-black text-slate-400 tracking-widest">{idx + 1} / {filteredData.length}</span>

                            <button onClick={() => handlePlay(item)} className={`btn-press w-9 h-9 rounded-full flex items-center justify-center border transition-all ${isCurrentPlaying ? 'bg-[#002C5F] text-white border-[#002C5F] playing-pulse shadow-md' : 'bg-white text-[#002C5F] border-slate-200 shadow-sm'}`}>

                              <svg className="w-4 h-4 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>

                            </button>

                          </div>

                        </div>


 

                        <div className="pl-1 mb-3">

                          <div className="flex justify-between items-start gap-2">

                            <h3 className="text-[20px] font-black text-slate-900 leading-tight tracking-tight break-keep">{item.term}</h3>

                            {/* 상세설명(디테일) 버튼을 모든 단어에서 노출하도록 변경 */}

                            <button onClick={() => handleDetail(item)} className="btn-press mt-0.5 shrink-0 text-slate-400 hover:text-slate-700 bg-slate-50 border border-slate-100 rounded-full p-1.5">

                              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>

                            </button>

                          </div>

                         

                          {/* 메인 번역 설명 (외국어일 때는 외국어 의미가 메인으로) */}

                          <p className={`mt-1 leading-snug break-keep pr-2 ${lang === 'ko' ? 'text-[14px] font-medium text-slate-500' : 'text-[15px] font-bold text-[#008C45]'}`}>

                            {lang === 'ko' ? item.mean : item[`${lang}T`]}

                          </p>

                        </div>


 

                        {lang !== 'ko' && (

                          <div className="bg-[#F8FAFC] rounded-xl p-2.5 border border-slate-100 ml-1">

                            <div className="flex items-start gap-2">

                              <span className="text-[13px] w-6 text-center opacity-70">🗣️</span>

                              <p className="text-[14px] font-bold text-slate-700 italic leading-snug flex-1">{item[`${lang}P`]}</p>

                            </div>

                            <div className="w-full h-px bg-slate-200 my-1.5"></div>

                            {/* 한국어 원문 의미 */}

                            <div className="flex items-start gap-2">

                              <span className="text-[12px] font-black text-slate-400 mt-[1px] w-6 text-center">KOR</span>

                              <p className="text-[13px] font-medium text-slate-500 leading-snug break-keep flex-1">{item.mean}</p>

                            </div>

                          </div>

                        )}

                      </div>

                    );

                  })}

                  {filteredData.length === 0 && (

                    <div className="text-center py-16 text-slate-400 font-bold">

                       <span className="text-2xl block mb-2">📥</span>

                       {t.empty}<br/><span className="text-[12px] opacity-70 font-medium">코드 하단에 데이터를 넣어주세요.</span>

                    </div>

                  )}

                </div>

              </div>

            )}


 

            {/* QUIZ (가로 배치 컴팩트 레이아웃) */}

            {view === 'quiz' && (

              <div className="flex-1 flex flex-col fade-in overflow-hidden bg-[#F4F6F9]">

                <TopHeader title={`${activeDept} 퀴즈`} />

                <div className="flex-1 flex flex-col overflow-y-auto scroll-container">

                  {qState === 'play' ? (

                    <div className="flex-1 flex flex-col px-4 pt-3 pb-8">

                      <div className="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden mb-3"><div className="h-full bg-[#008C45] transition-all duration-300" style={{width:`${((qIdx+1)/20)*100}%`}}></div></div>

                      <div className="flex justify-between font-black text-slate-400 text-[13px] mb-4">

                        <span className="uppercase tracking-wide">{t.qNum} {qIdx+1}/20</span>

                        <span className="uppercase tracking-wide">{t.score} <span className="text-[#008C45] text-[15px]">{score}</span></span>

                      </div>

                     

                      <div className="flex flex-col items-center text-center flex-1">

                        <div className="bg-white w-full rounded-2xl shadow-sm border border-slate-200 py-5 px-5 flex items-center justify-between mb-4 relative overflow-hidden">

                          <div className="absolute top-0 left-0 w-1.5 h-full bg-[#008C45]"></div>

                          <div className="flex flex-col items-start text-left flex-1 pr-4">

                             <h3 className="text-[24px] sm:text-[28px] font-black text-slate-900 tracking-tight mb-1 break-keep leading-snug">{quizItems[qIdx].term}</h3>

                            

                             {/* 퀴즈 안내 문구 */}

                             <p className="text-slate-400 text-[12px] font-bold break-keep mt-1 flex items-center gap-1">

                                <span>💡</span><span>{t.quizGuide}</span>

                             </p>

                             {lang !== 'ko' && <p className="text-slate-300 text-[10px] mt-0.5 font-medium">(안내: 음성을 듣고 알맞은 뜻을 고르세요)</p>}

                          </div>

                          <button onClick={() => playSequence(quizItems[qIdx].term, 1)} className={`btn-press w-14 h-14 shrink-0 bg-[#ECFDF5] text-[#008C45] rounded-full flex items-center justify-center transition-all shadow-sm border border-emerald-100 ${playing && currentText === quizItems[qIdx].term ? 'playing-pulse border-[#008C45]' : ''}`}>

                            <svg className="w-6 h-6 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>

                          </button>

                        </div>

                       

                        <div className="w-full space-y-2.5">

                          {quizItems[qIdx].opts.map((o, i) => {

                            let style = "bg-white border-slate-200 text-slate-700 hover:border-[#008C45]";

                            if(ans) {

                              if(o.id === quizItems[qIdx].id) style = "bg-[#008C45] border-[#008C45] text-white scale-[1.02] shadow-md z-10";

                              else if(ans.id === o.id) style = "bg-rose-500 border-rose-600 text-white opacity-90";

                              else style = "bg-white border-slate-100 text-slate-300 opacity-50";

                            }

                            const optText = lang === 'ko' ? o.mean : o[`${lang}T`];

                            return (

                              <button key={i} onClick={()=>handleAns(o)} disabled={!!ans} className={`btn-press w-full p-4 text-left rounded-xl border-2 font-black text-[14px] sm:text-[15px] transition-all flex items-center ${style}`}>

                                <span className={`w-7 h-7 rounded-full flex items-center justify-center mr-3 text-[12px] shrink-0 ${ans && o.id === quizItems[qIdx].id ? 'bg-white/20' : 'bg-slate-100 text-slate-400'}`}>{i+1}</span>

                                <span className="leading-snug break-keep">{optText}</span>

                              </button>

                            );

                          })}

                        </div>

                      </div>

                    </div>

                  ) : qState === 'result' ? (

                    <div className="flex-1 flex flex-col items-center justify-center p-6 slide-up space-y-6">

                      <div className="w-20 h-20 bg-white rounded-2xl shadow-sm border border-slate-100 flex items-center justify-center text-4xl">🎉</div>

                      <div className="text-center">

                        <h2 className="text-[26px] font-black text-slate-900">결과 확인</h2>

                      </div>

                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 w-full max-w-xs text-center">

                        <p className="text-slate-400 font-black text-[12px] mb-1 tracking-wider">FINAL SCORE</p>

                        <div className="flex items-baseline justify-center gap-1">

                          <span className="text-[52px] font-black text-[#008C45] tracking-tighter leading-none">{score}</span>

                          <span className="text-[18px] font-bold text-slate-300">/ 20</span>

                        </div>

                      </div>

                      <div className="w-full max-w-xs flex flex-col gap-2.5">

                        {incorrectAnswers.length > 0 && (

                          <button onClick={() => setQState('review')} className="btn-press w-full py-3.5 bg-rose-50 text-rose-600 font-black text-[15px] rounded-xl border border-rose-200">

                            {t.review}

                          </button>

                        )}

                        <div className="flex gap-2.5 w-full">

                          <button onClick={goHome} className="btn-press flex-1 py-3.5 bg-white border border-slate-200 text-slate-700 font-black text-[15px] rounded-xl shadow-sm">{t.home}</button>

                          <button onClick={startQuizSession} className="btn-press flex-1 py-3.5 bg-[#008C45] text-white font-black text-[15px] rounded-xl shadow-sm">{t.startQuiz}</button>

                        </div>

                      </div>

                    </div>

                  ) : qState === 'review' ? (

                    <div className="flex-1 flex flex-col fade-in overflow-hidden">

                      <div className="p-3.5 bg-white border-b border-slate-200 flex justify-between items-center shadow-sm shrink-0">

                        <h2 className="text-[16px] font-black text-rose-600 flex items-center gap-1.5">

                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>

                          {t.review}

                        </h2>

                        <span className="bg-rose-50 text-rose-600 border border-rose-100 font-bold px-2 py-0.5 rounded text-[12px]">{incorrectAnswers.length}개 오답</span>

                      </div>

                      <div className="flex-1 overflow-y-auto scroll-container p-4 space-y-3 pb-20">

                        {incorrectAnswers.map((q, i) => (

                          <div key={i} className="bg-white p-4 rounded-2xl border border-rose-200 shadow-sm relative">

                            <div className="flex justify-between items-start mb-3">

                              <h3 className="text-[18px] font-black text-slate-900 leading-snug">{q.term}</h3>

                              <button onClick={() => playSequence(q.term, 1)} className="btn-press w-9 h-9 bg-slate-100 text-blue-600 rounded-full flex items-center justify-center shrink-0">

                                <svg className="w-4 h-4 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>

                              </button>

                            </div>

                            <div className="space-y-1.5">

                              <div className="p-2.5 bg-rose-50 rounded-xl border border-rose-100">

                                <span className="text-[10px] font-black text-rose-400 uppercase block mb-0.5">{t.myAns}</span>

                                <span className="text-[13px] font-bold text-slate-600 line-through opacity-70">

                                  {q.userAns ? (lang === 'ko' ? q.userAns.mean : q.userAns[`${lang}T`]) : '시간 초과 / 선택 안함'}

                                </span>

                              </div>

                              <div className="p-2.5 bg-[#ECFDF5] rounded-xl border border-[#A7F3D0]">

                                <span className="text-[10px] font-black text-[#047857] uppercase block mb-0.5">{t.correctAns}</span>

                                <span className="text-[13px] font-bold text-[#065F46] break-keep">

                                  {lang === 'ko' ? q.mean : q[`${lang}T`]}

                                </span>

                              </div>

                            </div>

                          </div>

                        ))}

                      </div>

                      <div className="p-3 bg-white border-t border-slate-200 shrink-0">

                        <button onClick={() => setQState('result')} className="btn-press w-full py-3.5 bg-slate-800 text-white font-black rounded-xl shadow-sm text-[15px]">{t.backToResult}</button>

                      </div>

                    </div>

                  ) : null}

                </div>

              </div>

            )}


 

            {/* POPUPS */}

            {selDeptPop && (

              <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4 fade-in">

                <div className="bg-white w-full max-w-sm rounded-3xl p-5 shadow-2xl slide-up flex flex-col max-h-[90vh]">

                  <div className="flex flex-col items-center border-b border-slate-100 pb-3 mb-3">

                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center mb-2 border ${deptColors[selDeptPop] ? deptColors[selDeptPop].bg : 'bg-slate-50'} ${deptColors[selDeptPop] ? deptColors[selDeptPop].border : 'border-slate-200'} ${deptColors[selDeptPop] ? deptColors[selDeptPop].text : 'text-slate-600'}`}>

                      {getDeptIcon(selDeptPop)}

                    </div>

                    <h3 className="text-[22px] font-black text-slate-900 text-center">{selDeptPop}</h3>

                    <span className="text-[12px] font-bold text-blue-600 block mt-0.5 bg-blue-50 px-2 py-0.5 rounded">{t.deptDesc}</span>

                  </div>


 

                  <div className="flex-1 overflow-y-auto custom-scroll p-4 bg-slate-50 rounded-2xl border border-slate-100 mb-4 space-y-3">

                    <div className="space-y-1">

                      <div className="flex items-center gap-1.5">

                        <span className="text-sm">🇰🇷</span>

                        <span className="font-black text-blue-800 text-[11px]">한국어</span>

                      </div>

                      <p className="text-slate-800 font-bold text-[13px] leading-relaxed break-keep">

                        {deptInfo[selDeptPop] ? deptInfo[selDeptPop].ko : ''}

                      </p>

                    </div>

                    {lang !== 'ko' && (

                      <>

                        <div className="w-full h-px bg-slate-200"></div>

                        <div className="space-y-1">

                          <div className="flex items-center gap-1.5">

                            <span className="text-sm">{flagMap[lang]}</span>

                            <span className="font-black text-[#008C45] text-[11px] uppercase">{lang}</span>

                          </div>

                          <p className="text-slate-600 font-bold text-[13px] leading-relaxed break-keep">

                            {deptInfo[selDeptPop] ? deptInfo[selDeptPop][lang] : ''}

                          </p>

                        </div>

                      </>

                    )}

                  </div>

                  <div className="flex w-full gap-2 shrink-0">

                    <button onClick={() => setSelDeptPop(null)} className="btn-press flex-1 py-3.5 bg-white border border-slate-200 text-slate-600 font-black rounded-xl text-[15px] shadow-sm">{t.cancel}</button>

                    <button onClick={isLearnMode ? startLearn : startQuizSession} className={`btn-press flex-[2] py-3.5 text-white font-black rounded-xl shadow-md text-[15px] ${isLearnMode ? 'bg-[#002C5F]' : 'bg-[#008C45]'}`}>

                      {isLearnMode ? t.start : t.startQuiz}

                    </button>

                  </div>

                </div>

              </div>

            )}


 

            {/* DETAIL MODAL (상세설명 팝업) */}

            {selTermDetail && (

              <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4 fade-in">

                <div className="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl slide-up flex flex-col max-h-[85vh]">

                  <div className="p-3 bg-slate-50 border-b flex justify-between items-center shrink-0">

                    <span className="text-[11px] font-black bg-white border border-slate-200 text-slate-600 px-2 py-1 rounded uppercase shadow-sm">{selTermDetail.cat}</span>

                    <button onClick={() => setSelTermDetail(null)} className="btn-press p-1 bg-white border border-slate-200 rounded-full text-slate-400 hover:text-slate-700 shadow-sm"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg></button>

                  </div>

                  <div className="p-5 overflow-y-auto custom-scroll flex-1 space-y-5 scroll-container bg-white">

                    <div>

                      <h2 className="text-[26px] font-black text-slate-900 tracking-tight mb-2 leading-tight">{selTermDetail.term}</h2>

                     

                      <div className="bg-[#F4F6F9] p-3 rounded-xl border border-slate-100 space-y-1.5 mt-2">

                        {lang !== 'ko' && (

                           <p className="text-[#008C45] font-bold text-[15px] leading-snug">{selTermDetail[`${lang}T`]}</p>

                        )}

                        <p className="text-slate-500 font-medium text-[13px] leading-snug">

                           {lang !== 'ko' && <span className="font-black text-slate-400 mr-1 text-[11px]">KOR</span>}

                           {selTermDetail.mean}

                        </p>

                      </div>

                    </div>


 

                    <div className="space-y-2.5">

                      <h4 className="font-black text-indigo-700 text-[12px] uppercase flex items-center gap-1.5"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>{t.detailDesc}</h4>

                      <div className="bg-indigo-50/70 p-4 rounded-xl border border-indigo-100 space-y-3">

                        {lang !== 'ko' ? (

                           <>

                             {/* 외국어 상세설명 출력 (데이터의 11~13번째 항목 매핑) */}

                             <p className="text-[14px] font-bold text-indigo-900 leading-relaxed break-keep flex items-start gap-1.5">

                               <span className="mt-0.5">{flagMap[lang]}</span>

                               <span>{selTermDetail[`${lang}Desc`]}</span>

                             </p>

                             <div className="w-full h-px bg-indigo-100/50"></div>

                             {/* 한국어 상세설명 출력 */}

                             <p className="text-[12px] font-medium text-slate-600 leading-relaxed break-keep flex items-start gap-1.5">

                               <span className="mt-0.5">🇰🇷</span>

                               <span>{selTermDetail.koDesc}</span>

                             </p>

                           </>

                        ) : (

                           <p className="text-[14px] font-bold text-slate-800 leading-relaxed break-keep flex items-start gap-1.5">

                             <span className="mt-0.5">🇰🇷</span>

                             <span>{selTermDetail.koDesc}</span>

                           </p>

                        )}

                      </div>

                    </div>

                  </div>

                </div>

              </div>

            )}

          </div>

        </div>

      );

    }


 

    const root = ReactDOM.createRoot(document.getElementById('root'));

    root.render(<App />);

  </script>

</body>

</html>
