      "가공부|공구/장비|하카 체결해|리프팅 클램프(하카)를 철판에 단단히 물려 고정해|Pasang dan kunci Lifting Clamp (Huck) pada plat|Ha-ka che-gyeol-hae|Kẹp chặt và khóa kẹp nâng (Huck) vào tấm thép|Ha-ka che-gyeol-hae|प्लेट उठाउने क्ल्याम्प (हाका) लाई राम्रोसँग कस्नुहोस्|Ha-ka che-gyeol-hae|크레인으로 무거운 철판이나 론지 부재를 안전하게 들어 올리기 위해 사용하는 악어 이빨 모양의 전용 리프팅 집게(하카)를 철판 끝단에 깊숙이 삽입하고, 양중 도중 절대 이탈하지 않도록 잠금 레버나 안전핀을 끝까지 내려 철저히 잠그라는 매우 중요한 하역 지시입니다.|Instruksi vital bongkar muat: masukkan penjepit gigi buaya (Huck/Lifting clamp) dalam-dalam ke ujung plat saat diangkat crane, dan turunkan tuas kunci atau peniti pengaman hingga mentok agar plat tidak terlepas jatuh di udara.|Chỉ thị nâng hạ cực kỳ quan trọng: đút kẹp nâng răng cá sấu (Huck) vào sâu mép tấm thép để cẩu lên, và gạt chốt khóa hoặc chốt an toàn xuống tận cùng để kẹp bám dính tuyệt đối không bị tuột rơi giữa chừng.|क्रेनले भारी प्लेट वा लन्जिट्युडिनल पार्ट्सलाई सुरक्षित रूपमा उठाउन प्रयोग गरिने गोहीको दाँत जस्तो विशेष लिफ्टिङ चिम्टा (हाका) लाई प्लेटको किनारमा गहिरो गरी घुसाएर, उठाउँदा कहिल्यै नखुस्कियोस् भनेर लक गर्ने लेभर वा सुरक्षा पिनलाई अन्तिमसम्म झारेर कडा रूपमा लक गर्ने अत्यन्तै महत्त्वपूर्ण ढुवानी निर्देशन हो।",

      "판넬조립부|용접/작업|빽내|뒷면 용접 침투가 부족한 곳은 이면부(Backing) 추가 용접을 하세요|Lakukan pengelasan tambahan di bagian belakang (backing weld) jika penetrasi kurang|Ppaeng-nae|Hàn bổ sung mặt sau (backing weld) ở những chỗ mối hàn chưa xuyên thấu đủ|Ppaeng-nae|पछाडि वेल्डिङ नपुगेको ठाउँमा थप वेल्डिङ (ब्याकिङ) गर्नुहोस्|Ppaeng-nae|표면 용접만으로 철판 뒷면까지 완전 용입이 이루어지지 않았을 때, 결함을 방지하기 위해 용접사가 철판 뒷면으로 이동하여 루트 갭을 메우는 이면 용접(Backing Weld)을 실시하라는 뜻입니다.|Artinya jika pengelasan permukaan tidak mencapai penetrasi penuh hingga ke belakang plat, welder harus pindah ke belakang dan melakukan las punggung (Backing Weld) untuk menutup celah akar demi mencegah cacat.|Nghĩa là khi chỉ hàn mặt trước không tạo được độ ngấu hoàn toàn tới mặt sau, thợ hàn phải di chuyển ra mặt lưng để thực hiện hàn lót (Backing Weld) lấp kín khe hở gốc nhằm ngăn ngừa khuyết tật.|अगाडिको वेल्डिङले मात्र प्लेटको पछाडिसम्म पूर्ण रूपमा वेल्डिङ नभएको अवस्थामा, खराबी रोक्न वेल्डर प्लेटको पछाडि गएर रुट ग्याप भर्ने ब्याक वेल्डिङ (Backing Weld) गर्ने अर्थ हो।",

      "판넬조립부|용접/작업|비드 깨끗하게 해|용접 겉모양이 파도 모양으로 매끄럽고 일정하게 나오도록 하세요|Buat jalur lasan (bead) tampak bersih, halus, dan konsisten seperti gelombang|Bi-deu kke-kkeut-ha-ge hae|Làm cho đường vảy hàn (bead) mượt mà và đều đặn như gợn sóng|Bi-deu kke-kkeut-ha-ge hae|वेल्डिङको बिडलाई छाल जस्तै चिल्लो र एकनासको हुने गरी सफा बनाउनुहोस्|Bi-deu kke-kkeut-ha-ge hae|용접 후 형성되는 용착 금속의 파형(비드)이 폭과 높이가 일정하고 기공, 언더컷 등의 표면 결함이 없이 시각적으로 균일하고 우수한 품질을 갖추도록 정밀하게 용접하라는 지시입니다.|Instruksi pengelasan presisi agar bentuk logam las (bead) yang terbentuk memiliki lebar dan tinggi yang seragam, serta kualitas visual yang sangat baik tanpa cacat permukaan seperti pori atau undercut.|Chỉ thị hàn chính xác sao cho vảy kim loại đắp (bead) có chiều rộng và chiều cao đồng đều, chất lượng ngoại quan tốt và không có các khuyết tật bề mặt như rỗ khí, lẹm chân.|वेल्डिङ पछि बन्ने फ्युजन धातुको छाल (बिड) को चौडाइ र उचाइ एकनासको भएको र प्वाल, अन्डरकट जस्ता सतहका खराबीहरू नभई हेर्दा एकनास र उत्कृष्ट गुणस्तरको हुने गरी ध्यान दिएर वेल्डिङ गर्ने निर्देशन हो।",

      "판넬조립부|용접/작업|언더컷 안 나게 해|과도한 전류로 인해 철판 가장자리가 파먹히는 결함을 조심하세요|Hati-hati jangan sampai terjadi cacat undercut akibat arus terlalu tinggi|Eon-deo-keot an na-ge hae|Chú ý không để xảy ra lỗi lẹm chân hàn (undercut) do dòng điện quá mức|Eon-deo-keot an na-ge hae|धेरै करेन्टले गर्दा प्लेटको किनारमा खाल्डो (अन्डरकट) पर्न नदिनुहोस्|Eon-deo-keot an na-ge hae|용접 시 전류가 너무 높거나 운빙 속도가 부적절할 때 모재가 녹아 파인 채 쇳물로 채워지지 않는 결함(Undercut)이 발생하므로, 적절한 용접 조건을 유지하여 피로 강도 저하를 막으라는 경고입니다.|Peringatan untuk menjaga parameter las yang tepat guna mencegah undercut, yaitu cacat di mana logam dasar meleleh dan tidak terisi cairan las akibat arus terlalu tinggi atau kecepatan yang salah, yang dapat menurunkan kekuatan lelah material.|Cảnh báo duy trì điều kiện hàn phù hợp để ngăn ngừa lỗi lẹm chân (undercut) – hiện tượng kim loại cơ bản bị chảy rãnh mà không được lấp đầy do dòng điện quá cao hoặc tốc độ sai, làm giảm độ bền mỏi của vật liệu.|वेल्डिङ गर्दा करेन्ट धेरै उच्च वा गति नमिल्दा बेस मेटल पग्लिएर खाल्डो परी पग्लेको फलामले नभरिने खराबी (Undercut) उत्पन्न हुने भएकोले, धातुको थकान शक्ति कम हुन नदिन उचित वेल्डिङ अवस्था कायम राख्ने चेतावनी हो।",

      "판넬조립부|용접/작업|리꾸 박아라|조립 간격이 뻥 뚫려 넓은 곳은 용접 비드를 다층으로 쌓아 메꾸세요|Lakukan las tumpuk (build-up) bertahap pada celah rakitan yang terlalu lebar|Ri-kku ba-ga-ra|Hàn đắp nhiều lớp (build-up) để lấp đầy các khoảng hở lắp ráp quá lớn|Ri-kku ba-ga-ra|जोड्ने ग्याप धेरै फराकिलो भएको ठाउँमा वेल्डिङ बिडलाई धेरै तहमा थुपारेर भर्नुहोस्|Ri-kku ba-ga-ra|오취부나 절단 불량으로 인해 루트 갭이 허용 한도를 초과했을 때, 덧판을 사용하지 않고 쇳물을 바닥부터 여러 층(Multi-pass)으로 두껍게 쌓아 올려 틈새를 메우는 보수 용접(육성 용접)을 실시하라는 현장어입니다.|Istilah lapangan untuk melakukan las perbaikan (build-up weld) dengan menumpuk cairan logam lapis demi lapis (multi-pass) dari dasar untuk mengisi celah akar yang melebihi batas toleransi akibat salah potong atau penyetelan, tanpa plat tambahan.|Thuật ngữ hiện trường chỉ việc thực hiện hàn sửa chữa (hàn đắp) bằng cách xếp chồng nhiều lớp nước thép (multi-pass) từ đáy lên để lấp kín khe hở gốc vượt quá giới hạn cho phép do lỗi cắt hoặc gá lắp, mà không dùng tấm ốp.|गलत फिटिङ वा कटिङको खराबीले गर्दा रुट ग्यापले अनुमति दिइएको सीमा पार गर्दा, अतिरिक्त प्लेट प्रयोग नगरी पग्लेको फलामलाई पिंधदेखि धेरै तहमा (Multi-pass) बाक्लो गरी थुपारेर ग्याप भर्ने मर्मत वेल्डिङ (육성 용접) गर्ने साइटको शब्द हो।",

      "판넬조립부|용접/작업|와이어 잘 나오나 봐|용접기 토치에서 와이어 송급이 끊기지 않고 부드럽게 나오는지 점검하세요|Periksa apakah suplai kawat las dari obor keluar dengan lancar tanpa macet|Wa-i-eo jal na-o-na bwa|Kiểm tra xem dây cáp hàn được cấp ra từ súng hàn có mượt mà liên tục không|Wa-i-eo jal na-o-na bwa|वेल्डिङ टर्चबाट तार नरोकिकन राम्रोसँग निस्किएको छ कि जाँच्नुहोस्|Wa-i-eo jal na-o-na bwa|CO2 반자동 용접 시 송급기(Feeder) 모터 불량이나 라이너 막힘 현상 없이, 와이어가 노즐 끝에서 일정한 속도로 안정적으로 배출되는지 작업 전 허공에 분사하여 테스트하라는 지시입니다.|Instruksi untuk menguji semprotan kawat las ke udara sebelum bekerja guna memastikan kawat keluar dengan kecepatan stabil dari nosel tanpa kendala dari motor feeder atau sumbatan liner pada mesin las semi-otomatis CO2.|Chỉ thị xịt thử dây hàn ra không trung trước khi làm việc để đảm bảo dây được đẩy ra với tốc độ ổn định từ đầu bép mà không bị lỗi mô tơ cấp dây hoặc tắc nghẽn ống ruột gà trong quá trình hàn bán tự động CO2.|CO2 अर्ध-स्वचालित वेल्डिङ गर्दा फिडर मोटरको खराबी वा लाइनर जाम नभई, तार नोजलको टुप्पाबाट एकनासको गतिमा स्थिर रूपमा निस्किएको छ कि छैन भनेर काम गर्नु अघि हावामा हानेर टेस्ट गर्ने निर्देशन हो।",

      "판넬조립부|용접/작업|와이어 교체해|용접기 뒤쪽에 다 쓴 롤 단위의 철사(와이어) 통을 새것으로 바꾸세요|Ganti gulungan kawat las yang sudah habis dengan drum yang baru|Wa-i-eo gyo-che-hae|Thay cuộn cáp hàn đã dùng hết bằng cuộn mới|Wa-i-eo gyo-che-hae|वेल्डिङ मेसिनको पछाडि सकिएको तारको रोललाई नयाँसँग फेर्नुहोस्|Wa-i-eo gyo-che-hae|용접 재료인 와이어 스풀(드럼)의 잔량이 소진되었을 때, 용접 품질 저하 및 작업 중단을 막기 위해 자재 창고에서 규격에 맞는 새로운 와이어 드럼을 수령하여 신속하게 장비에 교체 세팅하라는 의미입니다.|Artinya mengambil drum kawat baru dengan spesifikasi yang tepat dari gudang dan segera menyetelnya di mesin saat gulungan bahan kawat las habis, guna mencegah penurunan kualitas las dan berhentinya pekerjaan.|Nghĩa là nhận cuộn cáp hàn mới đúng quy cách từ kho vật tư và nhanh chóng lắp đặt thay thế vào máy khi cuộn vật liệu hàn đã cạn, nhằm ngăn ngừa giảm chất lượng hàn và gián đoạn công việc.|वेल्डिङको सामग्री हुने तारको स्पुल (ड्रम) को मात्रा सकिन लाग्दा, वेल्डिङको गुणस्तर घट्ने र काम रोकिने अवस्थाबाट बच्न सामग्री गोदामबाट मापदण्ड अनुसारको नयाँ तारको ड्रम लिएर छिटो मेसिनमा सेटिङ गरी फेर्ने अर्थ हो।",

      "판넬조립부|용접/작업|어스 제대로 집어|아크가 잘 튀도록 용접 접지(어스) 집게를 페인트 안 묻은 철판에 꽉 물리세요|Jepit klem massa (grounding) dengan benar pada plat bersih bebas cat agar busur stabil|Eo-seu je-dae-ro ji-beo|Kẹp dây tiếp địa (mát) thật chặt vào vị trí thép không có sơn để mồi hồ quang tốt|Eo-seu je-dae-ro ji-beo|आर्क राम्रोसँग निस्कनको लागि अर्थिङ क्ल्याम्पलाई पेन्ट नभएको फलाममा कडा गरी जोड्नुहोस्|Eo-seu je-dae-ro ji-beo|아크 용접의 안정적인 전류 회로 구성을 위해, 부도체인 페인트나 녹이 없는 모재 표면을 찾아 그라인딩 한 후 접지 클램프(어스)를 단단히 물려 통전 불량으로 인한 아크 끊김을 예방하라는 주의 사항입니다.|Peringatan untuk mencari permukaan logam bebas cat atau karat (non-konduktor), menggerindanya, lalu menjepit klem grounding dengan kuat demi menciptakan sirkuit arus las busur yang stabil dan mencegah putusnya busur las akibat aliran listrik yang buruk.|Lưu ý tìm bề mặt kim loại không dính sơn hoặc gỉ sét (vật liệu cách điện), mài nhẵn rồi kẹp chặt kẹp tiếp đất để thiết lập mạch điện hàn hồ quang ổn định, phòng ngừa hồ quang bị ngắt quãng do tiếp điện kém.|आर्क वेल्डिङको स्थिर करेन्ट सर्किट बनाउनको लागि, करेन्ट नबग्ने पेन्ट वा खिया नभएको बेस मेटलको सतह खोजेर ग्राइन्डिङ गरेपछि अर्थिङ क्ल्याम्पलाई कडा गरी कसेर करेन्ट राम्रोसँग नबग्दा आर्क चुँडिने समस्या रोक्ने सावधानी हो।",

      "판넬조립부|용접/작업|토치 노즐 닦아|가스가 안 막히게 용접 토치 끝에 붙은 찌꺼기들을 전용 펜치로 긁어내세요|Bersihkan sisa terak di ujung nosel obor menggunakan tang khusus agar gas pelindung tidak tersumbat|To-chi no-jeul da-kka|Dùng kìm chuyên dụng cạo sạch cặn xỉ bám ở đầu bép hàn để không làm tắc khí bảo vệ|To-chi no-jeul da-kka|ग्यास नरोकिने गरी वेल्डिङ टर्चको टुप्पाको फोहोर विशेष पिलासले सफा गर्नुहोस्|To-chi no-jeul da-kka|용접 중 튀어 노즐 내부에 고착된 스패터(쇳물 찌꺼기)가 쉴딩 가스(보호 가스)의 배출을 방해하여 기공(Porosity) 결함을 유발하므로, 웰딩 플라이어로 이를 주기적으로 긁어내 청결을 유지하라는 뜻입니다.|Artinya rutin membersihkan spatter (sisa percikan besi) yang menempel di dalam nosel menggunakan tang las (welding plier), karena sumbatan tersebut menghalangi keluarnya gas pelindung dan memicu cacat pori (porosity).|Nghĩa là dùng kìm hàn cạo sạch định kỳ xỉ kim loại (spatter) bám cứng bên trong bép hàn, vì sự tắc nghẽn này cản trở khí bảo vệ thoát ra và gây ra khuyết tật rỗ khí (porosity).|वेल्डिङ गर्दा उछिट्टिएर नोजलभित्र जमेको स्पाटर (पग्लेको फलामको फोहोर) ले शिल्डिङ ग्यास (सुरक्षा ग्यास) निस्कन रोकेर प्वाल पर्ने (Porosity) खराबी निम्त्याउने भएकोले, वेल्डिङ प्लायरले समय-समयमा खोस्रेर सफा राख्ने अर्थ हो।",

      "판넬조립부|검사/수정|정반 수평 확인해|블록 조립을 시작할 바닥(정반)이 기울어지지 않고 100% 평평한지 체크하세요|Verifikasi kerataan 100% meja kerja (pelat dasar) sebelum memulai perakitan blok|Jeong-ban su-pyeong hwa-gin-hae|Kiểm tra độ cân bằng tuyệt đối 100% của bàn thao tác (sàn thép) trước khi lắp ráp block|Jeong-ban su-pyeong hwa-gin-hae|ब्लक जोड्न सुरु गर्ने भुइँ (टेबल) नढल्की पूर्ण रूपमा समतल छ कि जाँच्नुहोस्|Jeong-ban su-pyeong hwa-gin-hae|초대형 블록 조립의 치수 정밀도를 확보하기 위한 사전 검사로, 조립의 기준이 되는 바닥 철판(정반)이 외부 하중에 의해 침하되거나 기울어지지 않았는지 레이저 레벨기 등을 이용하여 평탄도를 엄격히 검증하라는 지시입니다.|Instruksi pra-inspeksi ketat untuk memverifikasi kerataan pelat lantai acuan (meja kerja) menggunakan laser level, memastikan tidak ada penurunan atau kemiringan akibat beban luar, demi menjaga presisi dimensi perakitan blok raksasa.|Chỉ thị tiền kiểm tra nghiêm ngặt bằng máy đo vạch laser để xác minh độ phẳng của sàn thép tiêu chuẩn, đảm bảo không bị sụt lún hay nghiêng lệch do tải trọng bên ngoài, nhằm bảo đảm độ chính xác kích thước khi lắp ráp block siêu lớn.|अति ठूलो ब्लक जोड्दा नापको शुद्धता कायम राख्नको लागि गरिने पूर्व-परीक्षण हो, जोड्ने आधार हुने भुइँको फलामको प्लेट (टेबल) बाहिरी भारले भासिएको वा ढल्किएको छ कि छैन भनेर लेजर लेभल मेसिन आदि प्रयोग गरी समतलतालाई कडा रूपमा जाँच्ने निर्देशन हो।",

      "판넬조립부|검사/수정|똥 제거해|도장 불량 방지를 위해 용접 비드 표면의 슬래그 찌꺼기를 망치로 털어내세요|Bersihkan terak las (slag) di permukaan bead menggunakan palu untuk mencegah cacat pengecatan|Ttong je-geo-hae|Dùng búa gõ sạch xỉ hàn trên bề mặt đường vảy hàn để ngăn ngừa lỗi lớp sơn|Ttong je-geo-hae|पेन्टिङ बिग्रिन नदिन वेल्डिङ बिडको सतहको स्ल्यागलाई मार्तोलले झारेर हटाउनुहोस्|Ttong je-geo-hae|용접 완료 후 비드 표면을 덮고 있는 산화물 껍질인 슬래그(현장어 똥)를 치핑 해머로 완벽하게 타격하여 제거함으로써, 후속 페인트 도장 공정에서 도막 박리 현상이 발생하지 않도록 표면을 조도 처리하라는 의미입니다.|Artinya memukul habis kerak oksida (slag) yang menutupi permukaan bead las menggunakan chipping hammer setelah mengelas, guna mempersiapkan kekasaran permukaan dan mencegah terkelupasnya cat pada proses pengecatan selanjutnya.|Nghĩa là dùng búa gõ xỉ đập vỡ hoàn toàn lớp vỏ oxit (xỉ hàn) bao phủ trên bề mặt vảy kim loại sau khi hàn, để xử lý độ nhám bề mặt và ngăn ngừa hiện tượng bong tróc màng sơn trong công đoạn sơn tiếp theo.|वेल्डिङ सकिएपछि बिडको सतहलाई ढाक्ने अक्साइडको बोक्रा स्ल्याग (साइटको भाषामा तौङ) लाई चिपिङ ह्यामरले पूर्ण रूपमा ठोकेर हटाएर, पछिको पेन्टिङ प्रक्रियामा पेन्ट उप्किने समस्या नहोस् भनेर सतहलाई तयार पार्ने अर्थ हो।",

      "판넬조립부|장비/공구|마그네트 써|바닥에 용접으로 피스를 박기 힘들 때 스위치를 켜면 딱 달라붙는 강력 자석 블록을 쓰세요|Gunakan blok magnet kuat sebagai pengganti piece las di area yang tidak boleh dilas|Ma-geu-ne-teu sseo|Sử dụng khối nam châm từ tính mạnh thay cho việc hàn piece xuống sàn|Ma-geu-ne-teu sseo|भुइँमा पिस वेल्डिङ गर्न गाह्रो हुँदा स्विच अन गरेपछि टाँसिने बलियो चुम्बक ब्लक प्रयोग गर्नुहोस्|Ma-geu-ne-teu sseo|박판 변형 우려나 도장 완료로 인해 가접 피스를 사용할 수 없는 특수 구역에서 부재를 당겨야 할 경우, 레버 조작만으로 모재에 수백 kg의 자력으로 부착되는 영구 마그네트 블록을 앵커 포인트로 활용하라는 스마트 공구 사용 지시입니다.|Instruksi penggunaan perkakas pintar: Jika harus menarik komponen di area khusus yang tak boleh dilas piece (karena takut pelat tipis bengkok atau sudah dicat), manfaatkan blok magnet permanen yang menempel dengan gaya ratusan kilo hanya dengan memutar tuas, jadikan itu titik tumpu jangkar.|Chỉ thị sử dụng dụng cụ thông minh: Khi cần kéo cấu kiện ở những khu vực đặc biệt không được phép hàn đính piece (do sợ biến dạng thép mỏng hoặc đã sơn xong), hãy dùng khối nam châm vĩnh cửu có sức hút hàng tạ chỉ bằng thao tác vặn cần gạt để làm điểm neo tì.|पातलो प्लेट बाङ्गिने डर वा पेन्टिङ सकिएको कारणले अस्थायी पिस प्रयोग गर्न नमिल्ने विशेष क्षेत्रमा पार्ट्स तान्नुपर्दा, लेभर घुमाएर मात्र बेस मेटलमा सयौं केजीको चुम्बकीय शक्तिले टाँ시ने स्थायी म्याग्नेट ब्लकलाई एन्कर पोइन्टको रूपमा प्रयोग गर्ने स्मार्ट औजार प्रयोगको निर्देशन हो।",

      "판넬조립부|장비/공구|인치 당겨|벌어진 부재를 강하게 끌어당기기 위해 수동 체인 윈치(레버 풀러)를 걸고 깔깔이로 당기세요|Gunakan chain lever block (katrol rantai manual) untuk menarik paksa komponen yang merenggang|In-chi dang-gyeo|Dùng palăng xích lắc tay kéo mạnh để khép kín khoảng cách cấu kiện bị hở|In-chi dang-gyeo|फाटेको पार्ट्सलाई बलियो गरी तान्न म्यानुअल चेन विन्च (लेभर पुलर) अड्काएर र्याचेटले तान्नुहोस्|In-chi dang-gyeo|강재의 자체 응력으로 인해 조립 간격이 수십 센티미터 이상 심하게 벌어져 인력 조립이 불가능할 때, 양측 부재에 러그를 용접하고 체인형 수동 레버 풀러를 연결하여 지렛대의 힘으로 강력하게 장력을 가해 틈을 좁히라는 하드웨어적 조립 지시입니다.|Instruksi perakitan perangkat keras: saat jarak rakit menganga parah puluhan cm akibat tegangan baja dan mustahil ditarik manusia, las lug di kedua sisi, kaitkan katrol rantai tuas manual (lever puller), lalu tarik paksa celah itu menggunakan gaya ungkit untuk merapatkannya.|Chỉ thị lắp ráp cơ học: khi khoảng cách lắp ráp bị hở hàng chục cm do ứng suất thép và sức người không thể khép lại, hãy hàn lug vào hai bên, mắc palăng xích gạt tay vào rồi dùng lực đòn bẩy kéo thít mạnh dạn thu hẹp khe hở lại.|फलामको आफ्नै तनावको कारणले जोड्ने ग्याप दशौं सेन्टिमिटरभन्दा बढी नराम्रोसँग फाटेर मानिसको बलले जोड्न असम्भव हुँदा, दुवै पार्ट्समा रग वेल्डिङ गरी चेन आकारको म्यानुअल लेभर पुलर जोडेर लिभरको बलले कडा तनाव दिई ग्याप साँघुरो बनाउने हार्डवेयर जडानको निर्देशन हो।",

      "판넬조립부|장비/공구|레바 땡겨|부품을 조립 위치로 끌어오기 위해 레버 블록을 걸고 손잡이를 왕복으로 당기세요|Gunakan lever block (tuas penarik kawat) untuk menarik komponen ke posisi perakitan|Re-ba ttaeng-gyeo|Mắc palăng lắc tay và gạt cần tới lui để kéo linh kiện vào vị trí lắp ráp|Re-ba ttaeng-gyeo|पार्ट्सलाई जोड्ने ठाउँमा ल्याउन लेभर ब्लक अड्काएर ह्यान्डललाई तलमाथि तान्नुहोस्|Re-ba ttaeng-gyeo|'인치 당겨'와 목적은 동일하나 체인 대신 와이어 로프가 감겨 있는 소형 수동 윈치(와이어 풀러, 레버 블록)를 이용하는 공정입니다. 장비의 중심을 미세하게 맞추거나 벌어진 틈새를 좁히기 위해 손잡이를 왕복 운동하여 장력을 발생시켜 끌어오라는 지시입니다.|Proses yang tujuannya sama dengan 'Tarik in-chi', namun menggunakan kerekan manual kecil dengan tali kawat baja (wire puller / lever block) alih-alih rantai. Instruksi untuk mengayunkan tuas maju mundur guna menciptakan tegangan tarikan saat menyetel presisi pusat mesin atau menyempitkan celah.|Quy trình có cùng mục đích với 'Kéo in-chi', nhưng sử dụng tời quay tay cỡ nhỏ cuốn cáp thép (wire puller / lever block) thay vì xích. Chỉ thị yêu cầu gạt cần tới lui tạo lực căng kéo linh kiện nhằm vi chỉnh tâm thiết bị hoặc thu hẹp khe hở.|'इन्ची तान' सँग उद्देश्य एउटै भए पनि चेनको सट्टा फलामको तार (वायर रोप) बेरिएको सानो म्यानुअल विन्च (वायर पुलर, लेभर ब्लक) प्रयोग गर्ने प्रक्रिया हो। उपकरणको केन्द्रलाई थोरै मिलाउन वा फाटेको ग्यापलाई साँघुरो बनाउन ह्यान्डललाई तलमाथि गर्दै तनाव उत्पन्न गरेर तान्ने निर्देशन हो।",

      "판넬조립부|장비/공구|깔깔이로 작업해|좁은 공간에서 볼트를 빨리 조이기 위해 따르륵 소리가 나는 라쳇 렌치 수공구를 쓰세요|Gunakan kunci pas ratchet (kalkali) untuk mengencangkan baut dengan cepat di ruang sempit|Kkal-kkal-i-ro ja-geop-hae|Sử dụng cờ lê cóc (ratchet) kêu lách cách để siết bu lông nhanh trong không gian hẹp|Kkal-kkal-i-ro ja-geop-hae|साँघुरो ठाउँमा बोल्टलाई छिटो कस्न ताररर आवाज आउने र्याचेट रेन्च हाते औजार प्रयोग गर्नुहोस्|Kkal-kkal-i-ro ja-geop-hae|일반 스패너의 회전 반경이 확보되지 않는 협소한 구역에서 볼트 체결 작업을 수행할 때, 공구를 분리하지 않고 일방향 연속 회전이 가능하여 작업 속도를 비약적으로 높여주는 라쳇 렌치(현장 은어 깔깔이)를 활용하라는 공구 선택 지시입니다.|Instruksi pemilihan alat: saat mengencangkan baut di ruang sempit yang tidak muat untuk memutar spanner biasa, gunakan ratchet wrench (slang: kalkali) yang bisa berputar satu arah terus-menerus tanpa dicabut-pasang, sehingga mempercepat pekerjaan secara drastis.|Chỉ thị chọn công cụ: khi siết bu lông ở khu vực chật hẹp không đủ vòng xoay cho cờ lê thường, hãy sử dụng cờ lê cóc (ratchet) có khả năng quay liên tục một chiều mà không cần rút ra đút vào, giúp tăng tốc độ làm việc đáng kể.|सामान्य रेन्च घुम्ने ठाउँ नभएको साँघुरो क्षेत्रमा बोल्ट कस्ने काम गर्दा, औजार ननिकालिकन एक दिशामा लगातार घुम्न सक्ने र कामको गतिलाई एकदमै बढाउने र्याचेट रेन्च (साइटको शब्द क्यालकयाली) प्रयोग गर्ने औजार छनौटको निर्देशन हो。",

      "판넬조립부|장비/공구|썰어브러|잘못 조립되어 튀어나온 쇳조각이나 임시 피스를 산소 절단기나 그라인더로 싹둑 잘라내 버리세요|Potong dan buang potongan besi atau piece sementara yang salah rakit menggunakan pemotong gas|Sseo-reo-beu-reo|Cắt bỏ các mảnh sắt hoặc piece gá tạm bị nhô ra do lắp sai bằng máy cắt gas|Sseo-reo-beu-reo|गलत फिटिङ भएर बाहिर निस्केको फलामको टुक्रा वा अस्थायी पिसलाई अक्सिजन कटर वा ग्राइन्डरले काटेर फालिदिनुहोस्|Sseo-reo-beu-reo|오취부된 부재나 공정이 완료되어 불필요해진 양중 러그, 가고정용 피스 등이 후속 작업의 간섭 요소가 될 때, 산소 절단기나 대형 그라인더를 동원하여 원 모재에 손상이 가지 않도록 주의하며 신속하게 절단해 해체하라는 투박한 현장 해체 명령입니다.|Perintah pembongkaran kasar di lapangan: saat komponen salah rakit, lug angkat yang tak terpakai, atau piece penahan jadi penghalang proses selanjutnya, kerahkan pemotong gas oksigen atau gerinda besar untuk memotong dan menyingkirkannya dengan cepat tanpa merusak logam dasar.|Lệnh phá dỡ thô bạo tại hiện trường: khi cấu kiện lắp sai, lug cẩu hết giá trị, hoặc piece gá tạm trở thành chướng ngại vật cho công đoạn sau, hãy huy động súng cắt gas hoặc máy mài lớn nhanh chóng xẻo đứt dọn dẹp chúng mà không làm hỏng vật liệu gốc.|गलत फिटिङ भएको पार्ट्स वा काम सकिएर अनावश्यक भएको लिफ्टिङ रग, अस्थायी फिक्सिङ पیس आदि पछिको काममा बाधा पुग्ने तत्व हुँदा, अक्सिजन कटर वा ठूलो ग्राइन्डर प्रयोग गरी मूल धातुमा क्षति नहुने गरी ध्यान दिंदै छिटो काटेर भत्काउने खस्रो साइटको भत्काउने आदेश हो।",

      "판넬조립부|장비/공구|문대브러|절단하고 남은 날카로운 끄투머리나 지저분한 용접부를 사상 그라인더로 깨끗하게 밀어버리세요|Haluskan sudut sisa potongan tajam atau lasan kotor menggunakan gerinda besar|Mun-dae-beu-reo|Dùng máy mài đánh nhẵn phẳng các mép cắt sắc nhọn hoặc phần mối hàn nham nhở|Mun-dae-beu-reo|काटेर बाँकी रहेको तीखो टुप्पा वा फोहोर वेल्डिङ भागलाई सासाङ ग्राइन्डरले सफासँग घोट्नुहोस्|Mun-dae-beu-reo|산소 절단 후 발생한 거칠고 예리한 절단면의 잔여물이나 비정상적으로 부풀어 오른 불량 용접 비드를 고중량 사상 그라인더를 사용하여 모재 표면과 굴곡 없이 매끄럽게 동일한 평면으로 연마해 마감하라는 의미의 변형된 사투리 지시어입니다.|Slang modifikasi yang berarti instruksi finishing: gunakan gerinda poles berat untuk menggerus dan menghaluskan residu tajam bekas potongan oksigen atau bead las cacat yang menonjol agar rata dan mulus menyatu dengan permukaan logam dasar.|Từ lóng địa phương biến thể mang nghĩa chỉ thị hoàn thiện: dùng máy mài công suất lớn chà xát san phẳng các cặn bã sắc nhọn dính lại sau khi cắt gas hoặc đường vảy hàn lỗi lồi lõm sao cho láng mịn và nhẵn nhụi đồng mức với bề mặt thép.|अक्सिजनले काटेपछि निस्केको खस्रो र तीखो काटिएको भागको अवशेष वा अस्वाभाविक रूपमा उठेको खराब वेल्डिङ बिडलाई भारी सासाङ ग्राइन्डर प्रयोग गरेर बेस मेटलको सतहसँग तलमाथि नहुने गरी चिल्लो र एउटै समतलतामा घोटेर अन्तिम रूप दिने अर्थको बदलिएको स्थानीय लवजको निर्देशन हो।",

      "판넬조립부|장비/공구|가스통 바꿔|용접기 가스 게이지가 바닥났으니 즉시 창고에서 꽉 찬 산소 또는 CO2 실린더로 굴려서 교체하세요|Segera ganti tabung silinder gas pelindung (CO2/Oksigen) yang kosong dengan yang baru|Ga-seu-tong ba-kkwo|Đổi bình khí bảo vệ (CO2/Oxy) đã cạn bằng bình đầy mới ngay lập tức|Ga-seu-tong ba-kkwo|वेल्डिङ मेसिनको ग्यास गेज सकिएकोले तुरुन्तै गोदामबाट भरिएको अक्सिजन वा CO2 सिलिन्डर ल्याएर फेर्नुहोस्|Ga-seu-tong ba-kkwo|용접 중 쉴딩 가스(CO2, 아르곤 등)가 소진되어 압력 게이지가 0을 가리키면 즉각적으로 블로우홀(기공) 등 치명적인 용접 결함이 발생하므로, 즉시 아크를 중단하고 자재 창고에서 충전된 무거운 새 가스 실린더를 안전하게 운반하여 장비에 교체 체결하라는 필수 장비 점검 지시입니다.|Instruksi perawatan alat mutlak: jika gas pelindung (CO2, Argon) habis dan jarum tekanan nol saat mengelas, cacat pori fatal (blowhole) akan instan terjadi. Hentikan busur segera, bawa silinder gas baru yang berat dari gudang dengan aman, dan ganti pasang ke mesin.|Chỉ thị kiểm tu thiết bị bắt buộc: nếu khí bảo vệ (CO2, Argon) cạn kiệt làm đồng hồ áp suất rớt về 0 khi đang hàn, khuyết tật rỗ khí (blowhole) chí mạng sẽ phát sinh tức khắc. Dừng hồ quang ngay, vận chuyển an toàn bình khí mới nặng nề từ kho tới và thay lắp vào máy.|वेल्डिङ गर्दा शिल्डिङ ग्यास (CO2, आर्गन आदि) सकिएर प्रेसर गेजले ० देखाएमा तुरुन्तै ब्लोहोल (प्वाल) जस्ता ज्यानमारा वेल्डिङ खराबी उत्पन्न हुने भएकोले, तुरुन्तै आर्क रोकेर सामग्री गोदामबाट भरिएको भारी नयाँ ग्यास सिलिन्डर सुरक्षित रूपमा ढुवानी गरी उपकरणमा फेरेर जोड्ने अनिवार्य उपकरण जाँचको निर्देशन हो।",

      "선행도장부|도장/스프레이|리스프레이 들어가|품질 불량으로 인해 해당 구역을 다시 칠하세요|Lakukan penyemprotan ulang karena kualitas yang buruk di area tersebut|Ri-seu-peu-re-i deu-reo-ga|Tiến hành phun sơn lại khu vực đó do chất lượng kém|Ri-seu-peu-re-i deu-reo-ga|गुणस्तर खराब भएकोले त्यो क्षेत्रमा फेरि स्प्रे गर्नुहोस्|Ri-seu-peu-re-i deu-reo-ga|페인트 흐름(Sagging) 현상이 발생했거나 표면 이물질 과다 부착 등으로 도장 검사에 불합격한 경우, 불량 도막을 연마하여 제거한 후 스프레이 도장을 재시공하라는 지시입니다.|Jika terjadi cat menetes (sagging) atau gagal inspeksi karena terlalu banyak kotoran di permukaan, instruksi untuk mengamplas lapisan cat yang cacat lalu menyemprotkan cat ulang.|Trường hợp xảy ra hiện tượng chảy sơn (sagging) hoặc không đạt kiểm tra sơn do có quá nhiều tạp chất trên bề mặt, đây là chỉ thị mài bỏ lớp sơn lỗi rồi tiến hành phun sơn lại.|पेन्ट बग्ने (Sagging) समस्या भएको वा सतहमा धेरै बाहिरी वस्तु टाँसिएर पेन्टिङ परीक्षणमा फेल भएको अवस्थामा, खराब पेन्टको तहलाई घोटेर हटाएपछि फेरि स्प्रे पेन्टिङ गर्ने निर्देशन हो。",

      "선행도장부|도장/스프레이|함 더 칠해|도막 두께 확보를 위해 한 번 더 추가 도장하세요|Lakukan pengecatan tambahan satu kali lagi untuk memastikan ketebalan lapisan cat|Ham deo chil-hae|Hãy sơn thêm một lớp nữa để đảm bảo độ dày màng sơn|Ham deo chil-hae|पेन्टको मोटाइ पुर्याउन एक पटक थप पेन्ट गर्नुहोस्|Ham deo chil-hae|도막 측정기로 건조 도막 두께(DFT)를 측정한 결과 규정치(마이크론)에 미달할 경우, 방청 및 보호 성능을 보장하기 위해 해당 구역에 추가 도장을 실시하라는 뜻입니다.|Jika ketebalan film kering (DFT) yang diukur dengan alat ukur ketebalan cat kurang dari standar (mikron), artinya oleskan cat tambahan pada area tersebut untuk menjamin kinerja anti-karat dan perlindungan.|Nếu đo độ dày màng sơn khô (DFT) bằng máy đo độ dày cho thấy chưa đạt mức quy định (micron), nghĩa là phải sơn thêm lên khu vực đó để đảm bảo khả năng chống gỉ và bảo vệ.|सुकेपछि पेन्टको मोटाई नाप्ने यन्त्रले नाप्दा (DFT) तोकिएको मापदण्ड (माइक्रोन) भन्दा कम भएमा, खिया रोकथाम र सुरक्षा क्षमता सुनिश्चित गर्न त्यो क्षेत्रमा थप पेन्ट गर्ने अर्थ हो।",

      "선행도장부|도장/스프레이|스프레이 거리 유지해|일정한 도막을 위해 분사 거리를 조절하세요|Sesuaikan jarak penyemprotan untuk mendapatkan lapisan cat yang seragam|Seu-peu-re-i geo-ri yu-ji-hae|Điều chỉnh khoảng cách phun để màng sơn được đồng đều|Seu-peu-re-i geo-ri yu-ji-hae|पेन्ट एकनास बनाउन स्प्रेको दूरी मिलाउनुहोस्|Seu-peu-re-i geo-ri yu-ji-hae|스프레이 건의 분사 거리가 너무 가까우면 도료가 뭉쳐 흐르고, 너무 멀면 흩날려 표면이 거칠어지므로 고품질 도장을 위해 항상 30~40cm의 최적 거리를 유지하라는 기술적 권고입니다.|Saran teknis: jika jarak penyemprotan terlalu dekat cat akan menggumpal dan mengalir, jika terlalu jauh akan menyebar dan permukaan jadi kasar. Jaga selalu jarak optimal 30-40 cm demi pengecatan berkualitas tinggi.|Khuyến cáo kỹ thuật: nếu súng phun quá gần sơn sẽ đọng chảy, nếu quá xa sẽ bay dạt làm bề mặt sần sùi. Luôn duy trì khoảng cách tối ưu từ 30-40cm để đạt chất lượng sơn cao.|स्प्रे गनको दूरी धेरै नजिक भएमा पेन्ट जमेर बग्ने र धेरै टाढा भएमा उडेर सतह खस्रो हुने भएकोले उच्च गुणस्तरको पेन्टिङको लागि सधैं ३०-४० सेन्टिमिटरको उचित दूरी कायम राख्ने प्राविधिक सल्लाह हो।",

      "선행의장부|도장/스프레이|퍼스트 뿌려|부식 방지를 위해 1차 하도 도장을 하세요|Lakukan pengecatan dasar (primer) tahap pertama untuk mencegah korosi|Peo-seu-teu ppu-ryeo|Phun lớp sơn lót (primer) thứ nhất để phòng chống ăn mòn|Peo-seu-teu ppu-ryeo|खिया लाग्न नदिन पहिलो तहको पेन्ट (प्राइमर) छर्कनुहोस्|Peo-seu-teu ppu-ryeo|블라스팅(전처리) 공정이 완료된 철판에 산화(녹)가 발생하기 전, 금속 모재와의 부착력이 가장 우수한 방청용 하도 페인트(프라이머)를 1차로 도포하라는 지시입니다.|Instruksi untuk segera mengoleskan cat dasar anti-karat (primer) pertama yang memiliki daya lekat terbaik dengan logam dasar, sebelum pelat baja hasil sandblasting (pra-perawatan) mengalami oksidasi (karat).|Chỉ thị thi công lớp sơn lót chống gỉ (primer) thứ nhất có độ bám dính tốt nhất với kim loại cơ bản lên tấm thép vừa hoàn thành phun cát (tiền xử lý) trước khi xảy ra quá trình oxy hóa (gỉ sét).|स्यान्डिङ (पूर्व-तयारी) सकिएको फलामको प्लेटमा अक्सिडेसन (खिया) हुन अघि, धातुसँग सबैभन्दा राम्रो टाँसिने खिया रोकथाम गर्ने आधार पेन्ट (प्राइमर) पहिलो पटक लगाउने निर्देशन हो।",

      "선행도장부|도장/스프레이|세컨 뿌려|방수 기능 강화를 위해 2차 중도 도장을 하세요|Lakukan pengecatan lapisan kedua (mid-coat) untuk memperkuat fungsi kedap air|Se-keon ppu-ryeo|Phun lớp sơn giữa (mid-coat) thứ hai để tăng cường chức năng chống thấm|Se-keon ppu-ryeo|पानी नपस्ने क्षमता बढाउन दोस्रो तहको पेन्ट छर्कनुहोस्|Se-keon ppu-ryeo|1차 하도 도장이 건조된 후, 외부 수분 및 오염 물질의 침투를 차단하고 도막의 두께를 형성하기 위해 방수 성능이 뛰어난 2차 페인트(중도 도장)를 시공하라는 지시입니다.|Instruksi kerja setelah cat dasar kering: terapkan cat kedua (mid-coat) yang tahan air untuk memblokir penetrasi kelembapan/kotoran eksternal dan membangun ketebalan lapisan cat.|Chỉ thị thi công sau khi lớp sơn lót khô: tiến hành lớp sơn thứ hai (lớp giữa) có khả năng chống thấm tuyệt vời để ngăn chặn độ ẩm và chất bẩn bên ngoài xâm nhập, đồng thời tạo độ dày cho màng sơn.|पहिलो पेन्ट सुकेपछि, बाहिरी पानी र फोहोर पस्न नदिन र पेन्टको मोटाइ बनाउन पानी नपस्ने क्षमता उत्कृष्ट भएको दोस्रो पेन्ट (मध्य तहको पेन्टिङ) गर्ने निर्देशन हो।",

      "선행도장부|장비/재료|총 확인해|스프레이 건의 압력과 패턴을 점검하세요|Periksa tekanan dan pola pistol semprot (spray gun)|Chong hwa-gin-hae|Kiểm tra áp suất và hình mẫu phun của súng phun sơn|Chong hwa-gin-hae|स्प्रे गनको प्रेसर र प्याटर्न जाँच्नुहोस्|Chong hwa-gin-hae|본 도장에 들어가기 전, '총'이라 불리는 에어리스 스프레이 건(Airless Spray Gun)의 토출 압력이 적절한지, 노즐 분사 패턴이 균일한지 시험 분사하여 장비 상태를 세팅하라는 의미입니다.|Artinya atur dan tes semprot kondisi alat Airless Spray Gun (disebut 'pistol') sebelum pengecatan utama, untuk memastikan apakah tekanan keluarannya pas dan pola semprotan noselnya seragam.|Nghĩa là trước khi sơn chính thức, hãy xịt thử để cài đặt trạng thái thiết bị súng phun yếm khí (Airless Spray Gun - gọi là 'súng'), đảm bảo áp suất xả phù hợp và hình mẫu phun của bép cắt đồng đều.|मुख्य पेन्टिङ सुरु गर्नु अघि, 'बन्दुक' भनिने एयरलेस स्प्रे गन (Airless Spray Gun) को फाल्ने प्रेसर ठीक छ कि छैन, नोजलको स्प्रे प्याटर्न एकनास छ कि छैन भनेर हावामा छर्केर उपकरणको अवस्था सेटिङ गर्ने अर्थ हो।",

      "선행도장부|장비/재료|마스킹 해|비도장 부위에 페인트 오염 방지 조치를 하세요|Terapkan tindakan pencegahan kontaminasi cat pada area yang tidak dicat (masking)|Ma-seu-king hae|Thực hiện che chắn (masking) để phòng chống nhiễm bẩn sơn lên vùng không sơn|Ma-seu-king hae|पेन्ट नहुने भागमा पेन्ट नलागोस् भनेर मास्किङ (कभर गर्ने काम) गर्नुहोस्|Ma-seu-king hae|페인트가 묻어서는 안 되는 용접 예정 부위, 정밀 기계 부품, 명판 등에 종이테이프나 비닐 마스킹 커버를 부착하여 도료 비산에 의한 오염을 사전에 차단하라는 지시입니다.|Instruksi menempelkan selotip kertas atau cover vinil masking pada area yang akan dilas nanti, suku cadang presisi, pelat nama, dll yang tidak boleh terkena cat, guna mencegah kontaminasi percikan cat sebelumnya.|Chỉ thị dán băng keo giấy hoặc tấm phủ nilon (masking) lên những vị trí dự định hàn, chi tiết máy chính xác, bảng tên v.v. tuyệt đối không được dính sơn, nhằm chặn trước sự nhiễm bẩn do bụi sơn bay vào.|पेन्ट लाग्न नहुने वेल्डिङ गरिने भाग, सूक्ष्म मेसिनका पार्ट्स, नेमप्लेट आदिमा कागजको टेप वा प्लास्टिकको मास्किङ कभर टाँसेर पेन्ट उडेर फोहोर हुने समस्यालाई पहिले नै छेक्ने निर्देशन हो।",

      "선행도장부|장비/재료|테이핑 해|보호 필름을 빈틈없이 견고하게 부착하세요|Tempelkan film pelindung (lakban) dengan rapat tanpa celah|Te-i-ping hae|Dán màng nilon bảo vệ thật chặt chẽ không để hở|Te-i-ping hae|सुरक्षा फिल्म (कभर) लाई खाली ठाउँ नछोडी बलियो गरी टाँस्नुहोस्|Te-i-ping hae|마스킹 작업 시 고압 스프레이 분사 바람에 의해 보호 필름이나 테이프가 벗겨지지 않도록 가장자리를 빈틈없이 견고하게 눌러 부착하라는 품질 관리 지시입니다.|Instruksi kontrol kualitas saat proses masking: tekan dan rekatkan bagian tepi film pelindung atau selotip dengan rapat tanpa celah agar tidak terkelupas oleh tiupan angin semprotan bertekanan tinggi.|Chỉ thị quản lý chất lượng trong lúc che chắn (masking): phải miết và dán thật chặt các mép của màng nilon bảo vệ hoặc băng keo không để hở, tránh bị gió của súng phun cao áp thổi bong tróc ra.|मास्किङ काम गर्दा उच्च प्रेसरको स्प्रेको हावाले सुरक्षा फिल्म वा टेप नउप्कियोस् भनेर किनारलाई खाली ठाउँ नछोडी बलियो गरी थिचेर टाँस्ने गुणस्तर व्यवस्थापनको निर्देशन हो।",

      "선행도장부|장비/재료|도막 측정기 가져와|건조 도막 두께 측정을 위한 계측기를 지참하세요|Bawa alat pengukur ketebalan lapisan cat kering|Do-mak cheuk-jeong-gi ga-jyeo-wa|Mang thiết bị đo độ dày màng sơn khô tới đây|Do-mak cheuk-jeong-gi ga-jyeo-wa|सुकेको पेन्टको मोटाई नाप्ने यन्त्र ल्याउनुहोस्|Do-mak cheuk-jeong-gi ga-jyeo-wa|도장 작업 완료 후 도막이 규정된 두께(DFT)를 만족하는지 검사하기 위해, 자성 또는 와전류 원리를 이용한 정밀 도막 두께 측정기를 현장으로 챙겨오라는 지시입니다.|Instruksi untuk membawa alat pengukur ketebalan lapisan presisi (magnetik/eddy current) ke lapangan untuk memeriksa apakah ketebalan cat kering (DFT) memenuhi spesifikasi standar setelah pengecatan selesai.|Chỉ thị mang máy đo độ dày màng sơn chính xác (nguyên lý từ tính hoặc dòng điện xoáy) ra hiện trường để kiểm tra xem màng sơn có đạt độ dày quy định (DFT) sau khi hoàn thành việc sơn hay không.|पेन्टिङ काम सकिएपछि पेन्टको मोटाई तोकिएको मापदण्ड (DFT) अनुसार छ कि छैन भनेर जाँच्नको लागि, चुम्बकीय वा एडी करेन्ट (Eddy Current) को नियम प्रयोग गर्ने सूक्ष्म पेन्ट मोटाई नाप्ने यन्त्र साइटमा लिएर आउने निर्देशन हो।",

      "선행도장부|장비/재료|훗까시 해|장비 내부 적체된 도료를 공기압으로 배출하세요|Buang cat yang mengendap di dalam peralatan menggunakan tekanan udara|Hut-kka-si hae|Dùng áp lực khí đẩy phần sơn ứ đọng bên trong thiết bị ra ngoài|Hut-kka-si hae|उपकरणभित्र जम्मा भएको पेन्टलाई हावाको प्रेसरले बाहिर निकाल्नुहोस्|Hut-kka-si hae|페인트 호스 및 펌프 내부에 남아있는 잔류 도료나 세척용 신나를 에어건의 압축 공기 라인에 연결하여 외부로 강하게 뿜어내어 라인을 비워내는 배출(Purge) 작업을 의미하는 현장어입니다.|Istilah lapangan yang berarti proses pembuangan (purge), yaitu menghubungkan selang cat dan pompa dengan saluran udara kompresor untuk menyemburkan kuat keluar sisa cat atau thinner pencuci guna mengosongkan jalur perpipaan internal.|Thuật ngữ xưởng chỉ công tác xả (purge), tức là kết nối ống sơn và bơm với đường khí nén của súng hơi để xịt mạnh tống khứ hết sơn hoặc dung môi rửa còn đọng bên trong ra ngoài, làm rỗng đường ống.|पेन्टको पाइप र पम्पभित्र बाँकी रहेको पेन्ट वा सफा गर्ने थिनरलाई एयर गनको प्रेसर हावाको लाइनसँग जोडेर बाहिरतिर जोडले फालेर लाइन खाली गर्ने निकाल्ने (Purge) कामलाई बुझाउने साइटको शब्द हो।",

      "선행도장부|장비/재료|신나 냄새 조심해|휘발성 증기로 인한 중독 방지를 위해 환기하세요|Ventilasikan ruangan untuk mencegah keracunan uap volatil (thinner)|Sin-na naem-sae jo-sim-hae|Hãy thông gió để phòng ngừa ngộ độc do hơi dung môi bay hơi|Sin-na naem-sae jo-sim-hae|वाष्पशील ग्यास (थिनर) बाट हुने विषालु असर रोक्न हावा खेल्ने व्यवस्था गर्नुहोस्|Sin-na naem-sae jo-sim-hae|밀폐된 선내 구역에서 신나 등 유기 용제를 사용할 때 발생하는 고농도 휘발성 가스 흡입으로 인한 중독 및 질식 사고를 막기 위해 방독 마스크 착용과 배풍기 환기를 철저히 하라는 경고입니다.|Peringatan untuk wajib memakai masker gas dan memastikan ventilasi pembuangan kipas berjalan maksimal demi mencegah kecelakaan keracunan/asfiksia akibat menghirup gas volatil konsentrasi tinggi saat memakai pelarut organik (thinner) di ruang kapal tertutup.|Cảnh báo yêu cầu tuân thủ nghiêm ngặt việc đeo mặt nạ phòng độc và bật quạt hút thông gió để ngăn ngừa tai nạn ngộ độc/ngạt thở do hít phải khí dễ bay hơi nồng độ cao sinh ra khi dùng dung môi hữu cơ (thinner) trong khu vực tàu kín.|बन्द जहाजभित्र थिनर जस्ता जैविक विलायक प्रयोग गर्दा निस्कने उच्च घनत्वको वाष्पशील ग्यास सास फेरेर हुने विषालु असर र निस्सासिने दुर्घटना रोक्नको लागि ग्यास मास्क लगाउने र ब्लोअरले हावा बाहिर फाल्ने व्यवस्थालाई कडाइका साथ पालना गर्ने चेतावनी हो।",

      "선행도장부|장비/재료|페인트 보관함 정리해|화재 예방을 위해 도료 주변 폐기물을 정리하세요|Rapikan limbah di sekitar cat untuk mencegah kebakaran|Pe-in-teu bo-gwan-ham jeong-ri-hae|Dọn dẹp rác thải quanh khu vực sơn để phòng chống hỏa hoạn|Pe-in-teu bo-gwan-ham jeong-ri-hae|आगलागी रोकथामको लागि पेन्ट वरपरको फोहोर व्यवस्थापन गर्नुहोस्|Pe-in-teu bo-gwan-ham jeong-ri-hae|인화성이 매우 높은 페인트와 신나가 적재된 보관장 주변에 널브러진 빈 캔, 기름 걸레 등 가연성 폐기물을 즉시 수거하여 자연 발화 및 대형 화재 사고를 선제적으로 예방하라는 안전 지시입니다.|Instruksi keselamatan proaktif untuk segera mengumpulkan limbah mudah terbakar seperti kaleng kosong dan kain lap oli yang berserakan di sekitar gudang penyimpanan cat dan thinner yang sangat mudah terbakar, guna mencegah pembakaran spontan dan kebakaran besar.|Chỉ thị an toàn phòng ngừa: yêu cầu thu gom ngay rác thải dễ cháy như vỏ lon rỗng, giẻ dính dầu vung vãi quanh kho chứa sơn và dung môi có tính bắt lửa cực cao, nhằm chặn trước nguy cơ tự bốc cháy và hỏa hoạn lớn.|धेरै चाँडै आगो लाग्ने पेन्ट र थिनर राखिएको भण्डारण स्थल वरपर छरिएका खाली टिन, तेल लागेको टालो जस्ता आगो लाग्ने फोहोरहरू तुरुन्तै उठाएर आफैं आगो लाग्ने र ठूलो आगलागी दुर्घटनालाई पहिले नै रोक्ने सुरक्षा निर्देशन हो।",

      "선행도장부|장비/재료|팁 가이드 확인해|스프레이 건 노즐의 안전 커버 장착을 확인하세요|Periksa pemasangan penutup pengaman (tip guide) pada nosel pistol semprot|Tip ga-i-deu hwa-gin-hae|Kiểm tra xem nắp bảo vệ an toàn (tip guide) của bép súng phun đã được gắn chưa|Tip ga-i-deu hwa-gin-hae|स्प्रे गनको नोजलमा सुरक्षा कभर (टिप गाइड) जडान भएको छ कि जाँच्नुहोस्|Tip ga-i-deu hwa-gin-hae|수백 바의 고압으로 페인트가 분사되는 에어리스 건의 오작동 시 인체에 직접 분사되는 치명상(인젝션 상해)을 방지하기 위해 노즐 앞에 팁 가이드(안전 커버)가 정상 장착되었는지 확인하라는 안전 점검입니다.|Pemeriksaan keselamatan untuk memastikan tip guide (cover pengaman) terpasang normal di depan nosel guna mencegah cedera injeksi fatal ke tubuh manusia jika pistol airless yang menyemprotkan cat bertekanan ratusan bar tidak sengaja meletus.|Mục kiểm tra an toàn xác nhận xem nắp bảo vệ bép phun (tip guide) đã gắn đúng chuẩn phía trước súng chưa, nhằm ngăn chặn tổn thương tiêm thủng da thịt chí mạng do sơn xịt trực tiếp vào người nếu súng yếm khí áp lực hàng trăm bar bị cướp cò.|सयौं बारको उच्च प्रेसरले पेन्ट छर्किने एयरलेस गन गल्तीले चल्दा शरीरमा सीधै छर्किएर हुने ज्यानमारा चोट (इन्जेक्सन चोट) रोक्नको लागि नोजलको अगाडि टिप गाइड (सुरक्षा कभर) ठीकसँग जडान भएको छ कि छैन भनेर जाँच्ने सुरक्षा परीक्षण हो।",

      "선행도장부|장비/재료|팁 가드 확인해|스프레이 건 노즐의 안전 커버 장착을 확인하세요|Periksa pemasangan pelindung ujung (tip guard) pada nosel pistol semprot|Tip ga-deu hwa-gin-hae|Kiểm tra xem bộ phận bảo vệ đầu bép (tip guard) của súng phun đã gắn chưa|Tip ga-deu hwa-gin-hae|स्प्रे गनको नोजलमा सुरक्षा कभर (टिप गार्ड) जडान भएको छ कि जाँच्नुहोस्|Tip ga-deu hwa-gin-hae|'팁 가이드 확인해'와 완벽히 동일한 의미와 목적을 가진 안전 수칙 점검 항목으로, 현장에서 혼용하여 부르는 에어리스 건 노즐 보호 장치의 장착 여부를 재차 당부하는 지시입니다.|Pemeriksaan aturan keselamatan dengan arti dan tujuan yang sama persis dengan 'Periksa tip guide', ini adalah instruksi berulang untuk memasang alat pelindung nosel pistol airless yang namanya sering tertukar di lapangan.|Hạng mục kiểm tra quy tắc an toàn mang ý nghĩa và mục đích giống hệt 100% với 'Kiểm tra tip guide', là chỉ thị nhắc nhở lại việc gắn thiết bị bảo vệ bép súng yếm khí mà ở hiện trường hay gọi lẫn lộn hai tên.|'टिप गाइड जाँच्नुहोस्' सँग पूर्ण रूपमा एउटै अर्थ र उद्देश्य भएको सुरक्षा नियम परीक्षणको कुरा हो, साइटमा मिसिएर बोलिने एयरलेस गनको नोजल सुरक्षा उपकरण जडान भएको छ कि छैन भनेर फेरि अनुरोध गर्ने निर्देशन हो।",

      "선행도장부|작업/구역|정전기 화재 조심해|미세 스파크로 인한 가스 폭발을 철저히 주의하세요|Waspadai ledakan gas akibat percikan api halus (listrik statis)|Jeong-jeon-gi hwa-jae jo-sim-hae|Hết sức chú ý phòng nổ gas do tia lửa điện nhỏ (tĩnh điện) gây ra|Jeong-jeon-gi hwa-jae jo-sim-hae|सानो स्पार्कले हुने ग्यास विष्फोटबाट पूर्ण रूपमा होसियार हुनुहोस्|Jeong-jeon-gi hwa-jae jo-sim-hae|휘발성 신나 증기가 가득 찬 도장 구역에서는 옷이 마찰하며 생기는 아주 미세한 정전기 스파크만으로도 대형 폭발 화재가 발생할 수 있으므로, 제전복 착용 및 접지 설비를 철저히 하라는 최고 수준의 화재 경고입니다.|Peringatan kebakaran tingkat tertinggi: di area pengecatan yang penuh uap thinner volatil, percikan listrik statis mikroskopis dari gesekan baju saja bisa memicu ledakan besar. Wajib memakai baju anti-statis dan melengkapi fasilitas grounding dengan benar.|Cảnh báo hỏa hoạn cấp độ cao nhất: trong khu vực sơn đầy hơi dung môi dễ bay hơi, chỉ một tia tĩnh điện siêu nhỏ do ma sát quần áo cũng có thể gây nổ lớn. Bắt buộc mặc quần áo chống tĩnh điện và lắp đặt hệ thống tiếp đất triệt để.|वाष्पशील थिनरको ग्यासले भरिएको पेन्टिङ क्षेत्रमा लुगा घिसिएर निस्कने एकदमै सानो स्थिर बिजुलीको स्पार्कले मात्र पनि ठूलो विष्फोट आगलागी हुन सक्ने भएकोले, एन्टि-स्ट्याटिक (स्थिर बिजुली रोक्ने) लुगा लगाउने र अर्थिङ उपकरण पूर्ण रूपमा जडान गर्ने उच्च स्तरको आगलागी चेतावनी हो。",

      "의장부|배관/설치|파이프 보온해|열 손실 방지를 위해 배관 외부에 보온재를 감싸세요|Pasang insulasi di bagian luar pipa untuk mencegah kehilangan panas|Pa-i-peu bo-on-hae|Bọc vật liệu cách nhiệt bên ngoài ống để ngăn thất thoát nhiệt|Pa-i-peu bo-on-hae|ताप गुम्न नदिन पाइपको बाहिरपट्टि इन्सुलेसन (ताप जोगाउने सामग्री) बेर्नुहोस्|Pa-i-peu bo-on-hae|스팀이나 고온의 유체가 흐르는 배관에서 열이 외부로 뺏기거나 작업자가 화상을 입는 것을 방지하기 위해, 유리섬유 솜 등 불연성 보온재(Insulation)를 배관 겉면에 빈틈없이 두껍게 둘러싸 마감하라는 지시입니다.|Instruksi memasang bahan isolasi tak terbakar (seperti glass wool) tebal rapat melapisi kulit luar pipa uap atau cairan panas. Tujuannya mencegah panas terbuang dan melindungi pekerja dari luka bakar jika tersentuh.|Chỉ thị bọc kín bít bề mặt ngoài của đường ống dẫn hơi nước hoặc chất lỏng nhiệt độ cao bằng vật liệu cách nhiệt chống cháy (như bông thủy tinh). Nhằm mục đích giữ nhiệt và phòng ngừa công nhân bị bỏng khi chạm vào.|स्टीम वा उच्च तापक्रमको तरल पदार्थ बग्ने पाइपबाट ताप बाहिर जान नदिन वा कामदारलाई पोल्नबाट बचाउन, सिसाको धागोको कपास जस्ता आगो नलाग्ने इन्सुलेसन (Insulation) लाई पाइपको बाहिरी भागमा खाली ठाउँ नछोडी बाक्लो गरी बेरेर अन्तिम रूप दिने निर्देशन हो।",

      "의장부|배관/설치|플러싱 해|배관 내부의 이물질을 압축 공기나 물로 씻어내세요|Bilas bagian dalam pipa (flushing) dengan udara kompresor atau air untuk membuang kotoran|Peul-reo-sing hae|Xả rửa (flushing) các tạp chất bên trong ống bằng khí nén hoặc nước|Peul-reo-sing hae|पाइपभित्रको फोहोरलाई प्रेसर हावा वा पानीले पखाल्नुहोस् (फ्लसिङ गर्नुहोस्)|Peul-reo-sing hae|기계가 가동될 때 배관 안에 남아있던 용접 찌꺼기나 쇳가루가 엔진으로 유입되어 고장 나는 것을 막기 위해, 시스템 가동 전 압축 공기나 플러싱 오일, 물 등을 순환시켜 내부를 깨끗이 씻어내는(Flushing) 공정을 진행하라는 뜻입니다.|Artinya lakukan proses Flushing sebelum sistem nyala: sirkulasikan air, oli khusus, atau udara kompresor untuk menyapu bersih sisa terak las dan debu besi di dalam pipa. Ini mencegah kotoran masuk dan merusak mesin/engine utama.|Nghĩa là tiến hành công đoạn Xả rửa (Flushing) trước khi chạy hệ thống: bơm tuần hoàn nước, dầu súc rửa hoặc khí nén để cuốn trôi xỉ hàn và mạt sắt đọng trong ống. Việc này nhằm ngăn tạp chất chui vào làm hỏng động cơ.|मेसिन चल्दा पाइपभित्र बाँकी रहेको वेल्डिङको फोहोर वा फलामको धुलो इन्जिनमा पसेर बिग्रन नदिन, सिस्टम चलाउनु अघि प्रेसर हावा, फ्लसिङ तेल वा पानी घुमाएर भित्री भाग सफासँग पखाल्ने (Flushing) प्रक्रिया अगाडि बढाउने अर्थ हो।",

      "의장부|배관/설치|에어 호스 연결해|공압 공구 가동을 위해 주 에어 라인에 호스를 체결하세요|Sambungkan selang ke jalur udara utama untuk menyalakan alat pneumatik|E-eo ho-seu yeon-gyeol-hae|Kết nối ống mềm vào đường khí chính để chạy các dụng cụ khí nén|E-eo ho-seu yeon-gyeol-hae|न्युमेटिक (हावाको प्रेसरले चल्ने) औजार चलाउन मुख्य एयर लाइनमा पाइप जोड्नुहोस्|E-eo ho-seu yeon-gyeol-hae|그라인더, 에어 임팩트, 치핑 해머 등 압축 공기의 힘으로 돌아가는 수공구(에어 공구)를 사용하기 위해, 공장 매니폴드에서 나오는 메인 에어 밸브 라인에 작업용 고무 호스의 퀵 커플러를 찰칵 소리가 나도록 안전하게 꽂아 연결하라는 지시입니다.|Instruksi menghubungkan selang karet alat ke katup udara utama dari manifold pabrik sampai berbunyi 'klik' aman. Ini diperlukan untuk menyuplai tenaga ke perkakas tangan pneumatik (alat angin) seperti gerinda, air impact, dan palu chipping.|Chỉ thị cắm an toàn (nghe tiếng 'cạch') khớp nối nhanh của ống cao su làm việc vào đường van khí nén chính từ trạm phân phối. Dùng để cấp nguồn cho các dụng cụ cầm tay chạy bằng khí nén (dụng cụ hơi) như máy mài, súng bắn ốc, búa gõ xỉ.|ग्राइन्डर, एयर इम्प्याक्ट, चिपिङ ह्यामर जस्ता प्रेसर हावाको बलले चल्ने हाते औजार (एयर औजार) प्रयोग गर्नको लागि, कारखानाको म्यानिफोल्डबाट आउने मुख्य एयर भल्भ लाइनमा काम गर्ने रबर पाइपको क्विक कपलर 'क्लिक' आवाज आउने गरी सुरक्षित रूपमा जोड्ने निर्देशन हो।",

      "의장부|배관/설치|절단 호스 연결해|산소 절단기 사용을 위한 전용 호스를 정확히 체결하세요|Sambungkan selang khusus pemotong oksigen dengan tepat|Jeol-dan ho-seu yeon-gyeol-hae|Kết nối chính xác ống mềm chuyên dụng để dùng súng cắt oxy|Jeol-dan ho-seu yeon-gyeol-hae|अक्सिजन कटर प्रयोग गर्न विशेष पाइपलाई सही तरिकाले जोड्नुहोस्|Jeol-dan ho-seu yeon-gyeol-hae|철판을 절단하거나 곡직 가열을 하기 위해 사용하는 가스 절단기(산소 토치)에 고압 산소(녹색 호스)와 LPG 가스(적색 호스)가 역류하거나 새지 않도록, 각각의 전용 호스를 렌치로 규정된 토크만큼 꽉 조여 체결하라는 안전 철칙 지시입니다.|Aturan keselamatan mutlak: kencangkan selang khusus Oksigen tekanan tinggi (selang hijau) dan gas LPG (selang merah) ke blender potong (obor gas) pakai kunci pas sesuai torsi standar. Pastikan tidak ada kebocoran atau aliran balik (backfire) sebelum dipakai memotong pelat.|Nguyên tắc an toàn thiết yếu: xiết chặt bằng cờ lê các ống dẫn chuyên dụng gồm Oxy cao áp (ống xanh) và gas LPG (ống đỏ) vào súng cắt gas (mỏ khò oxy) đúng lực quy định. Đảm bảo không bị rò rỉ hay cháy ngược trước khi cắt thép.|फलाम काट्न वा तताएर सीधा पार्न प्रयोग गरिने ग्यास कटर (अक्सिजन टर्च) मा उच्च प्रेसरको अक्सिजन (हरियो पाइप) र LPG ग्यास (रातो पाइप) उल्टो नबगोस् वा नचुहियोस् भनेर, प्रत्येक विशेष पाइपलाई रेन्चले तोकिएको प्रेसर अनुसार कडा गरी कस्ने सुरक्षाको कडा निर्देशन हो।",

      "의장부|전장/장비|포설해|천장의 트레이 경로를 따라 케이블을 설치하세요|Gelar dan tarik kabel sepanjang jalur rak (tray) plafon|Po-seol-hae|Kéo và rải cáp dọc theo tuyến máng cáp (tray) trên trần|Po-seol-hae|छतको ट्रे (Tray) को बाटो अनुसार केबल बिछ्याउनुहोस्|Po-seol-hae|선박 내 수천 개의 전등, 센서, 모터 장비에 전력을 공급하기 위해 굵고 무거운 메인 전기 케이블 뭉치들을 천장이나 벽에 설치된 철제 통로(케이블 트레이) 위에 설계된 도면 경로대로 얹고 당겨가며 쫙 깔아주는 '케이블 풀링(Pulling, 포설)' 작업을 진행하라는 전장부 핵심 지시입니다.|Instruksi inti departemen listrik: lakukan 'Cable Pulling/Poseol', yaitu menarik dan membentangkan gulungan kabel listrik utama yang tebal dan berat di atas lorong besi (cable tray) plafon/dinding sesuai rute gambar. Ini untuk menyuplai listrik ke ribuan lampu, sensor, dan motor di kapal.|Chỉ thị cốt lõi của bộ phận Điện: thực hiện 'Kéo rải cáp (Pulling/Poseol)', tức là kéo và trải các cuộn cáp điện chính to nặng lên trên máng sắt (cable tray) bám trần/vách theo đúng tuyến đường bản vẽ. Việc này nhằm cấp điện cho hàng ngàn ngọn đèn, cảm biến và động cơ trên tàu.|जहाजभित्रका हजारौं बत्ती, सेन्सर, मोटर उपकरणहरूमा बिजुली पठाउनको लागि बाक्लो र भारी मुख्य इलेक्ट्रिक केबलका मुठाहरूलाई छत वा भित्तामा जडान गरिएको फलामको बाटो (केबल ट्रे) माथि डिजाइन गरिएको नक्साको बाटो अनुसार राख्दै र तान्दै बिछ्याउने 'केबल पुलिङ (Pulling, पोसल)' काम अगाडि बढाउने बिजुली विभागको मुख्य निर्देशन हो।",

      "의장부|전장/장비|케이블 타이 묶어|포설된 전선 다발이 고정되도록 케이블 타이로 묶으세요|Ikat tumpukan kabel yang telah digelar menggunakan cable tie agar tetap pada posisinya|Ke-i-beul ta-i muk-keo|Buộc cố định bó dây điện đã rải bằng dây thít cáp (cable tie)|Ke-i-beul ta-i muk-keo|बिछ्याइएका तारको मुठो फिक्स हुने गरी केबल टाइले बाँध्नुहोस्|Ke-i-beul ta-i muk-keo|트레이 위에 깔린 케이블들이 선박의 심한 흔들림이나 엔진 진동에도 이탈하여 처지거나 손상되지 않도록, 플라스틱 케이블 타이나 스테인리스 밴드를 일정한 간격마다 타이트하게 감아 철제 트레이 뼈대에 단단히 밀착 고정하라는 마감 지시입니다.|Instruksi finishing: ikat rapat tumpukan kabel yang ada di atas tray menggunakan cable tie plastik atau band stainless steel pada interval teratur. Ini memastikan kabel menempel erat pada rangka besi tray sehingga tidak kendor atau rusak akibat guncangan parah kapal dan getaran mesin.|Chỉ thị hoàn thiện: dùng dây thít nhựa hoặc dây đai inox thắt chặt các bó cáp trên máng (tray) theo khoảng cách đều đặn. Việc này giúp ốp sát cáp vào khung sắt, ngăn ngừa cáp bị võng hoặc hư hỏng do tàu lắc lư mạnh và động cơ rung động.|ट्रेमाथि बिछ्याइएका केबलहरू जहाजको कडा हल्लाई वा इन्जिनको कम्पनले पनि बाहिर निस्केर नझुन्डिउन् वा क्षति नहोस् भनेर, प्लास्टिकको केबल टाइ वा स्टेनलेस ब्यान्डलाई निश्चित दूरीमा कडा गरी बेरेर फलामको ट्रेको फ्रेममा बलियोसँग टाँसेर फिक्स गर्ने अन्तिम रूप दिने निर्देशन हो।",

      "의장부|전장/장비|발전기 확인해|메인 발전기 장비의 설치 상태 및 결선을 점검하세요|Periksa kondisi instalasi dan sambungan kabel mesin generator utama|Bal-jeon-gi hwa-gin-hae|Kiểm tra tình trạng lắp đặt và đấu nối dây của máy phát điện chính|Bal-jeon-gi hwa-gin-hae|मुख्य जेनेरेटर उपकरणको जडान अवस्था र तार जोडिएको (कनेक्सन) जाँच्नुहोस्|Bal-jeon-gi hwa-gin-hae|선박 운항 중 전력을 생산하는 핵심 심장부인 메인 발전기(Generator)가 도면대로 방진 고무 위에 수평이 맞게 잘 안착되었는지, 그리고 고압 전력 케이블이 단자대에 규정된 토크로 완벽하게 결선(연결)되었는지 시운전 직전에 최종 점검하라는 의미입니다.|Inspeksi final pra-uji coba: pastikan Generator utama (jantung kelistrikan kapal) duduk sejajar mendatar di atas karet peredam getaran (mounting) sesuai gambar. Verifikasi juga apakah kabel tegangan tinggi tersambung sempurna ke terminal block dengan torsi baut yang standar.|Kiểm tra cuối cùng trước chạy thử: xác nhận Máy phát điện chính (trái tim cung cấp điện của tàu) đã được đặt thăng bằng trên các đế cao su giảm chấn đúng như bản vẽ. Đồng thời rà soát xem cáp cao thế đã đấu nối hoàn hảo vào cầu đấu (terminal) với lực xiết đúng quy định chưa.|जहाज चल्दा बिजुली उत्पादन गर्ने मुख्य मुटुको रूपमा रहेको मुख्य जेनेरेटर (Generator) नक्सा अनुसार भाइब्रेसन रोक्ने रबरमाथि समतल मिलाएर राम्रोसँग राखिएको छ कि छैन, र उच्च भोल्टेजको इलेक्ट्रिक केबल टर्मिनल ब्लकमा तोकिएको प्रेसरले पूर्ण रूपमा जोडिएको (कनेक्सन) छ कि छैन भनेर परीक्षण उडान ठीक अघि अन्तिम जाँच गर्ने अर्थ हो।",

      "의장부|전장/장비|외부 전원 연결해|테스트를 위해 육상에서 임시 전력을 수전하세요|Sambungkan ke sumber daya luar dari darat untuk keperluan pengujian|Oe-bu jeon-won yeon-gyeol-hae|Kết nối nguồn điện tạm thời từ trên bờ (nguồn ngoài) để thử nghiệm|Oe-bu jeon-won yeon-gyeol-hae|परीक्षणको लागि जमिनबाट अस्थायी बिजुली लिन बाहि리 बिजुली जोड्नुहोस्|Oe-bu jeon-won yeon-gyeol-hae|배 자체의 발전기를 돌리기 전 조명이나 필수 펌프 등을 테스트해야 할 때, 육상의 변전소에서 끌어온 굵고 튼튼한 임시 전력 케이블(Shore Power)을 선박의 전원 수전반(수전함)에 안전하게 체결하여 육지 전기를 배 안으로 살려 넣으라는 지시입니다.|Instruksi menyalurkan listrik darat: sebelum generator kapal bisa nyala, pasang kabel daya sementara (Shore Power) yang tebal dari gardu darat ke panel penerima listrik di kapal dengan aman. Ini untuk menghidupkan lampu dan memompa sistem demi proses pengujian awal.|Chỉ thị cấp điện bờ: trước khi khởi động máy phát của tàu, hãy cắm an toàn cáp điện tạm thời (Shore Power) loại to khỏe kéo từ trạm biến áp trên bờ vào tủ nhận điện của tàu. Việc này giúp mang điện bờ vào tàu để chạy thử đèn đóm và các bơm thiết yếu.|जहाजको आफ्नै जेनेरेटर चलाउनु अघि बत्ती वा आवश्यक पम्प आदिको परीक्षण गर्नुपर्दा, जमिनको सबस्टेशनबाट तानिएको बाक्लो र बलियो अस्थायी बिजुलीको केबल (Shore Power) लाई जहाजको बिजुली लिने प्यानल (सुजनहाम) मा सुरक्षित रूपमा जोडेर जमिनको बिजुली जहाजभित्र पठाउने निर्देशन हो।",

      "의장부|전장/장비|레벨 센서 달아|탱크의 저장량을 계측하기 위한 센서 장치를 장착하세요|Pasang sensor pengukur level (ketinggian) untuk mengukur volume isi tangki|Re-bel sen-seo da-ra|Lắp cảm biến báo mức (level sensor) để đo lường dung lượng trữ trong bồn|Re-bel sen-seo da-ra|ट्याङ्कीको भण्डारण मात्रा नाप्नको लागि सेन्सर उपकरण जडान गर्नुहोस्|Re-bel sen-seo da-ra|연료 탱크나 청수 탱크 내부에 들어있는 액체의 수위를 실시간으로 밖에서 모니터링할 수 있도록, 탱크 천장 홀에 긴 막대형이나 레이저 방식의 수위 측정기(레벨 센서)를 고무 가스켓과 함께 볼트로 밀폐하여 완벽하게 장착하라는 뜻입니다.|Artinya pasang perangkat ukur ketinggian air (Level Sensor) tipe tongkat panjang atau laser di lubang atap tangki bahan bakar/air tawar. Segel rapat dengan baut dan gasket karet agar volume cairan di dalam bisa dipantau real-time dari luar tanpa bocor.|Nghĩa là lắp ráp thiết bị đo mực nước (Level Sensor) dạng que dài hoặc laser vào lỗ trên nóc bồn chứa nhiên liệu/nước ngọt. Phải chèn gioăng cao su và vặn bu lông bịt kín mít để có thể theo dõi thể tích chất lỏng bên trong từ bên ngoài theo thời gian thực.|इन्धन ट्याङ्की वा सफा पानीको ट्याङ्कीभित्र रहेको तरल पदार्थको सतहलाई बाहिरबाट रियल टाइममा अनुगमन गर्न सकियोस् भनेर, ट्याङ्कीको छतको प्वालमा लामो डण्डी आकारको वा लेजर प्रविधिको सतह नाप्ने यन्त्र (लेभल सेन्सर) लाई रबरको ग्यास्केटसँगै बोल्टले पूर्ण रूपमा बन्द गरी जडान गर्ने अर्थ हो।",

      "의장부|전장/장비|전등 켜봐|조명 기구 결선 완료 후 정상 점등 여부를 확인하세요|Nyalakan lampu untuk memeriksa apakah berfungsi normal setelah kabel disambung|Jeon-deung kyeo-bwa|Bật thử đèn để kiểm tra xem có sáng bình thường sau khi đấu dây xong không|Jeon-deung kyeo-bwa|बत्तीको तार जोडिसकेपछि राम्रोसँग बल्छ कि बत्ती बालेर हेर्नुहोस्|Jeon-deung kyeo-bwa|선실 복도나 기계실 천장에 방폭형광등 또는 LED 조명 기구를 볼트로 달고 전선을 터미널에 연결한 뒤, 메인 분전반의 스위치를 올려 불이 깜빡거리지 않고 한 번에 밝게 쫙 들어오는지 테스트(점등 확인)하라는 전장 마감 지시입니다.|Instruksi finishing kelistrikan: setelah lampu neon anti-ledakan atau LED dibaut ke plafon lorong kabin/ruang mesin dan kabel disambung ke terminal, naikkan sakelar di panel utama. Tes apakah lampu menyala terang seketika tanpa berkedip.|Chỉ thị hoàn thiện phần điện: sau khi bắt bu lông treo máng đèn huỳnh quang chống cháy nổ hoặc đèn LED lên trần hành lang cabin/buồng máy và đấu dây vào cầu đấu, hãy bật công tắc ở tủ điện chính. Test xem đèn có sáng bừng lên ngay lập tức mà không bị nhấp nháy không.|कोठाको गल्ली वा मेसिन रुमको छतमा विष्फोट नहुने ट्युबलाइट वा LED बत्ती बोल्टले जडान गरेर तारलाई टर्मिनलमा जोडेपछि, मुख्य वितरण प्यानलको स्विच उठाएर बत्ती नझिम्किकनै एकैपटक उज्यालो गरी बल्छ कि बल्दैन भनेर टेस्ट (बत्ती बलेको जाँच) गर्ने बिजुलीको अन्तिम निर्देशन हो।",

      "의장부|설치/작업|장비 보호커버 씌우자|기계 장비가 오염되지 않도록 보양 조치를 하세요|Pasang penutup pelindung agar peralatan mesin tidak kotor/terkontaminasi|Jang-bi bo-ho-keo-beo ssi-u-ja|Hãy bọc vỏ bảo vệ để thiết bị máy móc không bị bẩn/hỏng hóc|Jang-bi bo-ho-keo-beo ssi-u-ja|मेसिन उपकरण फोहोर नहोस् भनेर सुरक्षा कभर (कभरिङ) लगाउनुहोस्|Jang-bi bo-ho-keo-beo ssi-u-ja|정밀한 모터나 전기 판넬 등 고가의 장비가 도크 현장에 조기 탑재되었을 때, 주변에서 진행되는 그라인더 쇳가루, 용접 불꽃, 페인트 칠 분진 등에 의해 오염되거나 고장 나는 것을 완벽히 방지하기 위해 두꺼운 방수 천막이나 비닐 커버로 장비를 꽁꽁 싸매어 덮어두자는 보양 작업 지시입니다.|Instruksi perlindungan (curing): saat alat presisi mahal macam motor atau panel listrik dipasang awal di dok, bahaya debu gerinda, percikan las, dan kabut cat mengintai. Cegah kerusakan atau kotor dengan membungkus rapat mesin pakai terpal tebal kedap air atau plastik pelindung.|Chỉ thị che chắn bảo dưỡng (curing): khi các thiết bị đắt tiền, tinh xảo như mô tơ, tủ điện được cẩu xuống dock sớm, chúng dễ bị hư hỏng do mạt mài, tia lửa hàn, bụi sơn xung quanh. Phải bọc kín bưng thiết bị bằng bạt chống thấm dày hoặc nilon bảo vệ để ngăn ngừa tuyệt đối bụi bẩn rỉ sét.|सूक्ष्म मोटर वा इलेक्ट्रिक प्यानल जस्ता महँगा उपकरणहरू डकको साइटमा चाँडै लोड गरिएको बेला, वरपर भइरहेको ग्राइन्डरको फलामको धुलो, वेल्डिङको आगोको झिल्का, पेन्टिङको धुलो आदिले फोहोर हुने वा बिग्रने समस्यालाई पूर्ण रूपमा रोक्न बाक्लो वाटरप्रूफ पाल वा प्लास्टिकको कभरले उपकरणलाई पूरै बेरेर छोपेर राख्ने सुरक्षा (बोयाङ) कामको निर्देशन हो।",

      "의장부|설치/작업|서포트 위치 확인해|의장품이 거치될 지지대 용접 위치가 맞는지 보세요|Periksa apakah posisi pengelasan penyangga (support) tempat outfitting akan diletakkan sudah benar|Seo-po-teu wi-chi hwa-gin-hae|Kiểm tra xem vị trí hàn của giá đỡ (support) nơi đặt thiết bị outfitting có chính xác không|Seo-po-teu wi-chi hwa-gin-hae|आउटफिटिङ (उपकरण) राखिने सपोर्टको वेल्डिङ स्थान ठीक छ कि छैन जाँच्नुहोस्|Seo-po-teu wi-chi hwa-gin-hae|무거운 파이프나 철 구조물(의장품)을 바닥에 그냥 두지 않고 공중에 띄워 올리기 위해 받침대(서포트)를 용접해야 하는데, 그 기둥이 박힐 바닥 마킹 위치가 설계 도면의 X, Y 좌표 수치와 1mm 오차 없이 정확한 곳인지 줄자로 다시 한번 크로스 체크하라는 의미입니다.|Artinya cek silang ulang pakai meteran: apakah posisi tanda di lantai tempat tiang penyangga (support) akan dilas sudah 100% presisi tanpa selisih 1mm dengan koordinat X-Y di blueprint. Support ini penting buat menopang pipa berat/struktur besi (outfitting) agar melayang dari lantai.|Nghĩa là dùng thước cuộn kiểm tra chéo lại xem: vị trí vạch dấu trên sàn nơi sẽ hàn đắp chân cột giá đỡ (support) có chuẩn xác tuyệt đối không lệch 1mm so với tọa độ X-Y của bản vẽ không. Giá đỡ này dùng để bợ nâng các ống nặng/kết cấu sắt (outfitting) lên khỏi mặt đất.|भारी पाइप वा फलामको संरचना (आउटफिटिङ) लाई भुइँमा त्यतिकै नराखी हावामा उठाउनको लागि सपोर्ट (टेका) वेल्डिङ गर्नुपर्ने हुन्छ, त्यो पिलर गाडिने भुइँको मार्किङ स्थान डिजाइन नक्साको X, Y कोर्डिनेटको नापसँग १ मिलिमिटर पनि फरक नपर्ने सही ठाउँ हो कि होइन भनेर इन्ची टेपले फेरि एकपटक क्रस-चेक गर्ने अर्थ हो।",

      "의장부|설치/작업|그레이팅 깔아|통로 발 빠짐 사고 방지를 위해 격자형 발판을 설치하세요|Pasang pijakan lantai kisi baja (grating) untuk mencegah kecelakaan terperosok di lorong|Geu-re-i-ting kka-ra|Lắp đặt sàn lưới thép (grating) để phòng tránh tai nạn lọt chân ở lối đi|Geu-re-i-ting kka-ra|बाटोमा खुट्टा छिर्ने दुर्घटना रोक्न जालीदार फलामको प्लेट (ग्रेटिङ) ओछ्याउनुहोस्|Geu-re-i-ting kka-ra|선박 내 텅 빈 뼈대 사이를 선원이나 작업자가 안전하게 걸어 다닐 수 있도록, 구멍이 숭숭 뚫린 네모난 철망 형태의 튼튼한 철제 발판(그레이팅, Grating)을 허공의 통로 프레임 위에 블록 맞추듯 딱딱 얹어놓고 볼트나 클립으로 고정하라는 통로 조성 지시입니다.|Instruksi bangun akses jalan: susun dan letakkan rapi lembaran pijakan jaring baja tebal berlubang kotak-kotak (Grating) di atas rangka lorong melayang, lalu kunci dengan baut atau klip pelana. Ini menciptakan lantai aman bagi kru/pekerja untuk berjalan melintasi kerangka kapal yang bolong bolong tanpa takut terperosok.|Chỉ thị tạo lối đi: bưng các tấm vỉ lưới thép ô vuông lỗ rỗng vạm vỡ (Grating) đặt lên trên bộ khung sườn của hành lang lơ lửng rồi xiết chặt bằng bu lông hoặc kẹp nẹp. Việc này tạo ra một sàn đi bộ an toàn giữa các khoảng không khung xương tàu, giúp thủy thủ/thợ không bị lọt chân rớt xuống dưới.|जहाजभित्रको खाली फ्रेमको बीचमा नाविक वा कामदारहरू सुरक्षित रूपमा हिंड्न सकोस् भनेर, प्वालहरू भएको वर्गाकार जाली आकारको बलियो फलामको प्लेट (ग्रेटिङ, Grating) लाई हावाको बाटोको फ्रेममाथि ब्लक मिलाए जस्तै ट्याक-ट्याक राखेर बोल्ट वा क्लिपले फिक्स गर्ने बाटो बनाउने निर्देशन हो।",

      "의장부|설치/작업|핸드레일 용접해|고소 통로 가장자리에 철제 난간대를 견고히 용접하세요|Las pegangan tangan/pagar besi (handrail) dengan kuat di tepi lorong tinggi|Haen-deu-re-il yong-jeop-hae|Hàn thật chắc chắn lan can tay vịn bằng sắt (handrail) dọc theo mép lối đi trên cao|Haen-deu-re-il yong-jeop-hae|अग्लो बाटोको किनारमा फलामको रेलिङ (ह्यान्डरेल) लाई बलियो गरी वेल्डिङ गर्नुहोस्|Haen-deu-re-il yong-jeop-hae|그레이팅 발판 설치가 끝난 후, 사람이 걸어 다닐 때 까마득한 수십 미터 아래로 추락하는 끔찍한 사고를 막기 위해 허리 높이까지 오는 파이프 형태의 철제 안전 울타리(핸드레일) 기둥과 가로대를 발판 끝단에 풀(Full) 용접으로 절대 흔들리지 않게 부착하라는 생명줄 설치 지시입니다.|Instruksi pasang pagar nyawa: setelah pelat grating lantai beres, las penuh tiang dan palang pipa besi setinggi pinggang (Handrail/railing) di pinggiran jurang pelat. Ini pagar pengaman mutlak agar orang yang lewat tak terjatuh puluhan meter ke bawah dasar lambung. Las sekokoh karang anti goyang.|Chỉ thị lắp lan can sinh tử: sau khi lót xong vỉ sàn grating, phải hàn dính liền mạch (Full weld) các cọc đứng và thanh ngang bằng ống thép cao ngang hông (Handrail/lan can) chốt ngay mép rìa lối đi. Hàng rào này ngăn thảm kịch ngã nhào rơi tự do hàng chục mét xuống đáy, yêu cầu hàn cứng ngắc không được rung rinh.|ग्रेटिङ प्लेट जडान सकिएपछि, मान्छे हिंड्दा दशौं मिटर तल खस्ने भयानक दुर्घटना रोक्नको लागि कम्मरको उचाइसम्म आउने पाइप आकारको फलामको सुरक्षा बार (ह्यान्डरेल) को पिलर र तेर्सो पाइपलाई बाटोको किनारमा फुल (Full) वेल्डिङ गरेर कहिल्यै नहल्लिने गरी टाँस्ने जीवन रेखा जडान गर्ने निर्देशन हो।",

      "의장부|설치/작업|Life Boat 설치해|선원 대피를 위한 구명정 및 진수 장비를 탑재하세요|Pasang sekoci (life boat) dan peralatan peluncurannya untuk evakuasi awak kapal|La-i-peu bo-teu seol-chi-hae|Lắp đặt xuồng cứu sinh (life boat) và cần cẩu hạ thủy để thủy thủ sơ tán|La-i-peu bo-teu seol-chi-hae|नाविकहरूको उद्दारको लागि लाइफ बोट र त्यसलाई झार्ने उपकरण लोड गर्नुहोस्|La-i-peu bo-teu seol-chi-hae|선박 침몰 등 최악의 비상사태 시 선원들이 타고 탈출할 수 있는 구명보트(Life Boat) 본체와, 이 무거운 보트를 바다로 안전하게 미끄러뜨려 내려주는 거대한 크레인 형태의 로프 하강 설비(Davit, 대빗) 세트를 도크 위 배 측면에 규정대로 안착시키라는 법정 안전 설비 장착 지시입니다.|Instruksi pasang alutsista keselamatan SOLAS wajib: turunkan set perahu penyelamat (Life Boat) plus tiang gawang kerekan penurunnnya (Davit system) di sisi luar dek kapal. Ini sekoci darurat buat kru kabur loncat ke laut saat skenario kiamat kapal tenggelam. Pemasangannya harus taat regulasi kelautan internasional ketat.|Chỉ thị lắp ráp thiết bị cứu sinh chuẩn SOLAS pháp định: cẩu thả nguyên cụm thuyền cứu nạn (Life Boat) cùng hệ thống cần cẩu cần thả thuyền (Davit) neo chốt vào mạn sườn boong tàu. Đây là phao cứu sinh đưa thủy thủ đoàn đào tẩu trượt xuống biển lúc tàu chìm, yêu cầu thi công chuẩn xác theo luật hàng hải.|जहाज डुब्ने जस्तो सबैभन्दा खराब आपतकालीन अवस्थामा नाविकहरू चढेर बच्न सक्ने लाइफ बोट (Life Boat) र यो भारी बोटलाई समुद्रमा सुरक्षित रूपमा चिप्ल्याएर झार्ने विशाल क्रेन आकारको डोरी झार्ने उपकरण (Davit, डेबिट) को सेटलाई डकमाथिको जहाजको साइडमा नियम अनुसार राख्ने कानुनी सुरक्षा उपकरण जडानको निर्देशन हो।",

      "의장부|설치/작업|끝단 처리해|철판 절단면의 날카로운 부분을 제거하여 사고를 방지하세요|Haluskan (chamfer) ujung/tepi potongan plat yang tajam untuk mencegah kecelakaan luka|Kkeut-dan cheo-ri-hae|Xử lý mài nhẵn phần mép cạnh cắt sắc bén của thép để phòng tránh tai nạn đứt tay|Kkeut-dan cheo-ri-hae|चोटपटकबाट बच्न फलामको काटेको भागको तीखो किनारलाई चिल्लो पार्नुहोस्|Kkeut-dan cheo-ri-hae|의장품이나 철판 가장자리를 산소로 자른 뒤 발생한 뾰족한 쇳가시(Burr)나 칼날처럼 예리하게 선 직각 모서리에 작업자의 손이나 머리가 스쳐 깊게 베이는 산업 재해를 원천 차단하기 위해, 그라인더로 가장자리를 갈아 둥그스름하게(라운딩, 면취) 부드럽게 다듬으라는 안전 마감 지시입니다.|Instruksi finishing keselamatan: buang sisa duri tajam (burr) atau tepi sudut siku yang setajam pisau peninggalan potong oksigen pada pelat/outfitting. Gosok tumpulkan sudutnya melingkar mulus (chamfer/rounding) pakai gerinda. Ini demi mencegah tragedi tangan atau kepala kuli robek tersayat dalam saat gak sengaja kesenggol.|Chỉ thị mài nhẵn an toàn: dọn dẹp các cạnh gờ xơ tướp nhọn hoắt (burr) hay góc vuông sắc lẹm như dao cạo để lại sau khi cắt gas đồ outfitting/thép. Lấy máy mài bo tròn là phẳng (vát mép/rounding) các viền chông gai đó cho êm ái. Việc này triệt tiêu tai nạn lao động bị rạch rách da nát thịt sâu hoắm do thợ quẹt trúng đầu hay tay vào.|उपकरण वा फलामको प्लेटको किनारलाई अक्सिजनले काटेपछि निस्केको चुच्चो फलामको काँडा (Burr) वा चक्कुको धार जस्तै तीखो समकोण कुनामा कामदारको हात वा टाउको घिस्रिएर गहिरो चोट लाग्ने औद्योगिक दुर्घटनालाई पूर्ण रूपमा रोक्नको लागि, ग्राइन्डरले किनारलाई घोटेर गोलो (राउन्डिङ, 면취) र नरम हुने गरी मिलाउने सुरक्षा अन्तिम निर्देशन हो।",

      "의장부|설치/작업|장비 베이스 고정해|진동 방지를 위해 하부 프레임을 선체에 볼팅하세요|Kencangkan pelat dasar (base) peralatan ke lambung kapal dengan baut agar tidak bergetar|Jang-bi be-i-seu go-jeong-hae|Bắt bu lông cố định khung bệ đáy thiết bị vào vỏ tàu để chống rung lắc|Jang-bi be-i-seu go-jeong-hae|कम्पन रोक्नको लागि तल्लो फ्रेमलाई जहाजमा बोल्टले कस्नुहोस्|Jang-bi be-i-seu go-jeong-hae|수 톤에 달하는 펌프나 엔진의 밑바닥 뼈대(베이스 프레임)가 배가 출렁이거나 기계 스스로 돌아갈 때 덜덜 떨리지 않도록, 장비 발바닥 구멍에 두꺼운 앙카 볼트를 끼우고 스패너로 혼신의 힘을 다해 조여 선박 철판 바닥과 완전한 한 몸이 되도록 꽉 묶어두라는 지시입니다.|Instruksi mengunci fondasi: agar kerangka dasar (base frame) pompa atau engine seberat berton-ton tidak disko bergetar saat mesin nyala atau kapal oleng dihajar ombak. Tusukkan baut jangkar (anchor bolt) gajah ke lubang telapak kaki mesin, lalu kencangkan kunci pas sekuat tenaga dalam sampai mesin kawin menyatu kokoh mati dengan lantai baja kapal.|Chỉ thị chốt hạ móng: cốt để khung sườn gầm (base frame) của động cơ hay máy bơm nặng hàng tấn không bị rung bần bật khi máy chạy hoặc tàu lảo đảo chao nghiêng. Phải xỏ bu lông neo (anchor bolt) bự chảng vào lỗ chân bệ máy, dồn sức bình sinh vặn cờ lê xiết chết cứng đơ ép cỗ máy hòa làm một thể bám rịt lấy mặt sàn tôn tàu.|हजारौं किलोको पम्प वा इन्जिनको तल्लो हड्डी (बेस फ्रेम) जहाज हल्लिँदा वा मेसिन आफैं चल्दा थरर नहल्लियोस् भनेर, उपकरणको खुट्टाको प्वालमा बाक्लो एन्कर बोल्ट घुसाएर रेन्चले पूरै बल लगाएर कसेर जहाजको फलामको भुइँसँग पूर्ण रूपमा एउटै शरीर हुने गरी कडा रूपमा बाँध्ने निर्देशन हो।",

      "의장부|설치/작업|유니트 탑재해|사전 조립 완료된 배관 밸브 집합체를 탑재하세요|Pasang dan turunkan unit rakitan pipa dan katup (valve) yang sudah dirakit sebelumnya|Yu-ni-teu tap-jae-hae|Cẩu lắp cụm tổ hợp đường ống và van (Unit) đã được lắp ráp sẵn từ trước|Yu-ni-teu tap-jae-hae|पहिले नै जोडिसकिएको पाइप र भल्भको सेट (युनिट) लोड गर्नुहोस्|Yu-ni-teu tap-jae-hae|현장 안에서 파이프를 한 가닥씩 이어 붙이면 공간도 좁고 용접도 힘들기 때문에, 미리 밖의 넓은 공장에서 파이프, 밸브, 지지대를 레고 블록처럼 하나의 덩어리(유니트, Unit)로 크게 조립해 둔 것을 가져와 크레인으로 한 방에 통째로 배 안에 올려놓고 조립 속도를 높이라는 효율적인 공법 지시입니다.|Instruksi manuver efisiensi: merakit pipa satu per satu di ruang sempit dalam kapal itu lambat dan sulit ngelasnya. Makanya ambil blok kumpulan pipa, katup, dan penyangga yang sudah dirakit utuh bak lego raksasa (disebut 'Unit') di pabrik luar yang luas. Panggil crane angkat dan turunkan gelondongan Unit itu sekaligus ke perut kapal biar kerjaan instan beres.|Chỉ thị tối ưu năng suất: lúi húi nối từng cây ống trong khoang tàu chật hẹp cực kỳ chậm chạp và vướng víu khó hàn. Thay vào đó, đem cả một cụm cục bự chảng (gọi là 'Unit') gồm ống, van, giá đỡ đã được ráp sẵn ngon lành như xếp lego ở xưởng ngoài rộng rãi tới. Dùng cẩu bốc nguyên xi tảng Unit đó đặt tọt vào khoang tàu trong một nốt nhạc giúp tăng tốc lắp ráp.|साइटभित्र पाइपलाई एउटा-एउटा गर्दै जोड्दा ठाउँ पनि साँघुरो हुने र वेल्डिङ गर्न पनि गाह्रो हुने भएकोले, पहिले नै बाहिरको फराकिलो कारखानामा पाइप, भल्भ, सपोर्टलाई लेगो ब्लक जस्तै एउटै डल्लो (युनिट, Unit) को रूपमा ठूलो गरी जोडेर राखिएको कुरालाई ल्याएर क्रेनले एकैपटक जहाजभित्र राखेर जोड्ने गति बढाउने प्रभावकारी विधिको निर्देशन हो।",

      "의장부|볼팅/체결|볼트 걸어|손으로 볼트를 구멍에 살짝 끼워두세요|Masukkan dan pasang baut sedikit ke dalam lubang menggunakan tangan|Bol-teu geo-reo|Dùng tay xỏ và vặn hờ bu lông vào lỗ trước|Bol-teu geo-reo|हातले बोल्टलाई प्वालमा थोरै घुसाएर राख्नुहोस्|Bol-teu geo-reo|공구로 강하게 조이기 전, 두 부품의 위치가 이탈하지 않도록 파이프 구멍 여러 개에 볼트를 쑥 집어넣고 반대쪽 너트를 손가락으로 서너 바퀴만 빙글빙글 돌려 가체결(임시 조립) 상태로 매달아 두라는 조립 초기 단계 지시입니다.|Tahap awal perakitan: sebelum disiksa dikencangkan pakai alat, amankan dulu posisi dua komponen biar gak meleset. Masukkan beberapa baut tembus ke lubang pipa, pasang mur di seberangnya, lalu pelintir putar ringan pakai jari tiga empat putaran aja biar posisinya ngunci ngegantung sementara (las cantum baut).|Bước mồi đầu tiên ráp nối: trước khi lấy súng siết chết gông cùm, để hai linh kiện khỏi xê dịch lệch tâm, hãy đút chọt vài con bu lông xuyên qua lỗ, tóm lấy đai ốc bên kia vặn lỏng vặn bằng đầu ngón tay lèo tèo vài ba vòng cho nó giữ ngàm treo lủng lẳng dính gá tạm vào nhau cái đã.|औजारले कडा कस्नु अघि, दुईवटा पार्ट्सको स्थान नबिग्रियोस् भनेर पाइपका धेरै वटा प्वालहरूमा बोल्ट भित्र घुसाएर अर्कोतिर नटलाई औंलाले तीन-चार फन्का मात्र फनफनी घुमाएर अस्थायी जडान (가체결) को अवस्थामा झुन्ड्याएर राख्ने जोड्ने प्रारम्भिक चरणको निर्देशन हो।",

      "의장부|볼팅/체결|홀 맞춰|두 부품의 볼트 구멍 위치를 일치시키세요|Sejajarkan letak lubang (hole) baut antara kedua komponen yang akan disambung|Hol mat-chwo|Căn cho vị trí lỗ (hole) bu lông của hai linh kiện trùng khớp nhau|Hol mat-chwo|दुईवटा पार्ट्सको बोल्टको प्वाल (Hole) को स्थान मिलाउनुहोस्|Hol mat-chwo|배관 플랜지나 기계 베이스를 조립할 때, 볼트가 저항 없이 쑥 관통할 수 있도록 위쪽 부품의 구멍과 아래쪽 부품의 구멍이 반달 모양으로 어긋나지 않게 꼬챙이(지노트)나 빠루를 이용해 완벽한 동그라미로 겹치도록 정렬하라는 뜻입니다.|Artinya meratakan posisi: pas nyambung flensa pipa atau dudukan mesin, pastiin lubang atas dan lubang bawah saling tumpang tindih ngebentuk lingkaran bulat utuh sempurna, gak boleh geser separuh miring kayak bulan sabit. Tusuk pakai besi lancip (drift pin) atau linggis buat ngungkit nyamain posisinya biar baut bisa tembus mulus lancar jaya tanpa macet nggesek.|Nghĩa là nắn chỉnh tâm: lúc ốp mặt bích ống hoặc chân máy, phải nhắm sao cho lỗ trên lỗ dưới đè khít lên nhau vành vạnh một hình tròn viên mãn, cấm lệch pha méo xệch như trăng khuyết. Phải lấy cây sắt nhọn dùi cui (drift pin) hay xà beng xọc vào nạy bẩy lắc lắc ép cho lỗ thông nòng để bu lông trôi tọt đút xuyên qua êm ru không vấp váp.|पाइपको फ्ल्यान्ज वा मेसिनको बेस जोड्दा, बोल्ट कुनै बाधा विना भित्र छिर्न सकोस् भनेर माथिल्लो पार्ट्सको प्वाल र तल्लो पार्ट्सको प्वाल आधा चन्द्रमाको आकारमा नबाङ्गिने गरी फलामको रड (जिनोट) वा क्रोबार (पारु) प्रयोग गरी पूर्ण गोलो आकारमा खप्टिने गरी मिलाउने अर्थ हो।",

      "의장부|볼팅/체결|임팩트로 조여|임팩트 렌치를 사용하여 볼트를 조이세요|Gunakan kunci impact (impact wrench) untuk mengencangkan baut|Im-paek-teu-ro jo-yeo|Sử dụng súng bắn ốc (impact wrench) để xiết chặt bu lông|Im-paek-teu-ro jo-yeo|इम्प्याक्ट रेन्च प्रयोग गरेर बोल्ट कस्नुहोस्|Im-paek-teu-ro jo-yeo|가체결된 수많은 볼트를 일일이 손으로 돌리면 시간이 너무 오래 걸리니, 방아쇠를 당기면 압축 공기 타격의 힘으로 나사를 순식간에 강력하게 감아버리는 '에어 임팩트 건'을 사용하여 작업 속도와 체결력을 높여 마무리지으라는 공정 지시입니다.|Instruksi geber kerja: pegel dan lelet kalo muter mur baut numpuk satu-satu manual pakai tangan. Titah nyuruh angkat súng senapan angin 'Air Impact Gun'. Begitu ditarik pelatuknya, angin kompresor bakal mukul nendang muter sekrup buanyaaak super kilat secepat petir dan kekunci paten mati. Nambah speed kecepatan plus kekuatan jepit finishing.|Chỉ thị bứt tốc thi công: vặn tay thủ công hàng rổ bu lông lỏng lẻo thì tới tết Công Gô mới xong. Ra lệnh xách 'Súng bắn ốc khí nén' ra trận. Bóp cò là hơi nén giã búa đập vặn xoắn ốc thít chặt cực rát trong chớp mắt. Vũ khí tối thượng tăng vọt tốc độ cày cuốc và lực kẹp khóa chết hoàn thiện sản phẩm.|अस्थायी रूपमा जोडिएका धेरै बोल्टहरूलाई एक-एक गरी हातले घुमाउँदा धेरै समय लाग्ने भएकोले, ट्रिगर तान्दा प्रेसर हावाको प्रहारको बलले नटलाई एकैछिनमा शक्तिशाली रूपमा कस्ने 'एयर इम्प्याक्ट गन' प्रयोग गरेर कामको गति र कस्ने क्षमता बढाएर काम सक्ने प्रक्रियाको निर्देशन हो।",

      "의장부|볼팅/체결|반대편 잡아|볼트를 조일 때 반대쪽 너트가 안 돌게 잡으세요|Tahan mur di sisi seberang agar tidak ikut berputar saat baut dikencangkan|Ban-dae-pyeon ja-ba|Giữ chặt đai ốc ở phía đối diện để nó không bị xoay theo khi đang siết bu lông|Ban-dae-pyeon ja-ba|बोल्ट कस्दा अर्कोतिरको नट नघुम्ने गरी समात्नुहोस्|Ban-dae-pyeon ja-ba|앞에서 임팩트 총이나 스패너로 볼트 대가리를 돌려 조일 때, 구멍 반대편에 끼워진 너트가 헛돌아버리면 평생 조여지지 않으므로, 보조 작업자가 반대편으로 넘어가 또 다른 몽키 스패너를 너트에 꽉 끼워 나사가 헛돌지 않게 버텨 달라는 협동 작업 요청입니다.|Teriakan koordinasi duet kuli: pas bapak di depan ngegas muter kepala baut pake súng impact atau spanner, mur di buntut seberang sana pasti bakal ikut muter ngelos kosong gak bakal kenceng sampai kiamat. Tolong temen sebelahnya lari ke belakang, jepit pasang kunci inggris (monkey spanner) satu lagi nahan mur pantat itu biar diem kaku gak ikut goyang muter.|Khẩu lệnh tác chiến đồng đội: lúc ông tướng mặt tiền chĩa súng impact hay cờ lê xoay siết vặn đầu bu lông, cái đai ốc tòng teng ở đầu mút bên kia lỗ chắc chắn sẽ xoay mòng mòng chạy theo, có vặn tới mùa quýt cũng chả chặt. Xin anh thợ phụ lượn ra phía sau mặt hậu, kẹp gông cái mỏ lết mím chặt chốt giữ đai ốc đó câm nín đứng im chịu trận không cho xoay trượt theo.|अगाडिबाट इम्प्याक्ट गन वा रेन्चले बोल्टको टाउको घुमाएर कस्दा, प्वालको अर्कोतिर घुसाइएको नट खाली घुम्यो भने जीवनभर कसे पनि कसिँदैन, त्यसैले सहयोगी कामदार अर्कोतिर गएर अर्को मङ्की रेन्चले नटलाई कडा गरी च्यापेर नट खाली नघुम्ने गरी अड्याउन अनुरोध गरिएको सहकार्यको कामको निर्देशन हो।",

      "의장부|도구/자재|구리스 발라|볼트나 마찰 부위에 윤활제를 도포하세요|Oleskan pelumas (grease) pada baut atau area gesekan|Gu-ri-seu bal-ra|Bôi mỡ bôi trơn (grease) vào bu lông hoặc các bề mặt ma sát|Gu-ri-seu bal-ra|बोल्ट वा घर्षण हुने भागमा लुब्रिकेन्ट (ग्रीस) लगाउनुहोस्|Gu-ri-seu bal-ra|바닷물(해수)에 노출되는 야외 갑판의 볼트 체결부나 모터 회전 축 등 마찰이 심한 금속 부품들이 뻘겋게 녹슬어 늘어붙거나 마모되는 것을 막기 위해, 끈적하고 기름진 윤활 방청제(구리스)를 손가락이나 붓에 묻혀 나사산과 관절 부위에 떡칠하듯 듬뿍 발라주라는 기계 정비 필수 지시입니다.|Instruksi wajib rawat jalan mekanik: cegah mur baut di geladak luar yang sering kena tamparan cipratan air laut asin atau as engsel dinamo motor yang sering gesekan keras biar gak karatan nempel mati susah dicabut atau aus rontok. Colek usap pulas pelumas gemuk (Grease) kental anti-karat lumasin pakai jari atau kuas, lumuri leletin tebal tebal melimpah ruah ngebungkus ulir sekrup sama sendi sendi engsel besi persendiannya.|Mệnh lệnh bảo dưỡng máy móc sinh tồn: bảo vệ dàn ốc vít phơi sương gió trên boong tàu cọ xát tắm táp nước biển mặn chát hay trục quay cọ xát ác liệt của mô tơ khỏi thảm cảnh gỉ sét dính chặt cứng ngắc vặn gãy tay không ra hoặc mòn vẹt xơ xác. Quẹt bôi trét mỡ bò bôi trơn chống rỉ (Grease) đặc quánh nhơn nhớt bằng ngón tay hay cọ, trét láng tráng men ngập ngụa phủ phê đắp dày cộm lấp kín ren ốc và các ổ khớp cử động ma sát.|समुद्रको पानी (ह्यासु) को सम्पर्कमा आउने बाहिरी डेकको बोल्ट कस्ने भाग वा मोटर घुम्ने अक्ष जस्ता धेरै घर्षण हुने धातुका पार्ट्सहरू रातो भएर खिया लाग्ने वा खिइने समस्या रोक्नको लागि, टाँसिने र चिल्लो लुब्रिकेन्ट (ग्रीस) लाई औंला वा ब्रसले लिएर नटको थ्रेड र जोर्नी भागमा बाक्लो गरी दल्ने मेसिन मर्मतको अनिवार्य निर्देशन हो।",
