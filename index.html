      "의장부|도구/자재|공구 가져와|작업에 필요한 수공구 및 전동공구를 챙기세요|Bawa perkakas tangan dan perkakas listrik (power tools) yang diperlukan untuk bekerja|Gong-gu ga-jyeo-wa|Mang các dụng cụ cầm tay và dụng cụ điện cần thiết cho công việc tới đây|Gong-gu ga-jyeo-wa|कामको लागि आवश्यक पर्ने हाते औजार र इलेक्ट्रिक औजारहरू ल्याउनुहोस्|Gong-gu ga-jyeo-wa|아침 조회 후 현장 배에 오르기 전이나 새로운 작업을 할당받았을 때, 볼트를 조일 스패너, 자를 줄자, 망치 같은 '기본 수공구'부터 그라인더나 전동 드릴 같은 '전기 공구(파워 툴)'까지 오늘 하루 해당 공정에 꼭 필요한 무기(연장)들을 공구함 구루마나 개인 쌕(가방)에 든든하게 빠짐없이 담아 작업 위치로 메고 올라가라는 아침 출격 지시입니다.|Instruksi siap tempur pagi: beres apel pagi sebelum nanjak naik geladak kapal atau nerima misi tugas baru. Seret gotong borong kumpulin semua senjata perang (perkakas) dari gudang loker ke gerobak atau tas ransel pribadi, bawa naik ke TKP lapangan. Mulai dari 'perkakas tangan' receh macam kunci pas spanner, meteran, palu, sampe 'perkakas mesin sakti' (power tools) sekelas gerinda putar ngeronta atau bor bor listrik. Haram hukumnya ketinggalan selip satupun peluru penting buat survive shift harian.|Lệnh xuất quân nổ súng đầu ngày: sau khi chém gió họp giao ban sáng sớm, trước khi xách mông leo lên mạn tàu hoặc vừa nhận lệnh phân công chiến dịch mới. Xúc xẻng gom góp đóng gói tút tuột mọi loại vũ khí hạng nặng hạng nhẹ (đồ nghề) thiết yếu sống còn cho công đoạn hôm nay bỏ gọn vào xe đẩy hay tống vô túi xách cá nhân vác lên vai lết lên vị trí giàn giáo. Từ 'dụng cụ cầm tay' thủ công như cờ lê, thước cuộn, búa tạ, cho tới 'dụng cụ điện' (power tool) rồ ga như máy mài chà nhám, máy khoan điện bốc khói, cấm được rớt mạng bỏ quên món nào.|बिहानी सभा पछि साइटको जहाजमा चढ्नु अघि वा नयाँ कामको जिम्मा पाउँदा, बोल्ट कस्ने रेन्च, नाप्ने इन्ची टेप, मार्तोल जस्ता 'आधारभूत हाते औजार' देखि ग्राइन्डर वा इलेक्ट्रिक ड्रिल जस्ता 'इलेक्ट्रिक औजार (पावर टुल)' सम्म आज दिनभरिको उक्त प्रक्रियाको लागि एकदमै आवश्यक पर्ने हतियार (औजार) हरूलाई औजार बाकसको ट्रली वा व्यक्तिगत झोलामा बलियोसँग नछुटाई हालेर काम गर्ने ठाउँमा बोकेर जाने बिहानी प्रस्थानको निर्देशन हो।",

      "의장부|도구/자재|공구실 다녀와|공구실에 가서 필요한 장비를 빌려오세요|Pergi ke ruang alat (tool room) untuk meminjam peralatan yang dibutuhkan|Gong-gu-sil da-nyeo-wa|Hãy đi đến phòng dụng cụ (tool room) để mượn các thiết bị cần thiết|Gong-gu-sil da-nyeo-wa|औजार कक्षमा गएर आवश्यक उपकरणहरू मागेर (उधारो) ल्याउनुहोस्|Gong-gu-sil da-nyeo-wa|작업자가 개인적으로 구비할 수 없는 크고 비싼 특수 장비(대형 임팩트 렌치, 체인블록, 유압 펌프, 레이저 레벨기 등)가 당장 현장에서 필요할 때, 반장의 승인 서명이 적힌 대여 장부를 들고 멀리 있는 부서 공용 '공구실(Tool Room)' 창구에 가서 사번을 적고 번호표가 붙은 장비를 무사히 대여해(빌려) 오라는 심부름성 업무 지시입니다.|Instruksi tugas lari pesuruh: pas mendadak butuh senjata sakti khusus elit berharga mahal yang kuli biasa kagak sanggup beli ngantongin sendiri (pistol impact raksasa, katrol chain block rantai, pompa cairan hidrolik, tembakan level laser dsb). Bawa lari kertas bon peminjaman berstempel tanda tangan sakti mandor, merantau jauh datengin loket 'Ruang Perkakas (Tool Room)' publik milik divisi. Serahin nomor induk pegawai (NIK), pinjam sewa garap bawa pulang balikin dengan selamat alat inventaris bernomor seri plat itu ke lapak kerja.|Chỉ thị sai vặt chạy cờ lệnh: khoảnh khắc hiện trường réo rắt đòi khẩn cấp mấy món siêu vũ khí tối tân đắt xắt ra miếng mà thợ thuyền cò con không tài nào sắm nổi xách tay (súng bắn ốc khổng lồ, ròng rọc palăng xích, máy bơm kích thủy lực, máy bắn cốt tia laser v.v.). Ôm lá bùa lệnh bài giấy mượn đồ có cộp mác chữ ký ân chuẩn của tổ trưởng, băng suối lội đèo mò ra tận quầy giao dịch 'Phòng Đồ Nghề (Tool Room)' công cộng của phòng ban. Điền mã số nhân viên thẻ nhân tên, mượn tạm vay nóng ôm khư khư bưng cỗ máy cộp mác số seri quản lý đó quay về bến đỗ an toàn.|कामदारले व्यक्तिगत रूपमा राख्न नसक्ने ठूलो र महँगो विशेष उपकरण (ठूलो इम्प्याक्ट रेन्च, चेन ब्लक, हाइड्रोलिक पम्प, लेजर लेभल मेसिन आदि) तुरुन्तै साइटमा आवश्यक पर्दा, सुपरभाइजरको स्वीकृति हस्ताक्षर भएको उधारो खाता बोकेर टाढा रहेको विभागको साझा 'औजार कक्ष (Tool Room)' को काउन्टरमा गएर कर्मचारी नम्बर लेखी नम्बर टाँसिएको उपकरण सुरक्षित रूपमा मागेर (उधारो) ल्याउने अहराएको कामको निर्देशन हो।",

      "의장부|도구/자재|마킹펜 가져와|작업 완료 표시를 위한 마킹펜을 가져오세요|Bawa spidol penanda (paint marker) untuk menandai pekerjaan yang sudah selesai|Ma-king-pen ga-jyeo-wa|Mang bút sơn (paint marker) lại đây để đánh dấu công việc đã hoàn thành|Ma-king-pen ga-jyeo-wa|काम सकिएको चिनो लगाउन मार्किङ पेन (पेन्ट मार्कर) ल्याउनुहोस्|Ma-king-pen ga-jyeo-wa|볼트 체결이나 밸브 조립이 기준치에 맞게 100% 완벽하게 조여져서 검사가 끝났음을 증명하기 위해, 그 너트와 볼트 끄트머리에 하얀색이나 노란색 페인트가 나오는 산업용 매직 펜(마카 펜)으로 가로줄을 직- 그어 이탈 방지 및 조임 완료 인증 마크(토크 마킹)를 남겨야 하니 그 펜을 주머니에서 꺼내 가져오라는 뜻입니다.|Artinya minta tolong sodorin pulpen ajaib industri spidol cat (Paint Marker) isi tinta putih kuning dari kantong celana. Begitu mur baut atau engsel valve udah kelar dipelintir disiksa dicek dipastikan seratus persen kekunci rapat kaku mentok mampet standar pabrik. Wajib hukumnya ngelukis narik ngegaris lurus sret- di jidat kepala sekrup dan mur pake tuh spidol, sebagai stempel sertifikat sakti bukti 'Udah Dikencengin Pol' (Torque Marking) sekaligus tameng deteksi dini kalo bautnya kendor muter lepas kegegar mesin.|Ý là kêu móc túi moi ra đưa chùm bút dạ quang ma thuật công nghiệp (Paint Marker) bơm mực sơn trắng vàng chói lóa. Xài ngay sau màn xiết gông cùm bu lông đai ốc hoặc ráp van vòi đạt chuẩn đỗ đạt 100% không thể nhúc nhích. Bắt buộc phải cầm bút rạch rạch quẹt một đường ngang thẳng tưng vắt chéo từ đỉnh nón ốc rớt xuống thành đai, để in dấu mộc triện niêm phong chứng nhận 'Đã xiết cứng ngắc đạt chuẩn' (Torque Marking), kiêm luôn chức năng cảnh báo báo động nếu con ốc lỡ dở chứng nới lỏng tụt ren xoay mòng mòng do máy rung.|बोल्ट कस्ने वा भल्भ जोड्ने काम मापदण्ड अनुसार १००% पूर्ण रूपमा कसिएर परीक्षण सकिएको कुरा प्रमाणित गर्न, त्यो नट र बोल्टको टुप्पामा सेतो वा पहेंलो पेन्ट निस्कने औद्योगिक म्याजिक पेन (मार्कर पेन) ले तेर्सो लाइन 'सट्ट' कोरेर खुस्कन नदिने र कस्ने काम सकिएको प्रमाणित चिन्ह (टर्क मार्किङ) छोड्नुपर्ने भएकोले त्यो पेन पकेटबाट निकालेर ल्याउने अर्थ हो।",

      "의장부|검사/확인|의장 검사 받아|의장품 설치 완료 후 품질 검사를 받으세요|Dapatkan inspeksi kualitas setelah instalasi peralatan outfitting selesai|Ui-jang geom-sa ba-da|Hãy yêu cầu kiểm tra chất lượng sau khi hoàn thành lắp đặt thiết bị outfitting|Ui-jang geom-sa ba-da|आउटफिटिङ (उपकरण) जडान सकिएपछि गुणस्तर परीक्षण गराउनुहोस्|Ui-jang geom-sa ba-da|수천 개의 파이프, 모터, 사다리, 통로 등 철로 된 배의 내장품(의장품)을 도면대로 정위치에 흔들림 없이 용접하고 볼팅하여 설치를 마쳤으니, 회사 소속의 품질 관리자(QC)를 현장으로 호출하여 치수 오차나 누락, 용접 불량이 없는지 꼼꼼한 육안 검사(Inspection)를 쳐서 합격 도장을 받아내라는 가장 중요한 공정 마감 지시입니다.|Instruksi penutupan gerbang panggung utama: ribuan instalasi jeroan lambung kapal berbahan baja (perlengkapan outfitting) - pipa pralon, dinamo motor, anak tangga, lorong catwalk - sukses tamat dirakit dilas dibaut duduk manis presisi absolut gak goyang ngikutin sabda gambar blueprint. Kini waktunya ritual pemanggilan arwah sang algojo inspektur kualitas (QC) perusahaan buat sidak lapor keliling merazia pakai mata elang. Pasrah pasang badan dicek diukur diinterogasi dicari borok cacat selisih ukuran, baut lupa, atau lasan kropos. Berjuang keras dapetin cap stempel stiker lulus (Approved) sakti sebagai bukti sah naik kasta.|Lệnh kết liễu khép màn sân khấu trọng đại: đã cày cuốc thi công cắm rễ dính chặt thành công rực rỡ không suy xuyển xê dịch hàng ngàn món đồ chơi nội thất ruột gan tàu bằng thép (đồ sắt outfitting) - như ống nước, động cơ, cầu thang, hành lang - đúng y boong tọa độ bản thiết kế. Giờ là tiết mục triệu hồi ngài hung thần giám định chất lượng (QC) nội bộ công ty ngự giá giáng lâm xuống địa bàn để xoi bới bắt lỗi kiểm tra ngoại quan (Inspection) săm soi vạch lá tìm sâu xem có lệch ly tấc, bỏ quên đồ, hay hỏng mối hàn không. Trầy da tróc vẩy chiến đấu giành giật cho bằng được cái mộc giáp lai chứng nhận đỗ đạt (Passed).|हजारौं पाइप, मोटर, भर्याङ, बाटो जस्ता फलामले बनेका जहाजका भित्री सामग्री (आउटफिटिङ) लाई नक्सा अनुसार सही ठाउँमा नहल्लिने गरी वेल्डिङ गरेर र बोल्ट कसेर जडान सकिएकोले, कम्पनीको गुणस्तर व्यवस्थापक (QC) लाई साइटमा बोलाएर नापको त्रुटि वा छुटेको, वेल्डिङको खराबी छ कि छैन भनेर होसियारीपूर्वक आँखाले हेर्ने परीक्षण (Inspection) गराएर पास भएको छाप माग्ने सबैभन्दा महत्त्वपूर्ण प्रक्रिया अन्त्यको निर्देशन हो।",

      "의장부|검사/확인|호선 번호 확인해|작업 중인 배의 고유 번호를 확인하세요|Periksa nomor identifikasi (Hull Number) kapal yang sedang dikerjakan|Ho-seon beon-ho hwa-gin-hae|Kiểm tra số hiệu vỏ tàu (Hull Number) của con tàu đang thi công|Ho-seon beon-ho hwa-gin-hae|काम गरिरहेको जहाजको आफ्नै नम्बर (हल नम्बर) जाँच्नुहोस्|Ho-seon beon-ho hwa-gin-hae|조선소 도크에는 똑같이 생긴 거대한 배들이 여러 척 동시에 만들어지고 있습니다. 내가 들고 있는 도면과 자재가 지금 발을 딛고 올라타 있는 이 선박(호선)의 부품이 맞는지, 배 앞머리나 도면에 큼지막하게 적힌 선박 고유 번호(Hull No. 예를 들어 8275호)를 다시 한번 똑똑히 쳐다보고 교차 검증하여, 남의 배에 엉뚱한 기계를 달아버리는 돌이킬 수 없는 미친 오작 사고를 원천 방지하라는 뼈 때리는 경고입니다.|Peringatan keras penangkal kiamat salah alamat: di kolam dok galangan, banyak raksasa kapal kembar identik berjejer barengan dibangun barengan. Jangan sampai linglung! Cek silang pelototin melek-melek nomor KTP plat nomor unik kapal (Hull No. misal: kapal 8275) yang tertulis segede gaban di hidung kapal sama di kertas blueprint. Pastiin barang material di tangan bapak emang jodohnya kapal yang diinjek ini. Haram hukumnya mabuk masang nempelin mesin jantung ke tubuh kapal tetangga, itu mah cacat error (Ojak) gila fatal yang gak bisa dimaafin sumur idup!|Cảnh cáo chí mạng ngăn chặn thảm kịch râu ông nọ cắm cằm bà kia: dưới lòng chảo xưởng đẻ tàu, vô vàn các xác tàu khổng lồ sinh đôi sinh ba đang đồng loạt được nhào nặn. Đừng có ngáo ngơ! Vạch mắt dòm trừng trừng dò xét đối chiếu chéo cái mã số căn cước công dân độc bản của con tàu (Hull No. ví dụ: tàu số 8275) in chà bá lửa ở mũi tàu với tệp bản vẽ lủng lẳng trên tay. Phải ngầm định đinh ninh 100% món đồ lề vật tư đang ôm khư khư đích thị là duyên tiền định thuộc về con tàu mình đang đạp chân lên. Cấm tiệt trò điên rồ râu ông nọ cắm cằm bà kia, bế nhầm cỗ máy cốt lõi sang cấy ghép cho tàu nhà láng giềng, một pha sai lầm (Ojak) đần độn tuyệt vọng vô phương cứu chữa tàn đời!|शिपयार्डको डकमा उस्तै देखिने विशाल जहाजहरू एकैपटक धेरै वटा बनिरहेका हुन्छन्। आफूले बोकेको नक्सा र सामग्री अहिले आफू उभिरहेको यही जहाज (होसन) को पार्ट्स हो कि होइन भनेर, जहाजको अगाडि वा नक्सामा ठूलो अक्षरले लेखिएको जहाजको आफ्नै नम्बर (Hull No. उदाहरणको लागि ८२७५ नम्बर) लाई फेरि एकपटक राम्रोसँग हेरेर क्रस जाँच गरी, अरूको जहाजमा गलत मेसिन जोड्ने कहिल्यै सुधार्न नसकिने पागल ओजाक (गल्ती) दुर्घटनालाई पूर्ण रूपमा रोक्नको लागि दिइने कडा चेतावनी हो।",

      "의장부|검사/확인|이면 확인해|용접 부위의 반대쪽까지 품질을 확인하세요|Periksa kualitas hingga ke sisi belakang (backing) area las|I-myeon hwa-gin-hae|Kiểm tra chất lượng mặt sau (backing) của vị trí mối hàn|I-myeon hwa-gin-hae|वेल्डिङ भागको पछाडिको (ब्याकिङ) गुणस्तरसम्म जाँच्नुहोस्|I-myeon hwa-gin-hae|파이프나 구조물 앞면에서 화려하게 불꽃을 튀기며 용접을 끝마쳤다고 방심하지 말고, 철판 뒤로 고개를 들이밀어 쇳물이 두께를 뚫고 나와 뒷면(이면, Root)까지 균일하고 둥그스름하게 잘 융착되었는지, 쇳물이 덜 채워져 구멍이 비어있는 불량은 없는지 손전등을 비춰가며 양면의 완벽한 품질을 스스로 검수하라는 의미입니다.|Artinya jangan keburu tepuk dada lega kelar ngelas mamerin kembang api di muka depan plat. Sorongkan kepala ngintip merayap ke balik bokong tembok pipa, nyalakan senter sorot tajam raba raba cek apakah lahar cairan besi sukses ngebor nembus ketebalan baja sampe menetas meluap ngebentuk benjolan sosis halus merata di akar pantat belakang (Root / I-myeon). Razia sidak adakah penyakit bolong kopong cacat kurang gizi lelehan. Tukang las wajib mandiri mawas diri ngetes inspeksi garansi kualitas tembus depan belakang sempurna tanpa cacat celah.|Nghĩa là đừng có vội vỗ ngực tự đắc hí hửng dứt điểm màn xịt pháo hoa biểu diễn hàn xì mặt tiền. Hãy rướn cổ chui rúc lộn lèo ra đằng sau gáy vách ống, rọi đèn pin sáng rực chĩa soi mói cặn kẽ xem dòng dung nham nước thép có xuyên thủng ngoạn mục bề dày lớp tôn, trào vọt ứa ra nặn thành đường gân sẹo lồi tròn trịa trơn tru ở khe rãnh chân đế mặt hậu (Root / I-myeon) hay không. Bắt thóp tóm gáy lùng sục xem có dính phốt rỗng ruột rỗ tổ ong do thiếu hụt nước sắt tồi tệ không. Tự thân thợ phải nghiệm thu bảo kê chất lượng hoàn mỹ vô khuyết thấu triệt trước sau như một.|पाइप वा संरचनाको अगाडिबाट भव्य रूपमा आगोको झिल्का उडाएर वेल्डिङ सकें भनेर ढुक्क नभई, फलामको पछाडि टाउको छिराएर पग्लेको फलामले मोटाईलाई छेडेर पछाडि (इम्योन, Root) सम्म एकनास र गोलो गरी राम्रोसँग फ्युजन भएको छ कि छैन, पग्लेको फलाम कम भरिएर प्वाल खाली रहेको खराबी छ कि छैन भनेर टर्चलाइट बालेर दुवैतिरको पूर्ण गुणस्तर आफैंले परीक्षण गर्ने अर्थ हो।",

      "의장부|검사/확인|개정도 확인해|현재 사용 도면이 최신 개정판인지 보세요|Periksa apakah gambar desain yang digunakan adalah revisi (revision) terbaru|Gae-jeong-do hwa-gin-hae|Kiểm tra xem bản vẽ đang dùng có phải là bản cập nhật sửa đổi (revision) mới nhất không|Gae-jeong-do hwa-gin-hae|अहिले प्रयोग भइरहेको नक्सा सबैभन्दा नयाँ परिमार्जित (Revision) हो कि हेर्नुहोस्|Gae-jeong-do hwa-gin-hae|배를 짓다 보면 파이프가 기둥에 걸려 위치가 수시로 바뀌는 등 설계 변경이 하루아침에 밥 먹듯이 일어납니다. 그러니 현장 작업자가 며칠 전 뽑아온 구형 도면 종이 쪼가리만 믿고 옛날 치수대로 부품을 용접했다가는 다 뜯어고쳐야 하는 폭망 사태가 오므로, 작업 착수 전 지금 들고 있는 종이가 회사 전산망의 가장 따끈따끈한 최신 버전 번호(리비전, Rev.1, 2, 3...)와 일치하는지 사무실에 전화해서라도 기필코 확인하라는 재앙 방지 지시입니다.|Bencana kiamat pembongkaran massal mengintai: pas bangun kapal, posisi rute pipa sering dadakan dirombak dipindah geser tabrak tiang melulu tiap subuh hari. Makanya haram hukumnya kuli lapangan sisa nyontek kertas lecek blueprint kadaluarsa cetakan minggu kemaren, trus buta buta ngelas ngerakit pake ukuran purba itu. Dijamin bakal nangis darah disuruh bongkar hancurin balik dari nol. Sebelum mulai narik obor, hukumnya fardu ain nelpon nanya ke admin kantor, cocokin pastiin kertas di tangan itu valid nempel kembar sama angka versi edisi update teranyar (Revision, Rev.1, 2, 3...) yang nangkring di sistem server perusahaan.|Thảm kịch phá dỡ đập đi xây lại rình rập: trong quá trình xây tàu, đường đi nước bước của ống tuýp thường xuyên bị đập đi xây lại nắn chỉnh chệch hướng do đụng cột đình như cơm bữa sau một đêm. Thế nên thợ thuyền hiện trường mà cứ nhắm mắt làm liều bấu víu răm rắp cắn răng tin sái cổ vào mẩu giấy lộn bản vẽ đồ cổ in từ đời nảo đời nào, hì hục hàn ráp linh kiện y xì kích thước thời tiền sử thì cầm chắc án tử rã xác tháo dỡ toàn tập. Trước lúc xắn tay áo làm mướn, lệnh quân luật bắt buộc gọi điện nã admin văn phòng check chéo, xác nhận ấn bản giấy lộn trên tay có khớp mốc mã số phiên bản cập nhật nóng hổi rực rỡ nhất (Revision, Rev.1, 2, 3...) trên máy chủ tổng công ty hay không.|जहाज बनाउँदा पाइप पिलरमा अड्किएर स्थान बेला-बेलामा परिवर्तन हुने जस्ता डिजाइन परिवर्तनहरू दिनदिनै भात खाए जस्तै भइरहन्छन्। त्यसैले साइटको कामदारले केही दिन अघि निकालेको पुरानो नक्साको कागजको टुक्रा मात्र विश्वास गरेर पुरानो नाप अनुसार पार्ट्स वेल्डिङ गर् यो भने सबै भत्काएर फेरि बनाउनुपर्ने बर्बाद अवस्था आउने भएकोले, काम सुरु गर्नु अघि अहिले बोकेको कागज कम्पनीको कम्प्युटर नेटवर्कको सबैभन्दा नयाँ तातो भर्जन नम्बर (रिभिजन, Rev.1, 2, 3...) सँग मिल्छ कि मिल्दैन भनेर अफिसमा फोन गरेर भए पनि अनिवार्य रूपमा जाँच्ने विपत्ति रोकथाम निर्देशन हो।",

      "의장부|검사/확인|압력 게이지 확인해|배관 압력이 정상 범위인지 게이지를 보세요|Periksa pengukur tekanan (pressure gauge) apakah tekanan pipa dalam batas normal|Ap-ryeok ge-i-ji hwa-gin-hae|Kiểm tra đồng hồ đo áp suất (pressure gauge) xem áp suất đường ống có ở mức bình thường không|Ap-ryeok ge-i-ji hwa-gin-hae|पाइपको प्रेसर सामान्य दायराभित्र छ कि प्रेसर गेज (Pressure Gauge) हेर्नुहोस्|Ap-ryeok ge-i-ji hwa-gin-hae|파이프 조립 후 내부에 물이나 가스를 불어넣어 터지지 않는지 테스트할 때, 파이프 겉에 달려있는 동그란 시계 모양의 눈금자(압력 게이지) 바늘이 도면이 요구하는 제한 수치(bar)까지 정확하게 올라갔는지, 그리고 시간이 지나도 바늘이 뒤로 떨어지지 않고(압력 유지) 그 자리에 딱 멈춰 서 있는지를 날카롭게 노려보며 배관의 무결성을 스스로 증명하라는 기술적 체크 지시입니다.|Instruksi teknis pembuktian uji nyali kedap pipa: usai ngerakit, suntik pompa air ledeng atau tiup angin gas ke dalam urat nadi pipa buat ngetes uji pecah ketahanan. Pelototi tajam menembus jarum kompas jam bundar pengukur nafas (Pressure Gauge) yang nempel di punggung pipa. Pastikan jarum ngaceng mendaki manjat persis nancep ke angka keramat (bar) batas maksimal di kitab blueprint. Trus pantau terus amati, awas kalo seiring waktu jarumnya lunglai merosot turun loyo ke belakang (berarti bocor), wajib membeku nongkrong statis di puncak menahan nafas tekanannya membuktikan pipa itu perawan mutlak tanpa cacat rembes.|Chỉ thị kỹ thuật chứng thực độ hoàn hảo bất khả xâm phạm của đường ống: sau màn chắp nối, bơm xả xối xả nước hoặc nén tống khí gas vào ruột ống để thử lửa xem sức chịu đựng vỡ nổ. Trừng mắt nheo mày dòm chằm chằm soi mói cái kim đồng hồ mặt tròn lồi (Pressure Gauge) đeo bám ngoài vỏ ống. Căn ke xem mũi kim có leo dốc thẳng đứng vút lên chốt hạ chạm đỉnh con số giới hạn (bar) khắc nghiệt trong bản vẽ đòi hỏi hay không. Rồi rình rập chờ đợi, cấm tiệt mũi kim ủ rũ ỉu xìu tuột dốc rớt hạng theo thời gian (tức là hở rò rỉ), bắt buộc phải chết lặng đóng băng tê liệt ngay tại đỉnh vinh quang duy trì phong độ áp lực chứng tỏ ruột gan ống kín bưng bít tuyệt đối.|पाइप जोडेपछि भित्र पानी वा ग्यास पठाएर नफुट्ने गरी टेस्ट गर्दा, पाइपको बाहिर जोडिएको गोलो घडी आकारको स्केल (प्रेसर गेज) को सुई नक्साले मागेको सीमा मान (bar) सम्म ठ्याक्कै चढेको छ कि छैन, र समय बित्दै जाँदा सुई पछाडि नझरी (प्रेसर कायम राख्दै) त्यही ठाउँमा ट्याक्क रोकिएर बसेको छ कि छैन भनेर तीखो आँखाले हेर्दै पाइपको पूर्णता आफैं प्रमाणित गर्ने प्राविधिक चेक निर्देशन हो।",

      "의장부|검사/확인|유격 봐봐|부품 간의 간격이 적정한지 확인하세요|Periksa apakah celah toleransi (clearance) antar komponen sudah pas|Yu-gyeok bwa-bwa|Kiểm tra xem khoảng hở cho phép (clearance) giữa các bộ phận có phù hợp không|Yu-gyeok bwa-bwa|पार्ट्स बीचको ग्याप (Clearance) उचित छ कि छैन जाँच्नुहोस्|Yu-gyeok bwa-bwa|진동이 심한 배 위에서는 기계 장비나 배관들이 딱 붙어있으면 팽창하여 마찰로 깨지므로, 고의로 두 부품 사이에 아주 얇은 틈새(유격, Clearance)를 벌려둡니다. 도면대로 볼트를 조인 뒤, 그 틈새에 얇은 철판 틈새 게이지를 쑤셔 넣어 너무 꽉 끼거나 너무 헐렁하지 않고 살짝 뻑뻑하게 들어가는 황금 비율의 틈새 공간이 설계된 치수대로 완벽히 확보되었는지 감각적으로 확인하라는 고도의 세팅 점검입니다.|Instruksi cek setting tingkat dewa mekanik: di atas kapal gempa berjalan yang getarannya barbar, kalo mesin engine atau pipa ditempel dempet nyium mati gancet, nanti panas mekar memuai pasti bergesekan hancur retak pecah berkeping keping. Makanya sengaja dikasih nafas celah sempit tipis celah renggang (Clearance/Yugyeok) pemisah. Abis mur baut disiksa kencang sesuai blueprint, tusuk masukin bilah besi tipis lidah ukur celah (Feeler Gauge) ke rongga sempit itu. Rasakan raba pakai insting naluri, pastikan bilahnya masuk seret-seret basah pas, gak kendor plong kelonggaran, gak macet total kesempitan gancet. Wajib raih nyetel kuota rongga emas presisi dewa sinkron sama dimensi angka kitab suci desain.|Chỉ thị rà soát setting đẳng cấp tinh vi thủ công: trên mâm tàu chao đảo bập bềnh rung lắc kịch liệt, rủi mà bắt ép máy móc hay đường ống ốp sát dính lẹo hôn chụt vào nhau, dính nhiệt độ cao nở phình ra cọ xát là vỡ vụn nát bét. Thế nên cố tình chừa banh ra một khe hở hẹp rỗng xíu xiu đệm khí thở (Clearance/Yugyeok). Dùng sức vặn ốc theo đúng bài bản vẽ xong, thọc nhét chèn cái lưỡi dao sắt lá mỏng dính đo khe hở (Feeler Gauge) luồn vào nách. Dùng xúc giác cảm nhận vuốt ve, chẩn đoán xem lưỡi dao đút lọt sồn sột êm ái vừa khít, không chui tọt lỏng lẻo trơn tuột, cũng chả kẹt cứng ngắc nghẽn thở. Bắt buộc chinh phục tỉ lệ vàng khe hở không gian bảo chứng ăn rơ trọn vẹn số đo thiết kế.|धेरै कम्पन हुने जहाजमा मेसिन उपकरण वा पाइपहरू ट्याक्क जोडिएर बसेमा फुलेर घर्षण भई फुट्ने भएकोले, जानीजानी दुईवटा पार्ट्सको बीचमा एकदमै पातलो ग्याप (युग्यक, Clearance) छोडिन्छ। नक्सा अनुसार बोल्ट कसेपछि, त्यो ग्यापमा पातलो फलामको ग्याप नाप्ने गेज घुसारेर धेरै कडा रूपमा अड्किने वा धेरै खुकुलो नहुने गरी हल्का कडा रूपमा छिर्ने सुनौलो अनुपातको ग्यापको ठाउँ डिजाइन गरिएको नाप अनुसार पूर्ण रूपमा कायम भएको छ कि छैन भनेर इन्द्रियले महसुस गर्दै जाँच्ने उच्च स्तरको सेटिङ परीक्षण हो।",

      "의장부|구역/환경|8275호선 들어가|지정된 작업 호선 내부로 입장하세요|Masuk ke dalam area lambung kapal (hull) nomor 8275 yang ditentukan untuk bekerja|Pal-i-chil-o ho-seon deu-reo-ga|Hãy tiến vào bên trong tàu có số hiệu vỏ tàu (hull) 8275 được chỉ định để làm việc|Pal-i-chil-o ho-seon deu-reo-ga|तोकिएको काम गर्ने जहाजको हल नम्बर ८२७५ भित्र जानुहोस्|Pal-i-chil-o ho-seon deu-reo-ga|도크 안이나 안벽에 여러 척의 거대한 선박이 동시에 지어지고 있으므로, 아침 조회 후 오늘 당신의 소속 팀이 파이프를 달고 밸브를 조여야 할 배의 정확한 프로젝트 식별 번호(Hull No. 예를 들어 8275호 선박)를 확인하고 그 배의 좁고 어두운 내부 미로 구역으로 길을 잃지 말고 찾아 들어가 본격적인 전쟁(작업)을 시작하라는 출동 명령입니다.|Komando operasi serbu pagi lapangan: di kolam dok atau bersandar di dermaga, berjejer parkir raksasa kapal kembar identik yang lagi digarap masal barengan. Kelar apel pagi doa bareng, melek melek cek pastikan baca nomor KTP plat identitas proyek mutlak (Hull No. misal: Kapal 8275) dari kapal target tempat tim kamu dijatah tugas masang pipa merangkai klep valve hari ini. Terjun masuk merayap ke perut labirin lorong gelap gulita sempit kapal itu, awas nyasar salah alamat kapal orang, laksanakan misi tempur pengerjaan sesungguhnya dimulai.|Lệnh xuất kích tác chiến hừng đông: dưới ụ nổi dock hay neo đậu kề cảng, la liệt sừng sững dăm ba con tàu khổng lồ sinh đôi sinh ba đang đồng thời được nhào nặn. Giải tán chém gió họp giao ban sáng, ráng banh mắt dòm kỹ xác nhận mã số căn cước dự án độc bản (Hull No. ví dụ: Tàu 8275) của con tàu mà tổ đội ông bị ấn định phải xách đồ nghề lên cày ải treo ống vặn van hôm nay. Chui rúc lặn ngụp lọt thỏm vào hang ổ mê cung nội tạng boong tàu tối tăm chật chội, tuyệt đối cấm đi lạc sang nhầm tàu nhà hàng xóm, châm ngòi nổ súng khởi tranh cuộc chiến bốc vác bạt mạng.|डकभित्र वा किनारामा उस्तै देखिने धेरै वटा विशाल जहाजहरू एकैपटक बनिरहेका हुन्छन्, त्यसैले बिहानी सभा पछि आज तपाईंको टिमले पाइप हाल्ने र भल्भ कस्ने जहाजको सही प्रोजेक्ट पहिचान नम्बर (Hull No. उदाहरणको लागि ८२७५ नम्बर जहाज) जाँचेर त्यो जहाजको साँघुरो र अँध्यारो भित्री भूलभुलैया क्षेत्रमा बाटो नबिराई भित्र पसेर मुख्य युद्ध (काम) सुरु गर्ने प्रस्थान आदेश हो।",

      "의장부|구역/환경|엔진룸 이동해|선박의 심장부인 엔진실로 이동하세요|Pindah ke ruang mesin (engine room) yang merupakan jantung penggerak kapal|En-jin-rum i-dong-hae|Hãy di chuyển đến buồng máy (engine room) - trái tim của con tàu|En-jin-rum i-dong-hae|जहाजको मुटु रहेको इन्जिन रुममा जानुहोस्|En-jin-rum i-dong-hae|배의 맨 뒤쪽 지하 깊숙한 곳에 위치하여 아파트 5층 높이만 한 거대 엔진과 복잡한 굵은 쇠파이프 배관들이 정글처럼 미친 듯이 얽혀있는 선박의 심장부인 '기관실(엔진룸, Engine Room)'로 걸어 내려가서, 시끄럽고 기름 냄새 진동하는 험악한 그곳에서 중량물 설치와 배관 연결이라는 가장 핵심적이고 난이도 높은 작업을 속행하라는 위치 변경 지시입니다.|Instruksi mutasi terjun bebas ke neraka: jalan melangkah turun merayap ke ruang bawah tanah terekstrim di pantat buritan kapal, ke pusat jantung penggeraknya, yakni 'Kamar Mesin (Engine Room)'. Di mana ngendon nangkring mesin diesel raksasa setinggi bangunan rusun 5 lantai, dikepung dilingkari jeratan hutan belantara rimba liar pipa pipa besi raksasa urat nadi yang kusut masai semrawut gila-gilaan. Terjunlah ke sarang bising berisik pekak memekakkan telinga bau oli solar menyengat mencekik itu, dan genjot gaspol rakit pasang komponen tonase berat sama sambung pembuluh darah pipa, eksekusi tingkat kesulitan dewa kasta tertinggi di proyek.|Chỉ thị luân chuyển điều động xuống hang cọp địa ngục: cuốc bộ thả dốc lặn lội xuống tận hang cùng ngõ hẻm sâu thẳm dưới hầm ngầm tít đuôi tàu, tiến vào tâm nhĩ trái tim nhịp đập của tàu - 'Buồng Máy (Engine Room)'. Nơi tọa lạc cỗ động cơ diesel khổng lồ chọc trời ngang ngửa chung cư 5 tầng, bị bủa vây trói buộc bởi mê hồn trận rừng rậm hoang dã ống thép đại bác chằng chịt xoắn xuýt điên cuồng vĩ cuồng. Dấn thân vào chốn ầm ĩ đinh tai nhức óc nồng nặc mùi hắc ín sặc sụa dầu mỡ ấy, húc đầu gánh vác thi công thả ngàm thiết bị siêu trọng và móc nối thông ống mạch máu, cày cuốc hạng mục cốt lõi then chốt độ khó chát chúa vỡ đầu nhất công trường.|जहाजको सबैभन्दा पछाडि जमिनमुनि गहिरो ठाउँमा रहेको र अपार्टमेन्टको ५ तल्ला जति अग्लो विशाल इन्जिन र जटिल बाक्लो फलामका पाइपहरू जङ्गल जस्तै पागल जसरी बेरिएको जहाजको मुटु 'मेसिन रुम (इन्जिन रुम, Engine Room)' मा हिंडेर झरेर, धेरै आवाज आउने र तेलको गन्ध आउने त्यो डरलाग्दो ठाउँमा भारी वस्तु जडान गर्ने र पाइप जोड्ने सबैभन्दा मुख्य र उच्च कठिनाइको कामलाई निरन्तरता दिने स्थान परिवर्तनको निर्देशन हो।",

 phơi bày phốt lộ tình trạng tiến trình dở dang nhạy cảm cùng mớ điểm gở dị biệt trên bản vẽ hôm nay rồi mới được phép bàn giao lại ngai vàng thoái vị rút lui.|जहाज बुझाउने म्याद (डेलिभरी समय) ले च्यापेर २४ घण्टा बत्ती ननिभाई मेसिन चलाउनुपर्ने आपतकालीन रातभरिको काम हुँदा, दिउँसो पसिना बगाएर काम गरेको दिउँसोको टिमको कामदारले छुट्टी गर्नु ठीक अघि नयाँ आएका लाटोकोसेरो जस्ता रात्रिकालीन टिमका कामदारहरूलाई भेटेर, 'कुन पाइपसम्म बोल्ट कसें, कुन भल्भबाट पानी चुहिँदैछ होसियार हुनु' भन्ने जस्ता आज भएको संवेदनशील प्रगतिको अवस्था र नक्साको विशेष कुराहरू विस्तृत रूपमा मुखले बुझाएर कामको जिम्मा (हस्तान्तरण) दिने निर्देशन हो।",

      "선박커미셔닝부|전기|접프 잡아|선을 임시로 연결해서 신호를 강제로 주세요|Gunakan kabel jumper untuk menghubungkan jalur secara sementara dan memicu sinyal|Jeom-peu ja-ba|Dùng dây đấu tắt (jumper) để nối tạm thời và cấp tín hiệu cưỡng bức|Jeom-peu ja-ba|अस्थायी रूपमा जम्पर तार जोडेर जबर्जस्ती सिग्नल दिनुहोस्|Jeom-peu ja-ba|특정 기기의 로직 테스트를 위해 센서 신호를 우회(Bypass)하거나 강제 입력해야 할 때, 단자대 사이를 점퍼선(Jumper Wire)으로 임시 단락시켜 신호를 생성하라는 지시입니다.|Instruksi untuk menghubungkan sementara blok terminal menggunakan kabel jumper (jumper wire) guna melewati (bypass) sensor atau memberikan sinyal input paksa untuk keperluan pengujian logika mesin.|Chỉ thị nối tắt tạm thời giữa các cầu đấu bằng dây câu (jumper wire) để giả lập tín hiệu hoặc bỏ qua (bypass) cảm biến, phục vụ cho việc kiểm tra logic hoạt động của thiết bị cụ체.|कुनै उपकरणको लजिक टेस्ट गर्न सेन्सरको सिग्नल बाइपास (Bypass) गर्नुपर्दा वा जबर्जस्ती सिग्नल पठाउनु पर्दा, टर्मिनल ब्लकहरू बीच जम्पर तार (Jumper Wire) ले अस्थायी रूपमा जोडेर सिग्नल उत्पन्न गर्ने निर्देशन हो।",

      "선박커미셔닝부|알람/제어|알람 울리나 봐|화면에서 빨간색 알람이 뜨는지 주시하세요|Pantau apakah alarm peringatan berwarna merah muncul di layar|Al-ram ul-ri-na bwa|Hãy quan sát xem cảnh báo màu đỏ có hiện lên trên màn hình không|Al-ram ul-ri-na bwa|स्क्रिनमा रातो अलार्म देखा पर्छ कि ध्यान दिएर हेर्नुहोस्|Al-ram ul-ri-na bwa|시스템 제어 화면(HMI/AMS)을 모니터링하여, 테스트 중인 기기에 이상 조건이 입력되었을 때 규정된 적색 알람 메시지와 경보음이 정상적으로 팝업되는지 확인하라는 지시입니다.|Instruksi pemantauan: perhatikan layar kontrol sistem (HMI/AMS) untuk memverifikasi apakah pesan alarm merah dan peringatan suara muncul secara normal saat kondisi anomali dimasukkan pada peralatan yang sedang diuji.|Chỉ thị giám sát: theo dõi màn hình điều khiển hệ thống (HMI/AMS) để xác nhận xem thông báo báo động màu đỏ và âm thanh cảnh báo có kích hoạt đúng cách khi nhập điều kiện lỗi vào thiết bị đang thử nghiệm hay không.|प्रणाली नियन्त्रण स्क्रिन (HMI/AMS) निगरानी गरी, परीक्षण भइरहेको मेसिनमा खराबीको अवस्था इनपुट हुँदा तोकिएको रातो अलार्म सन्देश र साइरन सामान्य रूपमा पप-अप हुन्छ कि हुँदैन भनेर जाँच्ने निर्देशन हो。|",

      "선박커미셔닝부|알람/제어|AMS 봐|알람 모니터링 시스템 화면을 확인하세요|Periksa layar Sistem Pemantauan Alarm (Alarm Monitoring System / AMS)|E-i-em-e-seu bwa|Kiểm tra màn hình Hệ thống Giám sát Cảnh báo (Alarm Monitoring System / AMS)|E-i-em-e-seu bwa|अलार्म मोनिटरिङ प्रणाली (AMS) को स्क्रिन हेर्नुहोस्|E-i-em-e-seu bwa|선박 내 전반적인 기기 상태와 센서 값을 통합 감시하는 중앙 컴퓨터(Alarm Monitoring System) 화면을 확인하여, 시스템 파라미터 및 이상 유무를 점검하라는 지시입니다.|Instruksi untuk memeriksa layar komputer pusat (Alarm Monitoring System) yang mengawasi status seluruh peralatan kapal dan nilai sensor, guna memverifikasi parameter sistem dan mendeteksi anomali.|Chỉ thị xem màn hình máy tính trung tâm (Hệ thống Giám sát Cảnh báo - AMS), nơi theo dõi tích hợp tình trạng toàn bộ thiết bị và thông số cảm biến trên tàu, để kiểm tra các thông số và phát hiện lỗi.|जहाजभित्रका सम्पूर्ण उपकरणको अवस्था र सेन्सरको मानलाई एकीकृत रूपमा निगरानी गर्ने केन्द्रीय कम्प्युटर (Alarm Monitoring System) को स्क्रिन हेरेर प्रणालीको प्यारामिटर र खराबी छ कि छैन भनेर जाँच्ने निर्देशन हो।",

      "선박커미셔닝부|알람/제어|알람 내|강제로 센서를 건드려 알람을 발생시키세요|Picu alarm secara paksa dengan memanipulasi sensor|Al-ram nae|Kích hoạt báo động cưỡng bức bằng cách tác động vào cảm biến|Al-ram nae|सेन्सरलाई जबर्जस्ती चलाएर अलार्म उत्पन्न गराउनुहोस्|Al-ram nae|경보 시스템의 응답성과 로직을 테스트하기 위해, 현장에 설치된 센서(온도, 압력, 수위 등)의 신호 값을 임의로 변작하거나 물리적으로 조작하여 통제실에 강제로 알람을 띄우라는 지시입니다.|Instruksi pengujian: manipulasikan nilai sinyal sensor (suhu, tekanan, level) di lapangan secara fisik atau elektrik untuk memicu alarm paksa ke ruang kontrol, guna menguji respons dan logika sistem peringatan.|Chỉ thị thử nghiệm: can thiệp vật lý hoặc thay đổi tín hiệu của các cảm biến (nhiệt độ, áp suất, mức) tại hiện trường để ép hệ thống phát cảnh báo về phòng điều khiển, nhằm kiểm tra độ nhạy và logic của hệ thống báo động.|अलार्म प्रणालीको प्रतिक्रिया र लजिक टेस्ट गर्नको लागि, साइटमा जडान गरिएको सेन्सर (तापक्रम, प्रेसर, पानीको लेभल आदि) को सिग्नल मानलाई आफैं परिवर्तन गरेर वा भौतिक रूपमा चलाएर कन्ट्रोल रुममा जबर्जस्ती अलार्म पठाउने निर्देशन हो।",

      "선박커미셔닝부|알람/제어|알람 리셋|소리가 멈추도록 리셋 버튼을 누르세요|Tekan tombol reset untuk menghentikan suara alarm dan mengembalikan sistem|Al-ram ri-set|Nhấn nút reset để tắt âm thanh cảnh báo và khôi phục trạng thái|Al-ram ri-set|आवाज बन्द गर्न रिसेट (Reset) बटन थिच्नुहोस्|Al-ram ri-set|경보 발생 원인을 현장에서 확인하고 조치를 완료한 후, 제어반의 초기화(Reset) 버튼을 눌러 경보음(부저)을 소거하고 시스템 모니터링 화면을 정상 상태로 복귀시키라는 지시입니다.|Instruksi untuk menekan tombol 'Reset' pada panel kontrol setelah penyebab alarm diverifikasi dan diselesaikan, guna mematikan suara buzzer dan mengembalikan layar pemantauan sistem ke status normal.|Chỉ thị nhấn nút khởi tạo lại (Reset) trên bảng điều khiển sau khi đã xác định và khắc phục xong nguyên nhân báo động, để tắt còi báo và khôi phục màn hình giám sát hệ thống về trạng thái bình thường.|अलार्म बज्नुको कारण साइटमा जाँच गरी समाधान गरेपछि, कन्ट्रोल प्यानलको रिसेट (Reset) बटन थिचेर साइरन बन्द गर्ने र प्रणाली निगरानी स्क्रिनलाई सामान्य अवस्थामा फर्काउने निर्देशन हो।",

      "선박커미셔닝부|알람/제어|디지 알람 띄워|발전기 계통의 알람 신호를 띄우세요|Picu sinyal alarm pada sistem Diesel Generator (DG)|Di-ji al-ram tti-wo|Kích hoạt tín hiệu cảnh báo của hệ thống Máy phát điện Diesel (DG)|Di-ji al-ram tti-wo|डिजेल जेनेरेटर (DG) प्रणालीको अलार्म सिग्नल देखाउनुहोस्|Di-ji al-ram tti-wo|선박의 전력 공급을 담당하는 디젤 발전기(Diesel Generator) 시스템의 자동 보호 장치 연동 테스트를 위해, 윤활유 저압 또는 냉각수 고온 등의 발전기 관련 특정 알람을 모의로 발생시키라는 지시입니다.|Instruksi untuk mensimulasikan alarm spesifik pada Diesel Generator (seperti tekanan oli rendah atau suhu air pendingin tinggi) guna menguji fungsi interlock perlindungan otomatis pada sistem suplai daya kapal.|Chỉ thị giả lập các cảnh báo đặc thù của Máy phát điện Diesel (như áp suất dầu bôi trơn thấp, nhiệt độ nước làm mát cao) để kiểm tra tính năng bảo vệ liên động tự động của hệ thống cung cấp điện trên tàu.|जहाजको विद्युत आपूर्ति गर्ने डिजेल जेनेरेटर (Diesel Generator) प्रणालीको स्वचालित सुरक्षा उपकरण लिङ्केज टेस्ट गर्नको लागि, लुब्रिकेन्टको कम प्रेसर वा कुलिङ वाटरको उच्च तापक्रम जस्ता जेनेरेटरसँग सम्बन्धित विशेष अलार्म सिमुलेट (कृत्रिम रूपमा) उत्पन्न गराउने निर्देशन हो。",

      "선박커미셔닝부|알람/제어|알람 좀 잡아라|계속 울리는 알람 원인을 찾아서 해결하세요|Cari dan atasi penyebab alarm yang terus berbunyi|Al-ram jom ja-ba-ra|Tìm và khắc phục nguyên nhân khiến chuông báo động kêu liên tục|Al-ram jom ja-ba-ra|लगातार बजिरहेको अलार्मको कारण खोजेर समाधान गर्नुहोस्|Al-ram jom ja-ba-ra|통제실 컴퓨터에 반복적으로 팝업되는 오작동 경보의 실제 원인(센서 불량, 배선 단락, 파라미터 오류 등)을 현장에서 신속히 규명하고 물리적인 조치를 취해 경보를 근본적으로 소거하라는 업무 지시입니다.|Instruksi tugas untuk segera mengidentifikasi penyebab masalah (kerusakan sensor, kabel putus, kesalahan parameter) di lapangan dan mengambil tindakan fisik untuk menghentikan alarm yang terus-menerus muncul di komputer ruang kontrol.|Chỉ thị yêu cầu nhanh chóng điều tra nguyên nhân thực tế (lỗi cảm biến, đứt cáp, sai thông số) tại hiện trường và tiến hành khắc phục vật lý để loại bỏ triệt để cảnh báo lỗi liên tục nhảy lên trên máy tính phòng điều khiển.|कन्ट्रोल रुमको कम्प्युटरमा लगातार पप-अप भइरहेको गलत अलार्मको वास्तविक कारण (सेन्सरको खराबी, तार सर्ट भएको, प्यारामिटर गल्ती आदि) साइटमा छिटो पत्ता लगाई भौतिक मर्मत गरेर अलार्मलाई पूर्ण रूपमा बन्द गर्ने कामको निर्देशन हो।",

      "선박커미셔닝부|알람/제어|알람 얼마냐|설정된 알람 온도나 압력 값이 몇인지 보세요|Periksa berapa nilai batas suhu atau tekanan alarm yang diatur (set-point)|Al-ram eol-ma-nya|Kiểm tra xem giá trị ngưỡng nhiệt độ hoặc áp suất cài đặt báo động là bao nhiêu|Al-ram eol-ma-nya|सेट गरिएको अलार्मको तापक्रम वा प्रेसर मान कति छ हेर्नुहोस्|Al-ram eol-ma-nya|테스트 중인 센서가 경보를 발생시키는 논리 설정값(Set-point)이 도면에 명시된 온도, 압력, 수위 등의 허용 수치 기준과 정확히 일치하게 입력되어 있는지 제어 화면에서 확인하라는 질문입니다.|Pertanyaan verifikasi: periksa di layar kontrol apakah nilai ambang batas (set-point) logika yang memicu alarm pada sensor yang diuji telah dikonfigurasi sama persis dengan standar suhu, tekanan, atau level air di gambar teknis.|Câu hỏi xác minh: kiểm tra trên màn hình điều khiển xem giá trị cài đặt logic (set-point) kích hoạt báo động của cảm biến đang thử nghiệm có khớp chính xác với tiêu chuẩn nhiệt độ, áp suất, mức nước quy định trong bản vẽ không.|परीक्षण भइरहेको सेन्सरले अलार्म उत्पन्न गराउने लजिक सेटिङ मान (Set-point) नक्सामा तोकिएको तापक्रम, प्रेसर, पानीको लेभल आदिको अनुमति दिइएको मापदण्डसँग ठ्याक्कै मिल्ने गरी इनपुट गरिएको छ कि छैन भनेर कन्ट्रोल स्क्रिनमा जाँच्ने प्रश्न हो।",

      "선박커미셔닝부|알람/제어|IO 리스트 확인해|컴퓨터 신호 번호가 도면과 맞는지 보세요|Verifikasi daftar I/O (Input/Output) apakah nomor sinyal komputer sesuai dengan gambar|A-i-o ri-seu-teu hwa-gin-hae|Kiểm tra danh sách I/O xem số hiệu tín hiệu máy tính có khớp với bản vẽ không|A-i-o ri-seu-teu hwa-gin-hae|कम्प्युटर सिग्नल नम्बर नक्सासँग मिल्छ कि I/O सूची (IO List) जाँच्नुहोस्|A-i-o ri-seu-teu hwa-gin-hae|현장의 수많은 센서 장비부터 중앙 통제 컴퓨터까지 연결된 통신 신호 번호 목록(I/O List)을 시스템 데이터베이스와 대조하여, 물리적 배선과 소프트웨어 매핑이 일치하는지 전산으로 검증하라는 지시입니다.|Instruksi verifikasi sistem: bandingkan Daftar Input/Output (I/O List) kabel dari ribuan sensor di lapangan ke komputer pusat dengan database sistem, untuk memastikan bahwa pengkabelan fisik dan pemetaan perangkat lunak selaras tanpa kesalahan.|Chỉ thị xác minh hệ thống: đối chiếu Danh sách Tín hiệu (I/O List) nối từ hàng ngàn cảm biến hiện trường đến máy tính trung tâm với cơ sở dữ liệu hệ thống, nhằm đảm bảo hệ thống dây dẫn vật lý và lập bản đồ phần mềm ăn khớp tuyệt đối.|साइटका हजारौं सेन्सर उपकरणदेखि केन्द्रीय कन्ट्रोल कम्प्युटरसम्म जोडिएको सञ्चार सिग्नल नम्बर सूची (I/O List) लाई प्रणालीको डाटाबेससँग दाँजेर, भौतिक तार जडान र सफ्टवेयर म्यापिङ मिल्छ कि मिल्दैन भनेर कम्प्युटरबाट प्रमाणित गर्ने निर्देशन हो।",

      "선박커미셔닝부|시운전|점검하러 가|장비 가동 전에 현장 상태를 보러 갑시다|Pergi inspeksi ke lapangan sebelum menghidupkan peralatan|Jeom-geom-ha-reo ga|Đi kiểm tra tình trạng hiện trường trước khi khởi động thiết bị|Jeom-geom-ha-reo ga|उपकरण चलाउनु अघि साइटको अवस्था जाँच्न जाऔं|Jeom-geom-ha-reo ga|본격적인 기기 가동(시운전) 버튼을 누르기 전, 밸브의 개폐 상태 파악, 누유 여부 확인, 작업자 간섭 요소 제거 등 현장의 물리적인 안전 상태를 직접 육안으로 최종 점검하러 이동하자는 지시입니다.|Instruksi pra-operasi: mari bergerak ke lapangan untuk melakukan inspeksi visual akhir terhadap kondisi keselamatan fisik—seperti status buka/tutup katup, kebocoran oli, dan menyingkirkan pekerja di sekitar—sebelum menekan tombol mulai uji coba.|Chỉ thị tiền vận hành: hãy di chuyển xuống hiện trường để tự mắt kiểm tra lần cuối các điều kiện an toàn vật lý—như trạng thái đóng/mở van, rò rỉ dầu mỡ, và giải tán nhân sự vướng víu—trước khi chính thức bấm nút chạy thử thiết bị.|मुख्य रूपमा मेसिन चलाउनु (परीक्षण उडान) अघि भल्भ खुलेको/बन्द भएको अवस्था, तेल चुहिएको छ कि छैन, र कामदारहरूलाई बाधा पुग्ने कुराहरू हटाउने जस्ता साइटको भौतिक सुरक्षा अवस्था आफ्नै आँखाले अन्तिम जाँच गर्न जाने निर्देशन हो।",

      "선박커미셔닝부|시운전|비상 발전기 돌려|메인 전원이 없을 때를 대비해 가동해 보세요|Jalankan generator darurat (Emergency Generator) untuk simulasi tanpa daya utama|Bi-sang bal-jeon-gi dol-ryeo|Khởi động máy phát điện khẩn cấp để dự phòng tình huống mất nguồn chính|Bi-sang bal-jeon-gi dol-ryeo|मुख्य पावर नभएको अवस्थाको तयारीको लागि इमर्जेन्सी जेनेरेटर चलाउनुहोस्|Bi-sang bal-jeon-gi dol-ryeo|메인 전력 공급이 상실되는 블랙아웃(Black-out) 비상 상황을 가정하여, 선박의 독립된 구역에 설치된 비상 발전기(Emergency Generator)가 정상적으로 기동하고 필수 전력을 안정적으로 공급하는지 테스트하라는 지시입니다.|Instruksi pengujian kritis: simulasikan situasi Black-out (kehilangan daya utama) dan uji apakah Generator Darurat yang berada di zona terpisah dapat menyala otomatis serta menyuplai daya esensial dengan stabil ke sistem kapal.|Chỉ thị thử nghiệm quan trọng: giả lập tình huống Black-out (mất điện chính), yêu cầu chạy thử Máy phát điện Khẩn cấp được đặt ở khu vực độc lập xem nó có tự động khởi động và cấp nguồn điện thiết yếu một cách ổn định hay không.|मुख्य बिजुली आपूर्ति बन्द हुने ब्ल्याकआउट (Black-out) आपतकालीन अवस्थाको कल्पना गरेर, जहाजको स्वतन्त्र क्षेत्रमा जडान गरिएको आपतकालीन जेनेरेटर (Emergency Generator) सामान्य रूपमा सुरु भई आवश्यक बिजुली स्थिर रूपमा पठाउँछ कि पठाउँदैन भनेर टेस्ट गर्ने निर्देशन हो।",

      "선박커미셔닝부|시운전|펌프 가동해봐|냉각수나 연료 펌프를 로컬에서 켜 보세요|Coba nyalakan pompa pendingin atau bahan bakar dari panel lokal|Peom-peu ga-dong-hae-bwa|Hãy thử khởi động máy bơm nước làm mát hoặc nhiên liệu từ bảng điều khiển tại chỗ|Peom-peu ga-dong-hae-bwa|कुलिङ वाटर वा इन्धनको पम्पलाई लोकल प्यानलबाट चलाएर हेर्नुहोस्|Peom-peu ga-dong-hae-bwa|선내 냉각수, 연료, 소화수 등을 이송하는 메인 펌프 설비의 기계적 회전 상태와 진동을 확인하기 위해, ECR(통제실) 원격 제어가 아닌 장비 바로 앞의 현장 제어반(Local Panel)에서 수동으로 기동시켜 보라는 지시입니다.|Instruksi untuk menghidupkan pompa utama (air pendingin, bahan bakar, atau pemadam) secara manual langsung dari panel lokal (Local Panel) di depan mesin, bukan dari ruang kontrol ECR, untuk memeriksa rotasi mekanik dan getaran pompa secara langsung.|Chỉ thị khởi động thủ công hệ thống bơm chính (nước làm mát, nhiên liệu, nước cứu hỏa) trực tiếp từ Bảng điều khiển tại chỗ (Local Panel) ngay trước thiết bị, thay vì điều khiển từ xa qua ECR, nhằm kiểm tra trực tiếp trạng thái quay và độ rung cơ học.|जहाजभित्रको कुलिङ वाटर, इन्धन, आगो निभाउने पानी आदि पठाउने मुख्य पम्प उपकरणको मेकानिकल घुमाई अवस्था र कम्पन जाँच्नको लागि, ECR (कन्ट्रोल रुम) को रिमोट कन्ट्रोलबाट नभई उपकरणको ठीक अगाडि रहेको लोकल प्यानल (Local Panel) बाट हातैले (म्यानुअल रूपमा) चलाएर हेर्ने निर्देशन हो।",

      "선박커미셔닝부|시운전|모터 방향 점검해|팬이나 펌프가 거꾸로 돌지 않는지 보세요|Periksa arah putaran motor, pastikan kipas atau pompa tidak berputar terbalik|Mo-teo bang-hyang jeom-geom-hae|Kiểm tra chiều quay của mô tơ, đảm bảo quạt hoặc máy bơm không quay ngược|Mo-teo bang-hyang jeom-geom-hae|मोटरको घुम्ने दिशा जाँच्नुहोस्, पङ्खा वा पम्प उल्टो घुमेको छ कि छैन हेर्नुहोस्|Mo-teo bang-hyang jeom-geom-hae|펌프나 대형 환기 팬 등 삼상 모터 기반의 회전 기기를 최초로 가동할 때, 전원 케이블의 상(Phase) 결선 오류로 인해 모터가 역방향으로 회전하여 내부 임펠러가 파손되는 것을 방지하고자 회전 방향을 순간적으로 짧게 점검하라는 지시입니다.|Instruksi keamanan awal: saat pertama kali menyalakan motor tiga fase seperti pompa atau kipas, hidupkan sejenak (jogging) untuk mengecek arah putaran. Ini untuk mencegah kerusakan impeller internal akibat putaran terbalik yang disebabkan salah urutan fase kabel daya.|Chỉ thị an toàn bước đầu: khi khởi động lần đầu các thiết bị quay dùng mô tơ 3 pha như máy bơm hay quạt thông gió, hãy bật nhấp (jogging) để kiểm tra chiều quay. Việc này ngăn ngừa gãy vỡ cánh quạt bên trong do mô tơ quay ngược bởi đấu sai pha cáp nguồn.|पम्प वा ठूलो पङ्खा जस्ता ३-फेज मोटरमा आधारित घुम्ने उपकरण पहिलो पटक चलाउँदा, पावर केबलको फेज (Phase) जडान गल्तीले गर्दा मोटर उल्टो दिशामा घुमेर भित्रको इम्पेलर फुट्ने समस्या रोक्न घुम्ने दिशालाई एकैछिन चलाएर (जगिङ गरेर) जाँच्ने निर्देशन हो。|",

      "선박커미셔닝부|시운전|스타트 푸쉬|제어판의 시작 버튼을 누르세요|Tekan tombol start pada panel kontrol|Seu-ta-teu pu-swi|Nhấn nút khởi động (start) trên bảng điều khiển|Seu-ta-teu pu-swi|कन्ट्रोल प्यानलको स्टार्ट (Start) बटन थिच्नुहोस्|Seu-ta-teu pu-swi|모든 사전 안전 점검 및 밸브 라인업 세팅이 완료되었음을 확인한 후, 장비 제어 콘솔에 위치한 기동(Start) 버튼을 눌러 기계 설비나 펌프 시스템의 운전을 공식적으로 개시하라는 명확한 조작 지시입니다.|Instruksi operasi eksplisit: setelah memverifikasi bahwa semua pemeriksaan keamanan awal dan pengaturan posisi katup (line-up) telah selesai, tekan tombol 'Start' di konsol kontrol untuk secara resmi memulai pengoperasian sistem mesin atau pompa.|Chỉ thị vận hành rõ ràng: sau khi xác nhận toàn bộ khâu kiểm tra an toàn sơ bộ và thiết lập sơ đồ van (line-up) đã hoàn tất, hãy nhấn nút 'Start' trên bảng điều khiển để chính thức khởi động hệ thống máy móc hoặc máy bơm.|सबै पूर्व सुरक्षा जाँच र भल्भ लाइन-अप सेटिङ पूरा भएको पक्का गरेपछि, उपकरण नियन्त्रণ कन्सोलमा रहेको स्टार्ट (Start) बटन थिचेर मेसिनरी उपकरण वा पम्प प्रणालीको सञ्चालन आधिकारिक रूपमा सुरु गर्ने स्पष्ट अपरेशन निर्देशन हो।",

      "선박커미셔닝부|시운전|스탑 푸쉬|작업 완료 후 정지 버튼을 누르세요|Tekan tombol stop setelah pengujian selesai|Seu-tap pu-swi|Nhấn nút dừng (stop) sau khi hoàn tất công việc|Seu-tap pu-swi|काम सकिएपछि स्टप (Stop) बटन थिच्नुहोस्|Seu-tap pu-swi|기계 장비의 성능 테스트 및 시운전 절차가 정상적으로 완료되었거나, 계획된 정지 시점이 도래했을 때 제어 콘솔에 위치한 정지(Stop) 버튼을 눌러 설비의 가동을 안전하게 종료하라는 조작 지시입니다.|Instruksi operasi standar: tekan tombol 'Stop' pada panel kontrol untuk menghentikan mesin dengan aman setelah prosedur uji coba performa selesai dengan sukses, atau ketika jadwal penghentian normal telah tiba.|Chỉ thị vận hành tiêu chuẩn: nhấn nút 'Stop' trên bảng điều khiển để kết thúc an toàn quá trình chạy máy sau khi quy trình chạy thử hiệu suất đã hoàn tất thành công, hoặc khi đến thời điểm dừng máy theo kế hoạch.|मेसिन उपकरणको कार्यक्षमता परीक्षण र परीक्षण उडान प्रक्रिया सामान्य रूपमा पूरा भएपछि, वा योजना गरिएको बन्द गर्ने समय आएपछि कन्ट्रोल कन्सोलमा रहेको स्टप (Stop) बटन थिचेर उपकरणको सञ्चालन सुरक्षित रूपमा बन्द गर्ने अपरेशन निर्देशन हो।",

      "선박커미셔닝부|시운전|이머전시 스탑 푸쉬|위험하면 즉시 비상 정지 버튼을 누르세요|Tekan tombol berhenti darurat (E-Stop) segera jika ada bahaya|I-meo-jeon-si seu-tap pu-swi|Nhấn ngay nút dừng khẩn cấp (E-Stop) nếu thấy nguy hiểm|I-meo-jeon-si seu-tap pu-swi|खतरा भएमा तुरुन्तै आपतकालीन स्टप (E-Stop) बटन थिच्नुहोस्|I-meo-jeon-si seu-tap pu-swi|시운전 도중 모터의 이상 진동, 심각한 누유, 타는 냄새 등 시스템 파손이나 인명 사고를 유발할 수 있는 긴급 상황 감지 시, 지체 없이 제어반의 비상 정지(Emergency Stop) 스위치를 물리적으로 타격하여 설비 전원을 즉각 차단하라는 위기 대응 수칙입니다.|Prosedur tanggap darurat tertinggi: jika mendeteksi anomali kritis seperti getaran parah, kebocoran besar, atau bau hangus selama uji coba yang mengancam nyawa atau sistem, segera pukul tombol Emergency Stop di panel kontrol tanpa ragu untuk memutus daya seketika.|Quy tắc ứng phó khẩn cấp tối cao: trong lúc chạy thử, nếu phát hiện bất thường nghiêm trọng như rung lắc mạnh, rò rỉ lớn, hoặc có mùi khét đe dọa đến tính mạng hoặc phá hủy hệ thống, phải đập ngay nút Dừng khẩn cấp (Emergency Stop) trên bảng điều khiển để ngắt điện ngay lập tức.|परीक्षण उडानको क्रममा मोटरको असामान्य कम्पन, गम्भीर तेल चुहावट, डढेको गन्ध जस्ता प्रणालीको क्षति वा ज्यानको जोखिम निम्त्याउन सक्ने आपतकालीन अवस्था देखिएमा, ढिला नगरी कन्ट्रोल प्यानलको आपतकालीन स्टप (Emergency Stop) स्विचलाई भौतिक रूपमा हानेर उपकरणको पावर तुरुन्तै बन्द गर्ने सङ्कट व्यवस्थापन नियम हो।",

      "선박커미셔닝부|시운전|이머전시 스탑 리셋|상황 해제 후 비상 버튼을 원위치 시키세요|Reset tombol E-Stop ke posisi semula setelah situasi darurat teratasi|I-meo-jeon-si seu-tap ri-set|Khôi phục (reset) nút dừng khẩn cấp về vị trí ban đầu sau khi giải quyết xong sự cố|I-meo-jeon-si seu-tap ri-set|आपतकालीन अवस्था समाधान भएपछि E-Stop बटनलाई पहिलेकै अवस्थामा (रिसेट) फर्काउनुहोस्|I-meo-jeon-si seu-tap ri-set|비상 정지 상황을 유발한 원인이 현장에서 완벽하게 해소되고 안전이 확보된 후, 시스템을 정상적으로 재가동하기 위해 기계적으로 잠겨있는 비상 정지 스위치를 회전시키거나 당겨서 잠금 상태를 초기화(Reset)하라는 지시입니다.|Instruksi pemulihan sistem: setelah penyebab darurat terselesaikan sepenuhnya dan keamanan dipastikan, reset kunci mekanis tombol Emergency Stop (dengan memutar atau menariknya) agar sistem kendali dapat dihidupkan ulang untuk operasi normal.|Chỉ thị khôi phục hệ thống: sau khi đã khắc phục hoàn toàn nguyên nhân sự cố và đảm bảo an toàn, hãy vặn hoặc kéo nút Dừng khẩn cấp đang bị khóa cơ học để khởi tạo lại (Reset) trạng thái, cho phép hệ thống khởi động lại bình thường.|आपतकालीन रोक्ने अवस्था निम्त्याएको कारण साइटमा पूर्ण रूपमा समाधान भई सुरक्षा सुनिश्चित भएपछि, प्रणालीलाई सामान्य रूपमा फेरि सुरु गर्न मेकानिकल रूपमा लक भएको आपतकालीन स्टप स्विचलाई घुमाएर वा तानेर लक अवस्थालाई रिसेट (Reset) गर्ने निर्देशन हो।",

      "선박커미셔닝부|시운전|조타 장치 확인해|브릿지에서 키를 돌려타가 잘 움직이는지 보세요|Periksa sistem kemudi (steering gear), lihat apakah kemudi merespon dengan baik dari anjungan|Jo-ta jang-chi hwa-gin-hae|Kiểm tra hệ thống lái (steering gear), xem bánh lái có phản hồi tốt khi xoay vô lăng từ đài chỉ huy không|Jo-ta jang-chi hwa-gin-hae|स्टेरिङ प्रणाली जाँच्नुहोस्, ब्रिजबाट स्टेरिङ घुमाउँदा राम्रोसँग चल्छ कि हेर्नुहोस्|Jo-ta jang-chi hwa-gin-hae|선박의 조향을 담당하는 스티어링 기어(Steering Gear) 시스템 시운전 시, 조종실(브릿지)에서 타륜(Wheel)을 조작했을 때 선미의 방향타(Rudder)가 지정된 각도와 유압 응답 속도에 맞춰 기계적으로 정확히 연동하여 움직이는지 점검하라는 지시입니다.|Instruksi uji coba alat navigasi: saat menguji Sistem Kemudi (Steering Gear), periksa apakah daun kemudi (Rudder) di buritan bergerak presisi sesuai sudut dan kecepatan respons hidrolik yang diinstruksikan oleh putaran roda kemudi (Wheel) dari ruang anjungan (Bridge).|Chỉ thị chạy thử thiết bị hàng hải: khi kiểm tra Hệ thống Lái (Steering Gear), phải xác nhận xem bánh lái (Rudder) ở đuôi tàu có di chuyển chính xác theo góc độ và tốc độ phản hồi thủy lực khi xoay vô lăng (Wheel) từ đài chỉ huy (Bridge) hay không.|जहाजको दिशा नियन्त्रण गर्ने स्टेरिङ गियर (Steering Gear) प्रणालीको परीक्षण उडान गर्दा, कन्ट्रोल रुम (ब्रिज) बाट ह्वील घुमाउँदा पछाडिको रडर (दिशा परिवर्तन गर्ने पाता) तोकिएको कोण र हाइड्रोलिक प्रतिक्रिया गति अनुसार मेकानिकल रूपमा सही तरिकाले सँगै चल्छ कि चल्दैन भनेर जाँच्ने निर्देशन हो।",

      "선박커미셔닝부|시운전|인터락 유지해|안전을 위해 자동 잠금 상태를 유지하세요|Pertahankan status interlock (penguncian otomatis) demi keselamatan|In-teo-rak yu-ji-hae|Duy trì trạng thái khóa liên động (interlock) tự động để đảm bảo an toàn|In-teo-rak yu-ji-hae|सुरक्षाको लागि स्वचालित लक (इन्टरलक) अवस्था कायम राख्नुहोस्|In-teo-rak yu-ji-hae|장비의 오작동 및 파손을 방지하기 위해 프로그램된 자동 보호 논리 회로(예: 밸브가 열리지 않으면 펌프가 기동되지 않음)인 인터락(Interlock) 기능을 시운전 편의를 위해 임의로 해제(Bypass)하지 말고 정상 활성화 상태로 유지하라는 안전 지시입니다.|Aturan keamanan sistem: dilarang keras mem-bypass sirkuit perlindungan logika otomatis (Interlock)—seperti pompa tidak akan menyala jika katup tertutup—hanya demi kemudahan uji coba. Fungsi ini harus tetap aktif untuk mencegah kerusakan mesin akibat malapraktik.|Quy định an toàn hệ thống: nghiêm cấm tự ý vô hiệu hóa (bypass) mạch bảo vệ logic tự động (Interlock)—ví dụ máy bơm không chạy nếu van chưa mở—chỉ vì mục đích tiện lợi khi chạy thử. Phải duy trì kích hoạt tính năng này để ngăn ngừa hỏng hóc thiết bị.|उपकरणको गलत सञ्चालन र क्षति रोक्न प्रोग्राम गरिएको स्वचालित सुरक्षा लजिक सर्किट (जस्तै: भल्भ नखुलेसम्म पम्प स्टार्ट नहुने) लाई इन्टरलक (Interlock) भनिन्छ। परीक्षण उडानको सहजताको लागि यसलाई आफैं बाइपास नगरी सामान्य सक्रिय अवस्थामा राख्ने सुरक्षा निर्देशन हो。",

      "선박커미셔닝부|테스트|템프 체크해|센서가 인식하는 온도가 맞는지 재보세요|Periksa keakuratan suhu yang dideteksi oleh sensor (Temp)|Tem-peu che-keu-hae|Kiểm tra xem nhiệt độ do cảm biến (Temp) nhận diện có chính xác không|Tem-peu che-keu-hae|सेन्सरले नापेको तापक्रम (Temp) सही छ कि छैन जाँच्नुहोस्|Tem-peu che-keu-hae|장비 및 배관에 설치된 온도 센서(PT100, 열전대 등)가 유체의 실제 온도를 정확하게 측정하여 제어 모니터링 화면에 오차 없이 데이터를 전송하고 있는지 휴대용 교정 온도계 등을 활용해 비교 검증하라는 지시입니다.|Instruksi kalibrasi instrumen: gunakan termometer kalibrasi portabel untuk membandingkan dan memverifikasi apakah sensor suhu (PT100, termokopel) pada pipa membaca suhu aktual fluida secara presisi dan mengirimkan data tanpa galat ke layar pemantauan.|Chỉ thị hiệu chuẩn thiết bị: sử dụng nhiệt kế hiệu chuẩn cầm tay để đối chiếu và xác minh xem các cảm biến nhiệt độ (PT100, cặp nhiệt điện) trên đường ống có đo chính xác nhiệt độ thực tế của chất lỏng và truyền dữ liệu chuẩn xác lên màn hình giám sát hay không.|उपकरण र पाइपमा जडान गरिएको तापक्रम सेन्सर (PT100, थर्मोकपल आदि) ले तरल पदार्थको वास्तविक तापक्रम सही तरिकाले नापेर कन्ट्रोल मोनिटरिङ स्क्रिनमा त्रुटि विना डाटा पठाएको छ कि छैन भनेर पोर्टेबल क्यालिब्रेसन थर्मोमिटर प्रयोग गरी तुलना गरेर प्रमाणित गर्ने निर्देशन हो।",

      "선박커미셔닝부|테스트|템프 걸어|테스트 장비로 온도 값을 센서에 입력하세요|Input nilai suhu secara manual ke sensor menggunakan alat uji|Tem-peu geo-reo|Sử dụng thiết bị thử nghiệm để nhập giả lập giá trị nhiệt độ vào cảm biến|Tem-peu geo-reo|परीक्षण उपकरण प्रयोग गरी सेन्सरमा तापक्रम मान इनपुट गर्नुहोस्|Tem-peu geo-reo|경보 시스템 및 로직 동작을 검증하기 위해, 실제 유체를 가열하지 않고 온도 캘리브레이터(교정기) 등의 테스트 장비를 사용하여 센서 회로에 임의의 고온 신호(저항값 또는 전압값)를 강제로 인가(시뮬레이션)하라는 지시입니다.|Instruksi simulasi sinyal: untuk memverifikasi logika dan sistem alarm tanpa memanaskan cairan aktual, gunakan alat kalibrator suhu untuk menyuntikkan sinyal suhu tinggi buatan (nilai hambatan/tegangan) secara paksa ke sirkuit sensor.|Chỉ thị giả lập tín hiệu: nhằm kiểm tra hệ thống cảnh báo và logic điều khiển mà không cần đun nóng chất lỏng thực tế, hãy dùng máy hiệu chuẩn nhiệt độ để nhập cưỡng bức tín hiệu nhiệt độ cao giả lập (giá trị điện trở/điện áp) vào mạch cảm biến.|अलार्म प्रणाली र लजिकको काम प्रमाणित गर्न, वास्तविक तरल पदार्थ नतताई तापक्रम क्यालिब्रेटर जस्ता परीक्षण उपकरण प्रयोग गरेर सेन्सर सर्किटमा उच्च तापक्रमको सिग्नल (प्रतिरोध मान वा भोल्टेज मान) जबर्जस्ती इनपुट (सिमुलेसन) गर्ने निर्देशन हो।",

      "선박커미셔닝부|테스트|프레셔 걸어|배관에 강한 압력을 넣어 밸브를 테스트하세요|Terapkan tekanan kuat (pressure) pada pipa untuk menguji katup|Peu-re-syeo geo-reo|Bơm áp suất mạnh vào đường ống để thử nghiệm van|Peu-re-syeo geo-reo|पाइपमा कडा प्रेसर दिएर भल्भको परीक्षण गर्नुहोस्|Peu-re-syeo geo-reo|배관 라인 및 밸브 시스템의 내압성과 누출 여부, 압력 스위치(Pressure Switch)의 설정값 정상 작동 여부를 검증하기 위해, 수동 핸드 펌프나 공압 장비를 연결하여 시스템 내부의 물리적인 압력을 규정치까지 점진적으로 상승시키라는 지시입니다.|Instruksi uji tekan mekanik: hubungkan pompa tangan manual atau kompresor untuk meningkatkan tekanan fisik secara bertahap di dalam sistem pipa hingga batas regulasi. Ini bertujuan memverifikasi ketahanan tekanan katup, kebocoran, dan fungsi Pressure Switch sesuai set-point.|Chỉ thị thử nghiệm áp suất vật lý: kết nối bơm tay hoặc máy nén khí để tăng dần áp suất bên trong hệ thống đường ống lên mức quy định. Quá trình này nhằm kiểm chứng khả năng chịu áp của van, độ rò rỉ, và độ nhạy của Công tắc áp suất (Pressure Switch) theo cài đặt.|पाइप लाइन र भल्भ प्रणालीको प्रेसर थाम्ने क्षमता, चुहावट, र प्रेसर स्विच (Pressure Switch) को सेटिङ मान सही रूपमा काम गर्छ कि गर्दैन भनेर प्रमाणित गर्न, म्यानुअल ह्यान्ड पम्प वा हावाको उपकरण जोडेर प्रणालीभित्रको भौतिक प्रेसरलाई तोकिएको मानसम्म बिस्तारै बढाउने निर्देशन हो।",

      "선박커미셔닝부|테스트|레벨 땡겨|연료 탱크의 수위 센서를 강제로 위로 당기세요|Tarik paksa sensor level tangki bahan bakar ke atas untuk simulasi|Re-bel ttaeng-gyeo|Kéo tay cảm biến báo mức của bồn nhiên liệu lên để thử nghiệm|Re-bel ttaeng-gyeo|इन्धन ट्याङ्कीको लेभल सेन्सरलाई जबर्जस्ती माथितिर तान्नुहोस्|Re-bel ttaeng-gyeo|탱크의 수위 상승 시 작동하는 알람 및 펌프 자동 정지(Interlock) 로직을 검증하기 위해, 탱크에 실제 액체를 채우는 대신 작업자가 플로트(Float) 타입 등의 레벨 센서를 손이나 도구를 이용해 수동으로 만수위(High Level) 위치까지 들어 올리라는 모의시험 지시입니다.|Instruksi simulasi level: untuk memverifikasi fungsi alarm dan interlock pemberhentian otomatis pompa saat tangki penuh, pekerja tidak perlu mengisi cairan sungguhan. Angkat secara manual pelampung (float) sensor level ke posisi batas atas (High Level) menggunakan tangan atau alat pelengkap.|Chỉ thị thử nghiệm giả lập mức: để kiểm tra báo động và logic tự động ngắt bơm (Interlock) khi bồn chứa đầy, thay vì bơm chất lỏng thực tế, thợ phải dùng tay hoặc dụng cụ kéo phao (float) của cảm biến báo mức lên vị trí mức cao (High Level).|ट्याङ्कीमा पानीको सतह बढ्दा काम गर्ने अलार्म र पम्प आफैं बन्द हुने (Interlock) लजिक प्रमाणित गर्न, ट्याङ्कीमा वास्तविक तरल पदार्थ नभरी कामदारले फ्लोट (Float) प्रकारको लेभल सेन्सरलाई हात वा औजारले म्यानुअल रूपमा पानी भरिएको (High Level) स्थानसम्म माथि उठाउने सिमुलेसन परीक्षणको निर्देशन हो।",

      "선박커미셔닝부|테스트|센서 수치 읽어|현장 계기에 표시된 숫자를 크게 읽어주세요|Bacakan angka yang tertera pada instrumen ukur di lapangan|Sen-seo su-chi il-geo|Hãy đọc to các con số hiển thị trên đồng hồ đo tại hiện trường|Sen-seo su-chi il-geo|साइटको मिटरमा देखिएको सेन्서को अंक पढेर सुनाउनुहोस्|Sen-seo su-chi il-geo|통제실(ECR) 화면의 디지털 계측값과 현장 설비에 부착된 아날로그 계기판(로컬 게이지)의 물리적 지시값이 오차 없이 동일한지 실시간으로 비교(Calibration Check)하기 위해, 현장 작업자가 계기판의 눈금 숫자를 무전기로 명확하게 보고하라는 통신 지시입니다.|Instruksi validasi kalibrasi: operator lapangan harus membacakan angka jarum pada alat ukur analog (local gauge) secara jelas via radio. Tujuannya agar staf di ruang kontrol (ECR) dapat membandingkan kecocokannya secara real-time dengan nilai digital di layar monitor.|Chỉ thị đối chiếu hiệu chuẩn: nhân viên hiện trường phải đọc to rõ ràng các con số trên mặt đồng hồ cơ (local gauge) qua bộ đàm. Việc này giúp nhân sự trong phòng điều khiển (ECR) so sánh xem có trùng khớp với giá trị kỹ thuật số trên màn hình máy tính theo thời gian thực hay không.|कन्ट्रोल रुम (ECR) को स्क्रिनको डिजिटल नाप र साइटको उपकरणमा जडान गरिएको एनालग मिटर (लोकल गेज) को भौतिक सुईको मान त्रुटि विना समान छ कि छैन भनेर रियल टाइममा तुलना (Calibration Check) गर्न, साइटको कामदारले मिटरको स्केलको नम्बर वाकी-टाकीमार्फत स्पष्ट रूपमा रिपोर्ट गर्ने सञ्चार निर्देशन हो।",

      "선박커미셔닝부|테스트|리크 있나 확인해|연결 부위에서 물이나 기름이 새는지 보세요|Periksa apakah ada kebocoran (leak) air atau oli pada sambungan|Ri-keu it-na hwa-gin-hae|Kiểm tra xem có rò rỉ (leak) nước hoặc dầu tại các khớp nối không|Ri-keu it-na hwa-gin-hae|जडान गरिएको भागबाट पानी वा तेल चुहिएको (Leak) छ कि छैन जाँच्नुहोस्|Ri-keu it-na hwa-gin-hae|펌프 기동 및 시스템 가압 상태에서 배관 플랜지, 밸브 개스킷, 유압 피팅 등 모든 기계적 체결 부위에서 내부의 유체(기름, 물, 가스)가 미세하게 방울져 떨어지거나 스며나오는 누출(Leak) 현상이 없는지 손전등을 비추어 육안으로 철저히 검사하라는 지시입니다.|Instruksi inspeksi visual ketat: saat pompa menyala dan sistem bertekanan tinggi, nyalakan senter dan periksa seluruh sambungan mekanis seperti flensa pipa, gasket katup, dan fitting hidrolik. Pastikan tidak ada rembesan atau tetesan (leak) sekecil apa pun dari fluida internal (oli, air, gas).|Chỉ thị kiểm tra rà soát nghiêm ngặt: trong lúc máy bơm hoạt động và hệ thống đang chịu áp suất, hãy dùng đèn pin soi kỹ các khớp nối cơ học như mặt bích ống, gioăng van, đầu nối thủy lực. Phải đảm bảo tuyệt đối không có hiện tượng rỉ giọt hay thấm ướt (leak) của chất lỏng bên trong (dầu, nước, khí) ra ngoài.|पम्प चलेको र प्रणालीमा प्रेसर भएको अवस्थामा पाइप फ्ल्यान्ज, भल्भ ग्यास्केट, हाइड्रोलिक फिटिङ जस्ता सबै मेकानिकल जडान गरिएका भागहरूबाट भित्रको तरल पदार्थ (तेल, पानी, ग्यास) सूक्ष्म रूपमा थोपा खस्ने वा रसाउने चुहावट (Leak) भएको छ कि छैन भनेर टर्चलाइट बालेर आँखाले कडा रूपमा जाँच्ने निर्देशन हो।",

      "선박커미셔닝부|테스트|진동 측정해|엔진이 돌 때 몸체의 떨림이 심한지 재세요|Ukur tingkat getaran bodi saat mesin beroperasi|Jin-dong cheuk-jeong-hae|Đo mức độ rung lắc của thân máy khi động cơ hoạt động|Jin-dong cheuk-jeong-hae|इन्जिन घुम्दा मेसिनको कम्पन धेरै छ कि नाप्नुहोस्|Jin-dong cheuk-jeong-hae|메인 엔진이나 대형 회전 기기(펌프, 송풍기 등) 가동 시, 축 정렬(Shaft Alignment) 불량이나 베어링 손상으로 인해 장비 본체에서 허용 기준치를 초과하는 비정상적인 기계적 진동이 발생하는지 전용 진동 계측기(Vibration Meter)를 사용하여 정밀하게 측정하라는 지시입니다.|Instruksi pengukuran presisi: gunakan alat ukur getaran (vibration meter) saat mesin utama atau pompa besar berputar. Pastikan getaran mekanis pada bodi alat tidak melebihi batas toleransi standar, yang bisa mengindikasikan masalah keselarasan poros (shaft alignment) atau kerusakan bantalan (bearing).|Chỉ thị đo lường chính xác: dùng máy đo độ rung (vibration meter) chuyên dụng khi động cơ chính hoặc thiết bị quay lớn hoạt động. Mục đích để kiểm tra xem độ rung cơ học của thân máy có vượt tiêu chuẩn cho phép không, qua đó phát hiện sớm lỗi lệch trục (shaft alignment) hoặc hỏng vòng bi.|मुख्य इन्जिन वा ठूलो घुम्ने उपकरण (पम्प, ब्लोअर आदि) चलाउँदा, शाफ्ट अलाइनमेन्ट (Shaft Alignment) को खराबी वा बेरिङको क्षतिको कारणले उपकरणको मुख्य बडीमा अनुमति दिइएको मापदण्डभन्दा बढी असामान्य मेकानिकल कम्पन उत्पन्न भएको छ कि छैन भनेर विशेष कम्पन नाप्ने यन्त्र (Vibration Meter) प्रयोग गरी सूक्ष्म रूपमा नाप्ने निर्देशन हो।",

      "선박커미셔닝부|테스트|블랙아웃 테스트해|배 전체 전기를 끄고 비상이 켜지는지 보세요|Lakukan uji coba pemadaman total (blackout) untuk menguji sistem darurat|Beul-raek-a-ut te-seu-teu-hae|Thử nghiệm cắt điện toàn bộ (blackout) để kiểm tra hệ thống khẩn cấp|Beul-raek-a-ut te-seu-teu-hae|जहाजको पूर्ण विद्युत कटौती (Blackout) परीक्षण गरेर आपतकालीन प्रणाली चल्छ कि जाँच्नुहोस्|Beul-raek-a-ut te-seu-teu-hae|항해 중 메인 발전기가 모두 정지되어 선박의 주 전력이 상실되는 최악의 정전(Black-out) 상황을 의도적으로 모의 발생시켜, 비상 발전기가 설정된 시간 내에 자동으로 기동하고 조타기 등 필수 생존 설비에 전력을 복구하는지 검증하는 가장 핵심적인 선박 안전 시험 지시입니다.|Instruksi uji keselamatan paling vital kapal: simulasikan secara sengaja skenario pemadaman total (black-out) akibat matinya semua generator utama. Ujian ini untuk memverifikasi apakah Generator Darurat otomatis menyala dalam batas waktu regulasi dan berhasil memulihkan daya ke peralatan bertahan hidup esensial seperti sistem kemudi.|Chỉ thị kiểm tra an toàn cốt lõi nhất của tàu: cố tình giả lập tình huống mất điện toàn phần (black-out) tồi tệ nhất khi tất cả máy phát chính ngừng hoạt động. Mục đích để xác minh Máy phát điện Khẩn cấp có tự động khởi động trong thời gian quy định và khôi phục nguồn điện cho các thiết bị sinh tồn sống còn như máy lái hay không.|समुद्र यात्राको क्रममा मुख्य जेनेरेटर सबै बन्द भएर जहाजको मुख्य बिजुली गुम्ने सबैभन्दा खराब विद्युत कटौती (Black-out) अवस्थालाई जानाजान सिमुलेट गराएर, आपतकालीन जेनेरेटर तोकिएको समयभित्र आफैं सुरु भई स्टेरिङ गियर जस्ता आवश्यक जीवन रक्षक उपकरणहरूमा बिजुली पुनर्स्थापना गर्छ कि गर्दैन भनेर प्रमाणित गर्ने जहाजको सबैभन्दा मुख्य सुरक्षा परीक्षण निर्देशन हो।",

      "선박커미셔닝부|테스트|스팀 배관 확인해|뜨거운 증기가 새지 않는지 보온재를 확인하세요|Periksa pipa uap (steam), pastikan insulasi aman dan tidak ada uap panas yang bocor|Seu-tim bae-gwan hwa-gin-hae|Kiểm tra đường ống hơi nước (steam), đảm bảo bảo ôn tốt và không rò rỉ hơi nóng|Seu-tim bae-gwan hwa-gin-hae|तातो वाष्प (स्टिम) नचुहिएको र इन्सुलेसन सुरक्षित रहेको स्टिम पाइप जाँच्नुहोस्|Seu-tim bae-gwan hwa-gin-hae|화상 사고 위험이 매우 높은 고온 고압의 증기(Steam)가 순환하는 배관 시스템 가동 시, 플랜지나 밸브 결합부에서 미세한 스팀 누출이 발생하지 않는지 점검하고, 작업자 보호를 위해 외부에 감싼 단열재(보온재)의 시공 상태가 훼손 없이 안전하게 유지되고 있는지 확인하라는 지시입니다.|Instruksi inspeksi keselamatan termal: saat mengoperasikan sistem perpipaan uap (steam) bertekanan dan bersuhu tinggi yang rawan memicu luka bakar parah, periksa apakah ada kebocoran uap dari flensa atau katup. Selain itu, pastikan material insulasi pelindung eksternal tetap utuh untuk melindungi pekerja dari kontak panas langsung.|Chỉ thị kiểm tra an toàn nhiệt: khi vận hành hệ thống ống dẫn hơi nước (steam) nhiệt độ cao áp suất lớn có nguy cơ gây bỏng nặng, phải rà soát xem có rò rỉ hơi ở các khớp nối mặt bích hay van không. Đồng thời, đảm bảo lớp vật liệu cách nhiệt bọc ngoài vẫn còn nguyên vẹn để bảo vệ an toàn cho thợ.|पोल्ने ठूलो जोखिम भएको उच्च तापक्रम र उच्च दबावको वाष्प (Steam) बग्ने पाइप प्रणाली चलाउँदा, फ्ल्यान्ज वा भल्भको जोर्नीबाट सूक्ष्म रूपमा वाष्प चुहिएको छ कि छैन भनेर जाँच्ने, र कामदारको सुरक्षाको लागि बाहिर बेरेको इन्सुलेसन (बोओन्जे) को अवस्था नबिग्रिकनै सुरक्षित रूपमा कायम छ कि छैन भनेर 확인 गर्ने निर्देशन हो।",

      "선박커미셔닝부|통신|통신 상태 확인해|인터폰과 방송 소리가 깨끗하게 들리는지 보세요|Periksa status jaringan komunikasi interkom dan suara pengumuman|Tong-sin sang-tae hwa-gin-hae|Kiểm tra trạng thái liên lạc nội bộ và chất lượng âm thanh phát thanh|Tong-sin sang-tae hwa-gin-hae|इन्टरकम र प्रसारणको आवाज सफा छ कि सञ्चार अवस्था जाँच्नुहोस्|Tong-sin sang-tae hwa-gin-hae|선박의 안전 운항 및 비상 대피 통제를 위해 필수적인 선내 인터폰(Auto Telephone) 시스템과 공지 방송 설비(PA System)를 가동하여, 구역 간 양방향 통화 품질이 명확하고 스피커에서 출력되는 경고 방송에 잡음이나 끊김이 없는지 음향 테스트를 수행하라는 지시입니다.|Instruksi pengujian akustik navigasi: nyalakan sistem interkom (Auto Telephone) dan peralatan pengumuman publik (PA System) yang vital untuk kontrol evakuasi. Uji kualitas panggilan dua arah antar zona, serta pastikan suara siaran peringatan dari speaker terdengar jelas, jernih, tanpa putus-putus atau gangguan statis.|Chỉ thị kiểm tra âm thanh hàng hải: bật hệ thống điện thoại nội bộ (Auto Telephone) và hệ thống phát thanh công cộng (PA System) thiết yếu cho việc sơ tán khẩn cấp. Phải thử nghiệm chất lượng đàm thoại hai chiều giữa các khu vực và đảm bảo âm thanh cảnh báo phát ra từ loa phải rõ ràng, không bị nhiễu sóng hay gián đoạn.|जहाजको सुरक्षित उडान र आपतकालीन निकासी नियन्त्रणको लागि अनिवार्य भएको जहाजभित्रको इन्टरकम (Auto Telephone) प्रणाली र सूचना प्रसारण उपकरण (PA System) चलाएर, क्षेत्रहरू बीचको दोहोरो कुराकानीको गुणस्तर स्पष्ट छ कि र स्पिकरबाट निस्कने चेतावनी प्रसारणमा कुनै हल्ला वा काटिने समस्या छैन भनेर ध्वनि परीक्षण गर्ने निर्देशन हो।",

      "선박커미셔닝부|통신|선내 와이파이 확인해|구석진 방까지 인터넷 신호가 가는지 보세요|Periksa konektivitas Wi-Fi di dalam kapal hingga ke ruangan terpelosok|Seon-nae wa-i-pa-i hwa-gin-hae|Kiểm tra sóng Wi-Fi trên tàu xem có phủ tới các phòng góc khuất không|Seon-nae wa-i-pa-i hwa-gin-hae|कुनाको कोठासम्म इन्टरनेटको सिग्नल पुग्छ कि जहाजभित्रको वाइफाइ जाँच्नुहोस्|Seon-nae wa-i-pa-i hwa-gin-hae|스마트 선박 운영 및 선원 복지를 위해 구축된 무선 인터넷(Wi-Fi) 네트워크망이 두꺼운 철판 격벽으로 나뉜 선박 내부의 외진 선실, 엔진룸 하부 등 사각지대 없이 설계된 수신 강도 기준을 충족하며 원활하게 연결되는지 스마트 기기로 수신율을 매핑하며 점검하라는 지시입니다.|Instruksi inspeksi jaringan nirkabel: pastikan sistem Wi-Fi untuk operasi kapal pintar menembus sekat pelat baja tebal. Pekerja harus memetakan dan mengukur kekuatan sinyal memakai perangkat pintar di area buta sinyal (blind spot) seperti kabin terpelosok atau dasar ruang mesin, memverifikasi tidak ada sinyal yang drop di bawah standar.|Chỉ thị kiểm tra mạng không dây: đảm bảo mạng Wi-Fi phục vụ vận hành tàu thông minh có thể xuyên qua các vách ngăn thép dày. Thợ phải cầm thiết bị thông minh đi đo đạc và lập bản đồ cường độ sóng ở các điểm mù như phòng góc khuất hoặc gầm buồng máy, xác nhận sóng luôn đạt chuẩn kết nối mượt mà.|स्मार्ट जहाज सञ्चालन र चालक दलको सुविधाको लागि निर्माण गरिएको वायरलेस इन्टरनेट (Wi-Fi) नेटवर्क बाक्लो फलामको भित्ताले छुट्टाइएको जहाजभित्रको कुनाको कोठा, इन्जिन रुमको तल्लो भाग जस्ता ब्लाइन्ड स्पट (सम्पर्क विहीन क्षेत्र) नभई डिजाइन गरिएको रिसिभिङ क्षमता मापदण्ड पूरा गरी सहज रूपमा जडान हुन्छ कि हुँदैन भनेर स्मार्ट उपकरणले सिग्नल म्यापिङ गर्दै जाँच्ने निर्देशन हो।",

      "선박커미셔닝부|통신|감도, 감도|무전기 테스트 시 내 목소리 잘 들리는지 묻는 말입니다|Istilah radio 'cek suara' untuk mengonfirmasi kejelasan sinyal komunikasi|Gam-do, gam-do|Từ dùng khi kiểm tra bộ đàm để hỏi xem người kia có nghe rõ không|Gam-do, gam-do|वाकी-टाकी परीक्षण गर्दा मेरो आवाज राम्रोसँग सुनिएको छ कि भनेर सोध्ने शब्द हो|Gam-do, gam-do|시운전 및 위험 작업 시 통제실과 현장 간의 초단파 무전기(VHF/UHF) 송수신 상태를 확인하기 위해, 송신자가 자신의 음성 신호가 노이즈 없이 명료하게 수신되고 있는지 상대방의 응답 품질을 확인하고자 던지는 통신 점검용 공식 무전 호출어(Radio Check)입니다.|Panggilan radio resmi (Radio Check) yang digunakan pengirim di lapangan atau ruang kontrol saat uji coba mesin. Bertujuan memastikan transmisi radio VHF/UHF beroperasi jernih tanpa gangguan bising latar belakang, sehingga pertukaran instruksi darurat atau operasional dapat didengar sempurna oleh penerima.|Mã gọi bộ đàm chính thức (Radio Check) dùng để kiểm tra đường truyền tín hiệu tần số vô tuyến (VHF/UHF) giữa phòng điều khiển và hiện trường. Người gọi phát tín hiệu này để hỏi người nghe xem âm thanh truyền đi có bị nhiễu sóng hay ngắt quãng không, nhằm đảm bảo thông tin chỉ đạo được tiếp nhận rõ ràng tuyệt đối.|परीक्षण उडान र खतरनाक काम गर्दा कन्ट्रोल रुम र साइट बीचको VHF/UHF वाकी-टाकीको पठाउने र प्राप्त गर्ने अवस्था जाँच्नको लागि, पठाउने मान्छेले आफ्नो आवाजको सिग्नल कुनै हल्ला विना स्पष्ट रूपमा प्राप्त भइरहेको छ कि छैन भनेर अर्को पक्षको प्रतिक्रिया गुणस्तर जाँच्न प्रयोग गरिने आधिकारिक सञ्चार परीक्षण कलिङ शब्द (Radio Check) हो।",

      "선박커미셔닝부|통신|무전기 챙겨|배 안은 핸드폰이 안 되니 무전기를 휴대하세요|Bawa walkie-talkie (HT) karena sinyal ponsel terblokir di dalam kapal|Mu-jeon-gi chaeng-gyeo|Nhớ mang bộ đàm vì bên trong tàu không có sóng điện thoại|Mu-jeon-gi chaeng-gyeo|जहाजभित्र मोबाइल नचल्ने भएकोले वाकी-टाकी बोक्नुहोस्|Mu-jeon-gi chaeng-gyeo|전파가 완전히 차단되는 두꺼운 철판 구조의 선박 심층부(엔진룸, 이중저 등)로 이동하여 점검을 수행할 때, 고립 시 긴급 상황 보고 및 통제실과의 실시간 지시 하달을 위해 지정된 채널이 맞춰진 산업용 무전기를 개인 안전 장구처럼 반드시 지참하라는 통신 보안 지시입니다.|Instruksi keamanan komunikasi yang esensial: saat turun untuk menginspeksi lambung bawah (seperti ruang mesin atau dasar ganda) di mana pelat baja memblokir total sinyal seluler, pekerja wajib membawa radio industri dua arah (HT) yang sudah dikonfigurasi ke saluran yang tepat. Ini berfungsi sebagai garis hidup untuk melapor darurat dan menerima arahan seketika dari ruang kontrol.|Chỉ thị bảo mật thông tin liên lạc sống còn: khi xuống sâu dưới thân tàu (như buồng máy, đáy kép) nơi vách thép dày chặn đứng mọi sóng điện thoại, thợ thi công bắt buộc phải đeo theo bộ đàm công nghiệp đã bắt đúng kênh. Thiết bị này là phao cứu sinh để báo cáo khẩn cấp lúc bị cô lập và nhận chỉ thị tác chiến tức thời từ đài chỉ huy.|रेडियो तरंग पूर्ण रूपमा रोकिने बाक्लो फलामको संरचना भएको जहाजको गहिरो भाग (इन्जिन रुम, डबल बटम आदि) मा गएर परीक्षण गर्दा, एक्लै परेको बेला आपतकालीन अवस्था रिपोर्ट गर्न र कन्ट्रोल रुमसँग रियल टाइममा निर्देशन लिन-दिनको लागि तोकिएको च्यानल मिलाइएको औद्योगिक वाकी-टाकीलाई व्यक्तिगत सुरक्षा उपकरण जस्तै अनिवार्य रूपमा बोक्ने सञ्चार सुरक्षा निर्देशन हो।",

      "선박커미셔닝부|구역/이동|배에 올라가|바다에 떠 있는 본선으로 사다리를 타고 가세요|Naik ke atas kapal utama (mother ship) yang bersandar di dermaga|Bae-e ol-ra-ga|Lên chiếc tàu chính đang neo đậu dưới bến|Bae-e ol-ra-ga|समुद्रमा रहेको मुख्य जहाजमा भर्याङ चढेर जानुहोस्|Bae-e ol-ra-ga|육상 작업장이나 사무실에서의 준비 및 사전 회의가 완료된 후, 안벽(부두)에 계류되어 최종 의장 작업 및 해상 시운전을 준비 중인 건조 선박(본선) 내부로 승선용 안전 통로(갱웨이)를 거쳐 진입하여 부여된 임무를 수행하라는 공식적인 이동 지시입니다.|Instruksi perpindahan tugas resmi: setelah briefing dan persiapan alat di darat selesai, pekerja diperintahkan meniti jembatan akses aman (gangway) untuk boarding (naik) ke dalam badan kapal (mother ship) yang sedang bersandar di dermaga. Tujuannya untuk memulai pekerjaan penyelesaian tahap akhir dan uji coba sistem di atas air.|Chỉ thị điều động nhân sự chính thức: sau khi hoàn tất họp bàn và chuẩn bị vật tư trên bờ, công nhân được lệnh di chuyển qua cầu dẫn an toàn (gangway) để bước lên con tàu đang neo đậu tại cảng (bản tuyến). Mục tiêu là tiến hành các công đoạn lắp ráp nội thất hoàn thiện và chuẩn bị cho đợt chạy thử máy trên biển.|जमिनको काम गर्ने ठाउँ वा अफिसमा तयारी र पूर्व बैठक सकिएपछि, बन्दरगाहमा बाँधिएको र अन्तिम आउटफिटिङ काम तथा समुद्री परीक्षण उडानको तयारी गरिरहेको निर्माणधीन जहाज (मुख्य जहाज) भित्र चढ्ने सुरक्षित बाटो (ग्याङवे) हुँदै गएर तोकिएको काम पूरा गर्ने आधिकारिक सार्ने निर्देशन हो।",

      "선박커미셔닝부|구역/이동|브릿지로 가|최상층에 있는 배 조종실로 올라오세요|Menuju anjungan (bridge), ruang kendali di tingkat atas kapal|Beu-rit-ji-ro ga|Di chuyển lên đài chỉ huy (bridge) ở tầng cao nhất của tàu|Beu-rit-ji-ro ga|सबैभन्दा माथि रहेको जहाजको कन्ट्रोल रुम (ब्रिज) मा जानुहोस्|Beu-rit-ji-ro ga|선박의 항해, 통신 장비 및 메인 엔진의 원격 제어 콘솔이 통합 설치된 선박 최상단 구조물인 조종실(Wheelhouse/Bridge)로 이동하여, 현장 설비(펌프, 타기 등)의 작동 상태가 중앙 제어 시스템과 정상적으로 연동되는지 확인하는 커미셔닝 테스트를 수행하라는 지시입니다.|Instruksi pergerakan operasional: naiklah ke anjungan kapal (Bridge/Wheelhouse) di puncak struktur atas kapal, tempat konsol kontrol navigasi dan mesin utama berada. Lakukan pengujian komisioning dari sana untuk memastikan bahwa perintah dari sistem kontrol pusat terhubung dan direspons secara akurat oleh mesin-mesin fisik di lapangan (seperti pompa dan kemudi).|Chỉ thị di chuyển tác chiến: hãy leo lên đài chỉ huy (Bridge/Wheelhouse) nằm trên đỉnh chóp của tàu, nơi lắp đặt bệ điều khiển trung tâm từ xa cho động cơ và radar hàng hải. Thực hiện các bài test vận hành (commissioning) tại đây để xác nhận tín hiệu điều khiển có liên kết đồng bộ và điều khiển chính xác thiết bị dưới hầm (như máy bơm, máy lái) hay không.|जहाजको नेभिगेसन, सञ्चार उपकरण र मुख्य इन्जिनको रिमोट कन्ट्रोल कन्सोल एकीकृत रूपमा जडान गरिएको जहाजको सबैभन्दा माथिल्लो संरचना कन्ट्रोल रुम (Wheelhouse/Bridge) मा गएर, साइटका उपकरणहरू (पम्प, स्टेरिङ आदि) को सञ्चालन अवस्था केन्द्रीय नियन्त्रण प्रणालीसँग सामान्य रूपमा लिङ्क भएको छ कि छैन भनेर जाँच्ने कमिसनिङ टेस्ट गर्ने निर्देशन हो।",

      "선박커미셔닝부|구역/이동|ECR로 가|엔진룸 통제실(Engine Control Room)로 가세요|Pergi ke Ruang Kontrol Mesin (ECR)|I-si-al-ro ga|Đi đến Phòng Điều khiển Buồng máy (ECR)|I-si-al-ro ga|इन्जिन कन्ट्रोल रुम (ECR) मा जानुहोस्|I-si-al-ro ga|선박 하부 기관실 내부에 위치하며 방음 및 공조 설비가 갖춰진 엔진 제어실(Engine Control Room)로 집결하여, 알람 모니터링 시스템(AMS) 컴퓨터를 통해 선박 내 모든 동력 및 기계 설비의 파라미터를 감시하고 원격으로 기동 테스트를 총괄 지휘하라는 동선 지시입니다.|Instruksi pusat komando: berkumpullah di ECR (Engine Control Room), sebuah ruangan kedap suara ber-AC di dalam perut ruang mesin. Jadikan ruangan ini posko utama untuk memonitor parameter ribuan mesin via komputer Alarm Monitoring System (AMS) dan memimpin uji coba penyalaan jarak jauh ke seluruh mesin pembangkit tenaga kapal.|Chỉ thị tập kết tổng hành dinh: yêu cầu tập trung tại Phòng Điều khiển Buồng máy (ECR) - một không gian cách âm có điều hòa nằm sâu dưới hầm máy. Từ máy tính Hệ thống Giám sát Báo động (AMS) ở đây, các thợ máy sẽ tổng chỉ huy, theo dõi thông số và phát lệnh khởi động từ xa cho tất cả các thiết bị động lực và máy móc trên tàu.|जहाजको तल्लो भागको इन्जिन रुमभित्र रहेको, साउन्डप्रुफ र वातानुकूलित उपकरण भएको इन्जिन कन्ट्रोल रुम (Engine Control Room) मा जम्मा भएर, अलार्म मोनिटरिङ सिस्टम (AMS) कम्प्युटरमार्फत जहाजभित्रका सबै पावर र मेसिनरी उपकरणहरूको प्यारामिटर निगरानी गर्ने र रिमोटबाट स्टार्ट टेस्टलाई समग्र रूपमा निर्देशन दिने हिंड्ने बाटोको निर्देशन हो।",

      "선박커미셔닝부|구역/이동|디지룸으로 가|비상 발전기가 있는 DG 룸으로 이동하세요|Menuju ruang Diesel Generator (DG Room)|Di-ji-rum-eu-ro ga|Vào khu vực đặt Máy phát điện Diesel (DG Room)|Di-ji-rum-eu-ro ga|डिजेल जेनेरेटर (DG) कोठामा जानुहोस्|Di-ji-rum-eu-ro ga|선박의 주 전력망을 담당하는 디젤 발전기(Diesel Generator) 세트가 설치된 독립된 기계실(DG Room) 구역으로 이동하여, 시운전을 위한 발전기 엔진의 로컬 기동, 윤활유 압력 점검, 냉각 계통 검사 및 연동 패널 테스트를 수행하라는 구역 이동 지시입니다.|Instruksi pindah area uji: bergeraklah ke Ruang DG (Diesel Generator Room), kompartemen independen yang menampung mesin pembangkit listrik utama kapal. Lakukan pemeriksaan pra-operasi di sana, termasuk start mesin secara lokal, cek tekanan pelumas, periksa sistem pendingin radiator, dan sinkronisasi panel listrik.|Chỉ thị chuyển vùng thử nghiệm: tiến vào Phòng DG (Diesel Generator Room), buồng máy độc lập chứa tổ hợp máy phát điện cung cấp điện lưới cho tàu. Tại đây, thợ phải thực hiện thao tác nổ máy tại chỗ, đo áp suất nhớt bôi trơn, kiểm tra hệ thống làm mát và test liên động mảng tủ điện.|जहाजको मुख्य विद्युत ग्रिडको जिम्मा लिने डिजेल जेनेरेटर (Diesel Generator) सेट जडान गरिएको स्वतन्त्र मेसिन रुम (DG Room) क्षेत्रमा गएर, परीक्षण उडानको लागि जेनेरेटर इन्जिनको लोकल स्टार्ट, लुब्रिकेन्ट प्रेसर जाँच, कुलिङ प्रणाली परीक्षण र लिङ्केज प्यानल टेस्ट गर्ने क्षेत्र सार्ने निर्देशन हो。",

      "선박커미셔닝부|구역/이동|로컬로 가|제어실 말고 장비가 있는 현장 바로 앞을 뜻합니다|Pergi ke lokasi fisik peralatan (Local panel), bukan di ruang kontrol|Ro-keol-ro ga|Tới thẳng bảng điều khiển tại chỗ (Local) sát bên thiết bị, không ở phòng điều khiển|Ro-keol-ro ga|कन्ट्रोल रुममा नभई उपकरण भएको साइटको ठीक अगाडि (लोकल) मा जानुहोस्|Ro-keol-ro ga|기기 테스트 시 원격 통제실(Remote/ECR)에서 컴퓨터 마우스로 조작하는 것이 아니라, 작업자가 직접 배관 및 기계 설비가 위치한 현장 바로 앞(Local)의 현장 제어반에 서서 수동 스위치를 조작하거나 밸브 개폐 상태를 육안으로 확인하며 기동하라는 현장 검증 지시입니다.|Instruksi validasi langsung di TKP: alih-alih mengklik mouse dari komputer ruang kontrol (Remote/ECR), teknisi harus meluncur langsung ke depan fisik mesin atau pipa yang bersangkutan (Local). Operasikan panel kontrol lokal secara manual pakai tombol fisik, dan verifikasi pergerakan katup atau motor dengan mata kepala sendiri.|Chỉ thị xác minh tại thực địa: thay vì ngồi phòng máy lạnh (ECR) bấm chuột máy tính điều khiển từ xa, kỹ thuật viên phải xách đồ nghề đi đến tận chân công trình ngay sát thiết bị (Local). Tự tay vặn công tắc thủ công trên bảng điều khiển tại chỗ, và căng mắt kiểm chứng trực tiếp xem van có mở hay trục mô tơ có quay thật không.|उपकरण परीक्षण गर्दा रिमोट कन्ट्रोल रुम (Remote/ECR) मा कम्प्युटरको माउसले चलाउने नभई, कामदार आफैं पाइप र मेसिन उपकरण रहेको साइटको ठीक अगाडि (Local) को साइट कन्ट्रोल प्यानलमा उभिएर म्यानुअल स्विच चलाउने वा भल्भ खुलेको/बन्द भएको अवस्था आँखाले हेर्दै सुरु गर्ने साइट प्रमाणीकरण निर्देशन हो।",

      "선박커미셔닝부|도면/서류|파워도면 봐봐|전기 배선도(Power Connection)를 보세요|Rujuk pada diagram sirkuit daya utama (Power Connection)|Pa-wo-do-myeon bwa-bwa|Tham khảo sơ đồ nối dây động lực chính (Power Connection)|Pa-wo-do-myeon bwa-bwa|पावर कनेक्सन (Power Connection) नक्सा हेर्नुहोस्|Pa-wo-do-myeon bwa-bwa|장비 시운전 중 전원 투입 실패나 모터 구동 불량 발생 시, 메인 차단기에서부터 기기까지 고전압 동력선(예: 440V, 220V)이 결선되는 경로와 차단 용량이 상세히 기재된 전기 동력 회로도(Power Diagram)를 검토하여 물리적 배선 오류를 추적하라는 트러블슈팅 지시입니다.|Instruksi pemecahan masalah (troubleshooting) listrik: saat daya gagal masuk atau motor mogok berputar, bedah Diagram Rangkaian Daya (Power Diagram). Pelajari rute kabel listrik tegangan tinggi (mis. 440V) dari pemutus sirkuit utama hingga ke perangkat, cocokkan kapasitas hambatannya, dan lacak di mana letak kesalahan perakitan fisiknya.|Chỉ thị khắc phục sự cố (troubleshooting) điện: khi bật nguồn thất bại hoặc mô tơ ì ạch không quay, hãy mở Sơ đồ Điện Động Lực (Power Diagram) ra dò. Phân tích tuyến đường đi của cáp điện cao thế (ví dụ 440V) từ cầu dao tổng đến tận thiết bị, đối chiếu định mức công suất và truy tìm chính xác lỗi đấu nối dây thực tế.|उपकरण परीक्षण उडानको क्रममा पावर दिन असफल हुँदा वा मोटर नचल्दा, मुख्य ब्रेकरदेखि उपकरणसम्म उच्च भोल्टेज पावर लाइन (जस्तै: ४४०V, २२०V) जोडिने बाटो र ब्रेकिङ क्षमता विस्तृत रूपमा लेखिएको इलेक्ट्रिक पावर सर्किट डायग्राम (Power Diagram) हेरेर भौतिक तारको गल्ती खोज्ने ट्रबलसुटिङ निर्देशन हो。",

      "선박커미셔닝부|도면/서류|커넥션도면 봐봐|단자대 연결 도면(Control Connection)을 보세요|Periksa diagram koneksi terminal kontrol (Control Connection)|Keo-nek-syeon-do-myeon bwa-bwa|Kiểm tra sơ đồ đấu nối cầu đấu điều khiển (Control Connection)|Keo-nek-syeon-do-myeon bwa-bwa|कन्ट्रोल कनेक्सन (Control Connection) नक्सा हेर्नुहोस्|Keo-nek-syeon-do-myeon bwa-bwa|기기에 메인 전력은 공급되나 원격 제어 신호가 불량하거나 센서 값이 인식되지 않을 때, 판넬 내부의 단자대(Terminal Block) 번호와 가느다란 제어선(24V 통신선 등) 간의 1:1 결선 매핑 정보가 명시된 제어 결선도를 확인하여 오결선을 찾으라는 기술적 지시입니다.|Instruksi bedah sirkuit logika: saat mesin hidup tapi remot tak merespons atau nilai sensor buta, baca Diagram Koneksi Kontrol. Cocokkan pemetaan 1:1 antara deretan nomor blok terminal di dalam panel dengan kabel-kabel sinyal tipis (misal kabel data 24V), dan cari di mana letak salah colok kabel komunikasinya.|Chỉ thị rà soát mạch điều khiển: khi thiết bị đã lên điện nhưng mất kết nối điều khiển từ xa hoặc không đọc được cảm biến, hãy lật Sơ đồ Đấu Nối Điều Khiển ra xem. Dò tìm thông tin ghép nối 1:1 giữa dải số trên cầu đấu (Terminal Block) trong tủ điện với hàng bó dây tín hiệu nhỏ (dây 24V), nhằm phát hiện ra dây nào đang đấu sai lỗ.|उपकरणमा मुख्य पावर आपूर्ति भए पनि रिमोट कन्ट्रोल सिग्नल खराब हुँदा वा सेन्सरको मान नपढिँदा, प्यानलभित्रको टर्मिनल ब्लक (Terminal Block) को नम्बर र साना कन्ट्रोल तार (२४V सञ्चार तार आदि) बीचको १:१ जडान म्यापिङ जानकारी लेखिएको कन्ट्रोल कनेक्सन नक्सा हेरेर गलत जडान खोज्ने प्राविधिक निर्देशन हो।",

      "선박커미셔닝부|도면/서류|메이커도면 봐봐|장비 제조사가 만든 상세 도면을 확인하세요|Rujuk gambar teknis spesifik dari pihak pabrikan (Maker)|Me-i-keo-do-myeon bwa-bwa|Tham khảo bản vẽ kỹ thuật chi tiết của nhà sản xuất (Maker)|Me-i-keo-do-myeon bwa-bwa|उपकरण निर्माता (Maker) ले बनाएको विस्तृत नक्सा हेर्नुहोस्|Me-i-keo-do-myeon bwa-bwa|조선소에서 자체 발행한 일반 배치도만으로는 파악이 불가능한 기계 장비 내부의 정밀한 부품 구조, 배관 인터페이스, 전용 센서의 부착 위치 등을 점검해야 할 때, 해당 설비를 납품한 외부 제조사(Maker)가 직접 제공한 상세 카탈로그 도면(Vendor Drawing)을 참조하라는 지시입니다.|Instruksi bedah alat spesifik: gambar susunan umum galangan kapal tidak cukup untuk membongkar jeroan mesin yang rumit. Saat butuh melihat struktur internal part, antarmuka pipa, atau titik pasang sensor rahasia, buka dan pelajari gambar detail (Vendor Drawing) yang dicetak langsung oleh vendor pabrikan (Maker) asli mesin tersebut.|Chỉ thị phân tích bản vẽ nhà thầu phụ: bản vẽ bố trí chung của xưởng đóng tàu là chưa đủ để mổ xẻ cấu tạo ruột gan phức tạp của máy móc. Khi cần xác định kết cấu chi tiết, mặt bích nối ống hay vị trí gắn cảm biến độc quyền, bắt buộc phải lôi bản vẽ thiết kế chi tiết (Vendor Drawing) do chính nhà sản xuất gốc (Maker) cung cấp ra để ngâm cứu.|जहाज निर्माण कम्पनीले आफैं जारी गरेको सामान्य लेआउट नक्साले मात्र थाहा पाउन नसकिने मेसिन उपकरण भित्रको सूक्ष्म पार्ट्स संरचना, पाइप इन्टरफेस, विशेष सेन्सर जडान गर्ने स्थान आदि जाँच्नु पर्दा, उक्त उपकरण आपूर्ति गर्ने बाह्य निर्माता (Maker) ले आफैंले प्रदान गरेको विस्तृत क्याटलग नक्सा (Vendor Drawing) हेर्ने निर्देशन हो।",
